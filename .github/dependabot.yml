version: 2
updates:
  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "api"]

  - package-ecosystem: pip
    directory: /gateway
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "gateway"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "web"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: ["dependencies", "ci"]
