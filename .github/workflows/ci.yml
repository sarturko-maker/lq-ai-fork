name: CI

# PR-validation workflow. Triggered on PRs targeting any branch and on
# pushes to the default branch so post-merge state is also validated.
#
# Scope (per docs/SESSION-HANDOFF-2026-05-12-wave-d1-close.md §4 item 2):
#   - web/    : svelte-check + Vitest
#   - api/    : ruff + mypy (standard mode) + pytest (with Postgres)
#   - gateway/: ruff + mypy --strict + pytest
#
# Out of scope (deferred to future waves):
#   - Cypress E2E (heavier; needs a stack-up step + LLM provider keys)
#   - Coverage gates (no-decrease enforcement)
#   - Dependency-license check (likely Wave F polish)

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

# Cancel in-flight runs for the same branch when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-checks:
    name: Web (svelte-check + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: svelte-check (typecheck)
        # Post-F0-S6 the whole app is LQ.AI-owned code; the scoped
        # tsconfig.lq-ai.json gate is retired (check:lq-ai aliases check).
        run: npm run check

      - name: Vitest (unit tests)
        run: npm run test:frontend -- --run

  api-checks:
    name: API (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    # Postgres service container — api/tests/conftest.py creates a fresh
    # per-run database from this connection (see DATABASE_URL below).
    # Image matches docker-compose.yml: pgvector/pgvector:pg16 carries the
    # pgvector extension binary that migrations require (CREATE EXTENSION
    # IF NOT EXISTS vector). Plain postgres:16-alpine omits it.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lq_ai
          POSTGRES_PASSWORD: lq_ai
          POSTGRES_DB: lq_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lq_ai -d lq_ai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # asyncpg URL form per api/tests/conftest.py.
      DATABASE_URL: postgresql+asyncpg://lq_ai:lq_ai@localhost:5432/lq_ai

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install api package + dev extras
        run: pip install -e ".[dev]"

      - name: Install Adeu (--no-deps — C4/ADR-F031)
        # Adeu's hard fastmcp[apps] dep would pull starlette 0.48 / mcp / pydantic
        # 2.13 and break our pinned FastAPI stack; we never use its FastMCP server,
        # and its real SDK deps (diff-match-patch, structlog, …) are in pyproject.
        run: pip install --no-deps "adeu==1.12.1"

      - name: ruff check (api + scripts via root config)
        # The repo-root ruff.toml excludes web/ and applies to api+gateway+scripts.
        # Run from repo root so the config is picked up correctly.
        working-directory: ${{ github.workspace }}
        run: ruff check api scripts

      - name: ruff format --check
        working-directory: ${{ github.workspace }}
        run: ruff format --check api scripts

      - name: mypy (standard mode)
        run: mypy app

      - name: pytest
        run: pytest -q

  gateway-checks:
    name: Gateway (ruff + mypy --strict + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: gateway/pyproject.toml

      - name: Install gateway package + dev extras
        run: pip install -e ".[dev]"

      - name: ruff check
        working-directory: ${{ github.workspace }}
        run: ruff check gateway

      - name: ruff format --check
        working-directory: ${{ github.workspace }}
        run: ruff format --check gateway

      - name: mypy --strict (per CLAUDE.md)
        run: mypy app

      - name: pytest
        run: pytest -q
