name: Trivy

# Scheduled vulnerability VISIBILITY (SAAS-1 / ADR-F058) — a weekly image scan
# of the three `:main` fleet-deploy images (published by images.yml) plus a
# repo filesystem/config scan. Findings land in the repo's Security tab (code
# scanning alerts) as SARIF for triage.
#
# NON-BLOCKING BY DESIGN: exit-code 0 on every Trivy step — this is a
# visibility channel, not a merge gate, at this stage of the project (no CI
# run is failed by a vulnerability finding here). Revisit once the finding
# backlog is under control and a gate would be signal, not noise.

on:
  schedule:
    - cron: "30 4 * * 1" # 04:30 UTC every Monday
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  image-scan:
    name: Image scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, gateway, web]
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan — ghcr.io/sarturko-maker/lq-ai-${{ matrix.service }}:main
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/sarturko-maker/lq-ai-${{ matrix.service }}:main
          format: sarif
          output: trivy-image-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          # Without this, `severity:` is IGNORED for SARIF output and the
          # Security tab gets flooded with every severity level.
          limit-severities-for-sarif: true
          exit-code: "0" # visibility only — see header

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}

  fs-scan:
    name: Filesystem / config scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy scan — repo filesystem + IaC config
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          # Same as the image scans: required for the severity filter to
          # apply to SARIF output.
          limit-severities-for-sarif: true
          exit-code: "0" # visibility only — see header

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
