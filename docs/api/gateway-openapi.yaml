openapi: 3.1.0
info:
  title: LQ.AI Inference Gateway
  version: 0.1.0
  description: |
    The Inference Gateway is the security boundary for outbound LLM requests.
    Every inference request — from the backend, from skills, from the Word
    Add-in's backend integration — passes through this service.
    
    The gateway exposes:
    1. An OpenAI-compatible chat-completions endpoint that backend services
       call (transparent to client code that already targets the OpenAI API).
    2. An OpenAI-compatible embeddings endpoint.
    3. Admin endpoints for tier configuration, provider configuration, cost.
    
    Pipeline (per PRD §4.3):
      Auth → Router → Rate Limit → Tier Derivation → Anonymization (M2)
        → Provider Adapter → Anonymization-post → Cost Tracker → Telemetry
    
    The gateway is NOT directly accessible to end users. End users interact
    with the backend; the backend calls the gateway. Direct gateway access
    is gated to admin operations and service-to-service traffic only.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8001
    description: Local development
  - url: http://gateway:8001
    description: Internal Docker-Compose network

tags:
  - name: inference
    description: OpenAI-compatible inference endpoints
  - name: admin
    description: Gateway configuration and operations
  - name: health
    description: Liveness and readiness probes

paths:

  # ----------- INFERENCE -----------
  /v1/chat/completions:
    post:
      tags: [inference]
      summary: OpenAI-compatible chat completions
      description: |
        Accepts requests in OpenAI Chat Completions format. The gateway:
        - Resolves the model alias (e.g., 'smart' → claude-opus-4-7)
        - Determines the routed inference tier (B4)
        - Refuses if below the request's minimum_inference_tier (D1; B4 only annotates)
        - Applies anonymization (if enabled, M2)
        - Routes to the appropriate provider
        - On a fallback-eligible primary failure, walks the alias's
          fallback chain (B4 skeleton; full activation when more
          providers ship in B6)
        - Tracks cost and telemetry

        Per PRD §4.4, the routed Inference Tier is surfaced two ways
        on the response:
          1. The `routed_inference_tier` field in the JSON body (or in
             every streaming chunk's envelope for `stream: true`).
          2. The `X-LQ-AI-Routed-Inference-Tier` header (1-5), so
             header-only consumers (proxies, instrumentation) don't
             need to parse the body.
        The provider name is mirrored at `routed_provider` (body) and
        `X-LQ-AI-Routed-Provider` (header).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Completion (or stream)
          headers:
            X-LQ-AI-Routed-Inference-Tier:
              description: |
                The Inference Tier (1-5) that this request was routed at,
                derived per PRD §1.5.2 / §3.13. Mirrors the
                `routed_inference_tier` field in the response body.
              schema: {type: integer, enum: [1, 2, 3, 4, 5]}
              required: true
            X-LQ-AI-Routed-Provider:
              description: |
                The configured provider name that handled the request.
                Mirrors `routed_provider` in the response body.
              schema: {type: string}
              required: true
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ChatCompletionResponse'}
            text/event-stream:
              schema: {type: string, description: "SSE stream of OpenAI-format chunks; each chunk carries routed_inference_tier and routed_provider"}
        '400':
          description: Invalid request (bad JSON, schema violation, or invalid_model)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
        '403':
          description: Refused — inference tier below request minimum, or provider not allowed (D1)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
        '502':
          description: Upstream provider error (auth, 4xx, or 5xx after fallback)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
        '503':
          description: No adapter available (provider credential not configured) or network error
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}

  /v1/models:
    get:
      tags: [inference]
      summary: List available models — aliases + live-discovered provider-native names (D0)
      description: |
        Returns the OpenAI-compatible ``{object: "list", data: [...]}``
        envelope. Each entry carries the standard
        ``{id, object, created, owned_by}`` fields plus LQ.AI extensions
        documented under ``ModelEntry`` below.

        D0 augments the A3 alias-only payload with two live-discovery
        sources:

        - **Ollama tags** — ``GET <ollama_url>/api/tags`` is called for
          every enabled ``ollama`` provider. Each pulled model surfaces
          as one entry with ``id = "<provider_name>/<tag>"`` and
          ``lq_ai_kind = "provider_native"``. Cached 60 seconds.
        - **Anthropic catalog** — ``GET <anthropic_url>/v1/models`` is
          called for every enabled ``anthropic`` provider whose API key
          env var is populated. Each catalog entry surfaces as one row
          with ``id = "<provider_name>/<model_id>"``. Cached 5 minutes.

        Per-source failures (Ollama not running, Anthropic key invalid,
        network blip) are best-effort: a WARNING is logged and the
        source returns no rows; the response still surfaces whatever
        other sources produced. The endpoint never raises.

        The raw ``provider/model`` form returned by discovery can be
        sent verbatim as the ``model`` field on
        ``POST /v1/chat/completions`` — D0 also lands the router-side
        passthrough that resolves the form directly.
      responses:
        '200':
          description: List of aliases + discovered models
          content:
            application/json:
              schema:
                type: object
                required: [object, data]
                properties:
                  object: {type: string, enum: [list]}
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/ModelEntry'}

  /v1/embeddings:
    post:
      tags: [inference]
      summary: OpenAI-compatible embeddings
      description: |
        Computes vector embeddings for one or more strings against the
        embedding model resolved from `model`. `model` may be either a
        configured alias (e.g., `embedding`) or a provider-native model
        name (e.g., `text-embedding-3-small`); the router resolves
        either using the same alias chain as `/v1/chat/completions`.

        The response carries the standard OpenAI shape plus the LQ.AI
        extensions `routed_inference_tier` and `routed_provider`. The
        same tier annotation is also delivered in the
        `X-LQ-AI-Routed-Inference-Tier` response header. One row is
        written to `inference_routing_log` per call (success or
        failure) so the audit log captures embedding workload alongside
        chat completions.

        Anthropic does not provide an embeddings endpoint; an
        Anthropic-routed alias triggers the gateway's fallback walk
        until a provider that supports embeddings (typically OpenAI
        per ADR 0008) is found.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              properties:
                model: {type: string, description: "Alias or provider-native model name"}
                input:
                  description: "Either a single string or an array of strings"
                  oneOf:
                    - {type: string}
                    - {type: array, items: {type: string}}
                encoding_format:
                  type: string
                  enum: [float, base64]
                  description: "Default float; base64 is bandwidth-optimization."
                dimensions:
                  type: integer
                  minimum: 1
                  description: |
                    Optional reduced output dimension for OpenAI's
                    text-embedding-3-* models. The KB indexing path
                    in api/ omits this and uses the model's native
                    dim (1536 for text-embedding-3-small/-large).
                user:
                  type: string
                  description: "Optional end-user identifier (passed through to providers that accept it)."
      responses:
        '200':
          description: Embeddings
          headers:
            X-LQ-AI-Routed-Inference-Tier:
              schema: {type: integer, enum: [1,2,3,4,5]}
              description: "Same value as the response body's `routed_inference_tier`."
            X-LQ-AI-Routed-Provider:
              schema: {type: string}
              description: "The provider name that produced the embeddings."
          content:
            application/json:
              schema:
                type: object
                required: [data, model, usage]
                properties:
                  object:
                    type: string
                    enum: [list]
                  data:
                    type: array
                    items:
                      type: object
                      required: [embedding, index]
                      properties:
                        object:
                          type: string
                          enum: [embedding]
                        embedding:
                          type: array
                          items: {type: number}
                          description: "Floats; length matches the model's embedding dimension (1536 for text-embedding-3-small)."
                        index: {type: integer}
                  model: {type: string}
                  usage:
                    type: object
                    properties:
                      prompt_tokens: {type: integer}
                      total_tokens: {type: integer}
                  routed_inference_tier:
                    type: integer
                    enum: [1, 2, 3, 4, 5]
                    description: "Derived tier per PRD §1.5.2; same as the X-LQ-AI-Routed-Inference-Tier header."
                  routed_provider:
                    type: string
                    description: "Provider name that handled the request (post-fallback)."
        '400':
          description: Invalid model or malformed request body.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
        '401':
          description: Gateway-key auth failed (operator misconfiguration).
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
        '429':
          description: Upstream provider rate-limited the call.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
        '502':
          description: Upstream provider error after fallback exhausted.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
        '503':
          description: No adapter available for any provider that supports embeddings.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}

  # ----------- HEALTH (PRD §4.3 — liveness/readiness) -----------
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      description: |
        Returns 200 as soon as the process is serving requests. Independent of
        downstream provider reachability or gateway.yaml validity. Used by
        docker-compose / Kubernetes liveness probes.
      security: []
      responses:
        '200':
          description: Alive
          content:
            application/json:
              schema:
                type: object
                required: [status, service]
                properties:
                  status: {type: string, enum: [alive]}
                  service: {type: string}
                  version: {type: string}

  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      description: |
        Returns 200 once gateway.yaml has loaded and validated. Returns 503
        otherwise. Used to decide whether to route traffic.
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: {type: string, enum: [ready]}
                  providers: {type: integer, description: "configured provider count"}
                  aliases: {type: integer, description: "model alias count"}
        '503':
          description: Not ready (config not loaded or invalid)

  # ----------- TIER (PRD §3.13 — backend reads this for the tier badge) -----------
  /v1/inference/current-tier:
    get:
      tags: [inference]
      summary: Resolve the routed inference tier for a (provider, model)
      description: |
        Returns the derived tier (1-5) that a request would receive given the
        operator's gateway.yaml. The backend calls this to populate the tier
        badge in the chat UI per PRD §3.13. Unimplemented in M1 (lands in B4).
      parameters:
        - name: provider
          in: query
          required: true
          schema: {type: string}
        - name: model
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Tier resolved
          content:
            application/json:
              schema:
                type: object
                required: [routed_inference_tier, provider, model]
                properties:
                  routed_inference_tier: {type: integer, enum: [1,2,3,4,5]}
                  provider: {type: string}
                  model: {type: string}
                  explanation: {type: string, description: "human-readable rationale"}

  # ----------- ADMIN (PRD §4.5) -----------
  /admin/v1/providers/health:
    get:
      tags: [admin]
      summary: Per-provider health
      responses:
        '200':
          description: Provider statuses
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/ProviderStatus'}

  /admin/v1/usage:
    get:
      tags: [admin]
      summary: Per-key, per-model usage and cost
      parameters:
        - name: from
          in: query
          schema: {type: string, format: date-time}
        - name: to
          in: query
          schema: {type: string, format: date-time}
        - name: group_by
          in: query
          schema:
            type: string
            enum: [provider, model, tier, user, project]
      responses:
        '200':
          description: Usage summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_cost: {type: number}
                  total_tokens_in: {type: integer}
                  total_tokens_out: {type: integer}
                  groups:
                    type: array
                    items:
                      type: object
                      properties:
                        key: {type: string}
                        cost: {type: number}
                        tokens_in: {type: integer}
                        tokens_out: {type: integer}
                        request_count: {type: integer}

  /admin/v1/tier-config:
    get:
      tags: [admin]
      summary: Get current Inference Tier configuration
      description: |
        Returns the loaded tier_policy block from gateway.yaml — defaults,
        allowed tiers globally and per-group, warn / refuse settings.
      responses:
        '200':
          description: Tier configuration
          content:
            application/json:
              schema: {$ref: '#/components/schemas/InferenceTierConfig'}
    patch:
      tags: [admin]
      summary: Partial update to tier configuration
      description: |
        Admin-only. Audited. Updates take effect for new requests immediately.
        Partial-update semantics — fields omitted from the request body are
        left unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/InferenceTierConfig'}
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/InferenceTierConfig'}

  /admin/v1/anonymization-config:
    get:
      tags: [admin]
      summary: Get current anonymization configuration (M2)
      responses:
        '200':
          description: Anonymization configuration
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    patch:
      tags: [admin]
      summary: Partial update to anonymization configuration (M2)
      description: |
        Admin-only. Audited. Updates take effect for new requests immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated

  /admin/v1/config/reload:
    post:
      tags: [admin]
      summary: Reload gateway.yaml without restarting the service
      description: |
        Admin-only. Re-reads the config file from disk and atomically swaps
        in the new state. If the new config is invalid, the call fails with
        400 and the existing config is preserved.
      responses:
        '200':
          description: Reloaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers: {type: integer}
                  aliases: {type: integer}
                  reloaded_at: {type: string, format: date-time}
        '400':
          description: New config invalid; existing config preserved
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}

  # ----------- ADMIN: ALIAS CRUD (D0.5) -----------
  /admin/v1/config:
    get:
      tags: [admin]
      summary: Get the live gateway config (sanitized)
      description: |
        Returns the live ``GatewayConfig`` snapshot as JSON, with no
        secret material (the schema only carries env-var *names*; never
        values). Authenticated via ``X-LQ-AI-Gateway-Key``. The web UI
        consumes this to populate the provider dropdown when editing
        aliases.
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: Live config payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Missing or invalid X-LQ-AI-Gateway-Key
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}

  /admin/v1/aliases:
    get:
      tags: [admin]
      summary: List configured model aliases
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: Alias list
          content:
            application/json:
              schema:
                type: object
                required: [object, data]
                properties:
                  object: {type: string, enum: [list]}
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/AliasEntry'}
    post:
      tags: [admin]
      summary: Create a new model alias
      description: |
        D0.5. Atomic write to gateway.yaml (temp + rename) followed by
        in-process hot-reload. 409 if the alias name already exists.
        Only the aliased provider is required to be configured; the
        gateway validates the payload before writing.
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AliasCreateRequest'}
      responses:
        '201':
          description: Alias created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AliasEntry'}
        '409':
          description: Alias name already configured
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
        '422':
          description: Invalid payload (bad provider name, etc.)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}

  /admin/v1/aliases/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema: {type: string}
    get:
      tags: [admin]
      summary: Get a single alias
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: Alias detail (with primary_inference_tier annotation)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AliasEntry'}
        '404':
          description: Alias not configured
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
    patch:
      tags: [admin]
      summary: Update an existing alias
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AliasUpdateRequest'}
      responses:
        '200':
          description: Alias updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AliasEntry'}
        '404':
          description: Alias not configured
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
        '422':
          description: Invalid payload
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
    delete:
      tags: [admin]
      summary: Remove an alias
      security:
        - apiKeyAuth: []
      responses:
        '204':
          description: Alias removed
        '404':
          description: Alias not configured
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
        '409':
          description: Alias is referenced as a default and cannot be removed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}

components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-LQ-AI-Gateway-Key

  schemas:
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          description: |
            Model alias (``smart``, ``fast``, …), a raw
            ``<provider_name>/<native_model>`` form
            (``anthropic-prod/claude-haiku-4-5``) per D0, or a
            provider-native model name that any configured provider
            lists in its ``models``. Aliases dispatch through the
            full alias-resolution + fallback chain; raw forms skip
            the alias map and dispatch to a single target.
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role: {type: string, enum: [system, user, assistant, tool]}
              content: {type: string}
        max_tokens: {type: integer}
        temperature: {type: number, minimum: 0, maximum: 2}
        top_p: {type: number}
        stream: {type: boolean, default: false}
        # LQ.AI extensions
        minimum_inference_tier:
          type: integer
          enum: [1,2,3,4,5]
          description: |
            Refuse if the routed tier would be below this. Set by the
            backend per skill or project requirements.
        skill_name:
          type: string
          description: |
            Audit-log routing tag (B3-era). Does NOT by itself trigger
            skill prompt assembly — see `lq_ai_skills` for that. When
            `lq_ai_skills` is set and `skill_name` is not, the gateway
            populates this field with the first attached skill's name
            for audit consistency.
        chat_id:
          type: string
          format: uuid
          description: "For audit log correlation"
        anonymize:
          type: boolean
          default: true
          description: "Apply anonymization layer (M2; ignored before)"
        # C2 — skill prompt assembly (ADR 0007)
        lq_ai_skills:
          type: array
          items: {type: string}
          description: |
            Ordered list of skill names to attach to this request. The
            gateway fetches each from the backend's internal-skills
            endpoint, assembles the bodies (with reference files and
            input substitution applied), and prepends the result to
            the system message. Per ADR 0007.
        lq_ai_skill_inputs:
          type: object
          additionalProperties:
            type: object
            additionalProperties: true
          description: |
            Per-skill input bindings, keyed by skill name. Inner dict
            maps input variable names to values. Per-skill scoping so
            two attached skills with overlapping variable names don't
            collide. Required inputs that the skill's frontmatter
            declares but the bindings don't provide cause the gateway
            to refuse with `code=skill_input_missing` (HTTP 400).
        # C3 — chat / message identity for routing-log correlation.
        lq_ai_chat_id:
          type: string
          format: uuid
          description: |
            UUID of the persisted chat (Task C3). The gateway writes it
            into `inference_routing_log.chat_id`. Distinct from the
            pre-existing `chat_id` field (B3-era audit-log tag);
            `lq_ai_chat_id` takes precedence when both are present and
            is the canonical surface after C3.
        lq_ai_message_id:
          type: string
          format: uuid
          description: |
            UUID of the assistant message (Task C3). The backend
            generates it before dispatch and forwards it; the gateway
            writes it into `inference_routing_log.message_id` so the
            audit-log row joins to the persisted message row by `id`.

    ChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id: {type: string}
        object: {type: string, enum: [chat.completion]}
        created: {type: integer, description: "Unix timestamp"}
        model: {type: string}
        choices:
          type: array
          items:
            type: object
            properties:
              index: {type: integer}
              message:
                type: object
                properties:
                  role: {type: string, enum: [assistant]}
                  content: {type: string}
              finish_reason:
                type: string
                enum: [stop, length, content_filter, tool_calls]
        usage:
          type: object
          properties:
            prompt_tokens: {type: integer}
            completion_tokens: {type: integer}
            total_tokens: {type: integer}
        # LQ.AI extensions
        routed_inference_tier:
          type: integer
          enum: [1,2,3,4,5]
        routed_provider: {type: string}
        cost_estimate: {type: number}
        anonymization_applied: {type: boolean}
        lq_ai_applied_skills:
          type: array
          items: {type: string}
          nullable: true
          description: |
            Names of skills whose content was successfully assembled
            into the prompt for this request (C2 / ADR 0007). Null
            when no skills were attached. Backends surface this on
            the audit log so operators can see which skills shaped
            a given response.

    ModelEntry:
      type: object
      required: [id, object, created, owned_by, lq_ai_kind]
      properties:
        id:
          type: string
          description: |
            Either a configured alias (``smart``) or a raw
            ``<provider_name>/<native_model>`` form
            (``anthropic-prod/claude-haiku-4-5``,
            ``ollama-local/llama3.1:8b``). The latter form is sendable
            verbatim as ``model`` on ``POST /v1/chat/completions``.
        object: {type: string, enum: [model]}
        created:
          type: integer
          description: |
            Always ``0``. The gateway has no provider-relative creation
            timestamp; the field is included for OpenAI compatibility.
        owned_by:
          type: string
          description: |
            ``"lq-ai-gateway"`` for aliases; the configured provider
            name (e.g., ``"ollama-local"``) for provider-native rows.
        lq_ai_kind:
          type: string
          enum: [alias, provider_native]
          description: |
            ``"alias"`` for entries from ``model_aliases``;
            ``"provider_native"`` for live-discovered Ollama tags or
            Anthropic catalog entries.
        routed_inference_tier:
          type: integer
          enum: [1, 2, 3, 4, 5]
          description: |
            Tier the request would land at if dispatched at this id.
            Present on ``provider_native`` rows; omitted on aliases
            (the alias may resolve to different providers via fallback,
            so the tier is settled per-request, not per-alias).
        provider_type:
          type: string
          enum: [anthropic, openai, vertex, cohere, azure_openai, bedrock, ollama, vllm, openai_compatible]
          description: |
            For ``provider_native`` rows: the provider's ``type``
            (``anthropic``, ``ollama``, …). Lets clients group rows
            under user-friendly section headers.

    AliasFallback:
      type: object
      required: [provider, model]
      properties:
        provider: {type: string, minLength: 1}
        model: {type: string, minLength: 1}

    AliasEntry:
      type: object
      required: [name, provider, model, fallback]
      properties:
        name: {type: string, minLength: 1}
        provider: {type: string, minLength: 1}
        model: {type: string, minLength: 1}
        fallback:
          type: array
          items: {$ref: '#/components/schemas/AliasFallback'}
        primary_inference_tier:
          type: integer
          enum: [1, 2, 3, 4, 5]
          description: |
            Derived tier of the primary target. Present on the single-
            alias GET; omitted on list responses.

    AliasCreateRequest:
      type: object
      required: [name, provider, model]
      properties:
        name: {type: string, minLength: 1, maxLength: 64}
        provider: {type: string, minLength: 1}
        model: {type: string, minLength: 1}
        fallback:
          type: array
          items: {$ref: '#/components/schemas/AliasFallback'}

    AliasUpdateRequest:
      type: object
      required: [provider, model]
      properties:
        provider: {type: string, minLength: 1}
        model: {type: string, minLength: 1}
        fallback:
          type: array
          items: {$ref: '#/components/schemas/AliasFallback'}

    GatewayError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                Stable error codes the gateway emits. Tier-policy and
                routing codes (tier_below_minimum, tier_disallowed_globally,
                anonymization_failed) are documented in PRD §1.5.2 / §3.13;
                operational codes are emitted by the request pipeline before
                routing happens.
              enum:
                # Tier policy / routing (PRD §1.5.2, §3.13)
                - tier_below_minimum
                - tier_disallowed_globally
                - anonymization_failed
                - invalid_model
                # Provider / upstream
                - provider_unavailable
                - rate_limit_exceeded
                # Operational
                - invalid_request
                - not_implemented
                - unauthorized
                # Skill prompt assembly (C2)
                - skill_not_found
                - skill_fetch_failed
                - skill_input_missing
                # Admin alias-CRUD (D0.5)
                - not_found
                - conflict
                - internal_error
            message: {type: string}
            details: {type: object, additionalProperties: true}

    ProviderStatus:
      type: object
      required: [name, healthy]
      properties:
        name: {type: string}
        type:
          type: string
          enum: [anthropic, openai, vertex, cohere, azure_openai, bedrock, ollama, vllm, openai_compatible]
        healthy: {type: boolean}
        last_check_at: {type: string, format: date-time}
        models:
          type: array
          items: {type: string}
        tier: {type: integer, enum: [1,2,3,4,5]}

    InferenceTierConfig:
      type: object
      required: [providers, model_aliases, tier_assignments]
      properties:
        providers:
          type: array
          items:
            type: object
            required: [name, type, base_url, api_key_env]
            properties:
              name: {type: string}
              type:
                type: string
                enum: [anthropic, openai, vertex, cohere, azure_openai, bedrock, ollama, vllm, openai_compatible]
              base_url: {type: string}
              api_key_env: {type: string}
              tier: {type: integer, enum: [1,2,3,4,5]}
              models: {type: array, items: {type: string}}
        model_aliases:
          type: object
          additionalProperties:
            type: object
            required: [provider, model]
            properties:
              provider: {type: string}
              model: {type: string}
              tier: {type: integer, enum: [1,2,3,4,5]}
        tier_assignments:
          type: object
          description: "Override tier on a per-provider/per-model basis if needed"
          additionalProperties:
            type: integer
            enum: [1,2,3,4,5]
        allowed_tiers_global:
          type: array
          items: {type: integer, enum: [1,2,3,4,5]}

security:
  - apiKeyAuth: []
