openapi: 3.1.0
info:
  title: LQ.AI Inference Gateway
  version: 0.1.0
  description: |
    The Inference Gateway is the security boundary for outbound LLM requests.
    Every inference request — from the backend, from skills, from the Word
    Add-in's backend integration — passes through this service.
    
    The gateway exposes:
    1. An OpenAI-compatible chat-completions endpoint that backend services
       call (transparent to client code that already targets the OpenAI API).
    2. An OpenAI-compatible embeddings endpoint.
    3. Admin endpoints for tier configuration, provider configuration, cost.
    
    Pipeline (per PRD §4.3):
      Auth → Router → Rate Limit → Tier Derivation → Anonymization (M2)
        → Provider Adapter → Anonymization-post → Cost Tracker → Telemetry
    
    The gateway is NOT directly accessible to end users. End users interact
    with the backend; the backend calls the gateway. Direct gateway access
    is gated to admin operations and service-to-service traffic only.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8001
    description: Local development
  - url: http://gateway:8001
    description: Internal Docker-Compose network

tags:
  - name: inference
    description: OpenAI-compatible inference endpoints
  - name: admin
    description: Gateway configuration and operations
  - name: health
    description: Liveness and readiness probes

paths:

  # ----------- INFERENCE -----------
  /v1/chat/completions:
    post:
      tags: [inference]
      summary: OpenAI-compatible chat completions
      description: |
        Accepts requests in OpenAI Chat Completions format. The gateway:
        - Resolves the model alias (e.g., 'smart' → claude-opus-4-7)
        - Determines the routed inference tier
        - Refuses if below the request's minimum_inference_tier
        - Applies anonymization (if enabled, M2)
        - Routes to the appropriate provider
        - Tracks cost and telemetry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Completion (or stream)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ChatCompletionResponse'}
            text/event-stream:
              schema: {type: string, description: "SSE stream of OpenAI-format chunks"}
        '403':
          description: Refused — inference tier below request minimum, or provider not allowed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}

  /v1/embeddings:
    post:
      tags: [inference]
      summary: OpenAI-compatible embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, input]
              properties:
                model: {type: string}
                input:
                  oneOf:
                    - {type: string}
                    - {type: array, items: {type: string}}
      responses:
        '200':
          description: Embeddings
          content:
            application/json:
              schema:
                type: object
                required: [data, model, usage]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        embedding: {type: array, items: {type: number}}
                        index: {type: integer}
                  model: {type: string}
                  usage:
                    type: object
                    properties:
                      prompt_tokens: {type: integer}
                      total_tokens: {type: integer}

  # ----------- HEALTH (PRD §4.3 — liveness/readiness) -----------
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      description: |
        Returns 200 as soon as the process is serving requests. Independent of
        downstream provider reachability or gateway.yaml validity. Used by
        docker-compose / Kubernetes liveness probes.
      security: []
      responses:
        '200':
          description: Alive
          content:
            application/json:
              schema:
                type: object
                required: [status, service]
                properties:
                  status: {type: string, enum: [alive]}
                  service: {type: string}
                  version: {type: string}

  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      description: |
        Returns 200 once gateway.yaml has loaded and validated. Returns 503
        otherwise. Used to decide whether to route traffic.
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: {type: string, enum: [ready]}
                  providers: {type: integer, description: "configured provider count"}
                  aliases: {type: integer, description: "model alias count"}
        '503':
          description: Not ready (config not loaded or invalid)

  # ----------- TIER (PRD §3.13 — backend reads this for the tier badge) -----------
  /v1/inference/current-tier:
    get:
      tags: [inference]
      summary: Resolve the routed inference tier for a (provider, model)
      description: |
        Returns the derived tier (1-5) that a request would receive given the
        operator's gateway.yaml. The backend calls this to populate the tier
        badge in the chat UI per PRD §3.13. Unimplemented in M1 (lands in B4).
      parameters:
        - name: provider
          in: query
          required: true
          schema: {type: string}
        - name: model
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Tier resolved
          content:
            application/json:
              schema:
                type: object
                required: [routed_inference_tier, provider, model]
                properties:
                  routed_inference_tier: {type: integer, enum: [1,2,3,4,5]}
                  provider: {type: string}
                  model: {type: string}
                  explanation: {type: string, description: "human-readable rationale"}

  # ----------- ADMIN (PRD §4.5) -----------
  /admin/v1/providers/health:
    get:
      tags: [admin]
      summary: Per-provider health
      responses:
        '200':
          description: Provider statuses
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/ProviderStatus'}

  /admin/v1/usage:
    get:
      tags: [admin]
      summary: Per-key, per-model usage and cost
      parameters:
        - name: from
          in: query
          schema: {type: string, format: date-time}
        - name: to
          in: query
          schema: {type: string, format: date-time}
        - name: group_by
          in: query
          schema:
            type: string
            enum: [provider, model, tier, user, project]
      responses:
        '200':
          description: Usage summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_cost: {type: number}
                  total_tokens_in: {type: integer}
                  total_tokens_out: {type: integer}
                  groups:
                    type: array
                    items:
                      type: object
                      properties:
                        key: {type: string}
                        cost: {type: number}
                        tokens_in: {type: integer}
                        tokens_out: {type: integer}
                        request_count: {type: integer}

  /admin/v1/tier-config:
    get:
      tags: [admin]
      summary: Get current Inference Tier configuration
      description: |
        Returns the loaded tier_policy block from gateway.yaml — defaults,
        allowed tiers globally and per-group, warn / refuse settings.
      responses:
        '200':
          description: Tier configuration
          content:
            application/json:
              schema: {$ref: '#/components/schemas/InferenceTierConfig'}
    patch:
      tags: [admin]
      summary: Partial update to tier configuration
      description: |
        Admin-only. Audited. Updates take effect for new requests immediately.
        Partial-update semantics — fields omitted from the request body are
        left unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/InferenceTierConfig'}
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/InferenceTierConfig'}

  /admin/v1/anonymization-config:
    get:
      tags: [admin]
      summary: Get current anonymization configuration (M2)
      responses:
        '200':
          description: Anonymization configuration
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    patch:
      tags: [admin]
      summary: Partial update to anonymization configuration (M2)
      description: |
        Admin-only. Audited. Updates take effect for new requests immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated

  /admin/v1/config/reload:
    post:
      tags: [admin]
      summary: Reload gateway.yaml without restarting the service
      description: |
        Admin-only. Re-reads the config file from disk and atomically swaps
        in the new state. If the new config is invalid, the call fails with
        400 and the existing config is preserved.
      responses:
        '200':
          description: Reloaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers: {type: integer}
                  aliases: {type: integer}
                  reloaded_at: {type: string, format: date-time}
        '400':
          description: New config invalid; existing config preserved
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GatewayError'}

components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-LQ-AI-Gateway-Key

  schemas:
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model: {type: string, description: "Model alias or specific model name"}
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role: {type: string, enum: [system, user, assistant, tool]}
              content: {type: string}
        max_tokens: {type: integer}
        temperature: {type: number, minimum: 0, maximum: 2}
        top_p: {type: number}
        stream: {type: boolean, default: false}
        # LQ.AI extensions
        minimum_inference_tier:
          type: integer
          enum: [1,2,3,4,5]
          description: |
            Refuse if the routed tier would be below this. Set by the
            backend per skill or project requirements.
        skill_name:
          type: string
          description: "For audit log routing; not used by inference"
        chat_id:
          type: string
          format: uuid
          description: "For audit log correlation"
        anonymize:
          type: boolean
          default: true
          description: "Apply anonymization layer (M2; ignored before)"

    ChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id: {type: string}
        object: {type: string, enum: [chat.completion]}
        created: {type: integer, description: "Unix timestamp"}
        model: {type: string}
        choices:
          type: array
          items:
            type: object
            properties:
              index: {type: integer}
              message:
                type: object
                properties:
                  role: {type: string, enum: [assistant]}
                  content: {type: string}
              finish_reason:
                type: string
                enum: [stop, length, content_filter, tool_calls]
        usage:
          type: object
          properties:
            prompt_tokens: {type: integer}
            completion_tokens: {type: integer}
            total_tokens: {type: integer}
        # LQ.AI extensions
        routed_inference_tier:
          type: integer
          enum: [1,2,3,4,5]
        routed_provider: {type: string}
        cost_estimate: {type: number}
        anonymization_applied: {type: boolean}

    GatewayError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                Stable error codes the gateway emits. Tier-policy and
                routing codes (tier_below_minimum, tier_disallowed_globally,
                anonymization_failed) are documented in PRD §1.5.2 / §3.13;
                operational codes are emitted by the request pipeline before
                routing happens.
              enum:
                # Tier policy / routing (PRD §1.5.2, §3.13)
                - tier_below_minimum
                - tier_disallowed_globally
                - anonymization_failed
                - invalid_model
                # Provider / upstream
                - provider_unavailable
                - rate_limit_exceeded
                # Operational
                - invalid_request
                - not_implemented
                - unauthorized
            message: {type: string}
            details: {type: object, additionalProperties: true}

    ProviderStatus:
      type: object
      required: [name, healthy]
      properties:
        name: {type: string}
        type:
          type: string
          enum: [anthropic, openai, vertex, cohere, azure_openai, bedrock, ollama, vllm, openai_compatible]
        healthy: {type: boolean}
        last_check_at: {type: string, format: date-time}
        models:
          type: array
          items: {type: string}
        tier: {type: integer, enum: [1,2,3,4,5]}

    InferenceTierConfig:
      type: object
      required: [providers, model_aliases, tier_assignments]
      properties:
        providers:
          type: array
          items:
            type: object
            required: [name, type, base_url, api_key_env]
            properties:
              name: {type: string}
              type:
                type: string
                enum: [anthropic, openai, vertex, cohere, azure_openai, bedrock, ollama, vllm, openai_compatible]
              base_url: {type: string}
              api_key_env: {type: string}
              tier: {type: integer, enum: [1,2,3,4,5]}
              models: {type: array, items: {type: string}}
        model_aliases:
          type: object
          additionalProperties:
            type: object
            required: [provider, model]
            properties:
              provider: {type: string}
              model: {type: string}
              tier: {type: integer, enum: [1,2,3,4,5]}
        tier_assignments:
          type: object
          description: "Override tier on a per-provider/per-model basis if needed"
          additionalProperties:
            type: integer
            enum: [1,2,3,4,5]
        allowed_tiers_global:
          type: array
          items: {type: integer, enum: [1,2,3,4,5]}

security:
  - apiKeyAuth: []
