openapi: 3.1.0
info:
  title: LQ.AI Backend API
  version: 0.1.0
  description: |
    Canonical API specification for the LQ.AI backend (FastAPI service).
    
    This is a **sketch** — it covers the endpoints, request/response shapes, and
    schemas needed to anchor implementation. Expect refinement during M1 build.
    
    The Inference Gateway has a separate OpenAPI specification at
    `gateway-openapi.yaml` (consumes OpenAI-compatible inference requests from
    this backend; not directly accessible to end-users).
    
    Conventions:
    - All endpoints under `/api/` are user-facing; under `/admin/` require admin role.
    - Authentication via Bearer JWT in `Authorization` header unless noted.
    - All resource IDs are UUIDs.
    - All timestamps are ISO 8601 with timezone (UTC by default).
    - Pagination uses cursor-based pagination via `cursor` and `limit` query params.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: LQ.AI
    url: https://github.com/legalquants/lq-ai

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://{operator-host}/api
    description: Operator-deployed instance

tags:
  - name: auth
    description: Authentication and session management
  - name: users
    description: User account operations (self-service and admin)
  - name: projects
    description: Matter-scoped containers (chats, files, skills, context)
  - name: chats
    description: Conversation threads with message history
  - name: messages
    description: Individual messages within a chat (POST creates new exchange)
  - name: skills
    description: Skill library (read, attach, fork)
  - name: files
    description: File upload and management
  - name: knowledge-bases
    description: Persistent file collections with hybrid retrieval
  - name: organization-profile
    description: Singleton org-level skill capturing voice, jurisdiction, etc.
  - name: saved-prompts
    description: Per-user saved prompt fragments
  - name: user-skills
    description: Per-user DB-backed skills (D8) — owned CRUD that shadows built-ins per ADR 0012
  - name: teams
    description: Operator-admin-controlled teams (D8.1a) — D8.1b will gate team-scope user-skills mutate on team-admin role
  - name: audit-log
    description: Audit log query (admin only)
  - name: tier-policy
    description: Inference tier policy configuration (admin only)
  - name: word-addin
    description: Word add-in unauthenticated handshake surfaces (M3-B8)
  - name: autonomous
    description: Per-user autonomous agent session management — read, halt (M4-A4-i)

# ============================================================
# PATHS
# ============================================================
paths:

  # ----------- AUTH -----------
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Authenticate with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
        '423':
          description: MFA required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaChallenge'

  /api/v1/auth/mfa/verify:
    post:
      tags: [auth]
      summary: Complete MFA challenge with TOTP code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfa_token, code]
              properties:
                mfa_token: {type: string, description: "Token from the MFA challenge response"}
                code: {type: string, pattern: '^\d{6}$'}
      responses:
        '200':
          description: MFA verification successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid MFA code

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token using refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: {type: string}
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Invalidate the current refresh token
      responses:
        '204': {description: Logout successful}

  /api/v1/auth/mfa/setup:
    post:
      tags: [auth]
      summary: Enroll in TOTP-based MFA
      description: |
        Bearer-authenticated. Issues a fresh TOTP secret, provisioning
        URI, and 10 single-use recovery codes. Persists the secret +
        bcrypt-hashed codes on the user, but does NOT enable MFA — the
        user must subsequently prove possession by submitting a TOTP
        code to `/auth/mfa/enable`. Re-running setup before enable
        overwrites the pending secret + codes; re-running after MFA is
        already enabled is a 409 (`mfa_already_enabled`).
      responses:
        '200':
          description: TOTP enrollment data (provisioning URI + recovery codes)
          content:
            application/json:
              schema:
                type: object
                required: [secret, provisioning_uri, recovery_codes]
                properties:
                  secret: {type: string}
                  provisioning_uri: {type: string, description: "otpauth:// URI for QR code"}
                  recovery_codes: {type: array, items: {type: string}}
        '409':
          description: MFA is already enabled (call `/auth/mfa/disable` first)

  /api/v1/auth/mfa/enable:
    post:
      tags: [auth]
      summary: Confirm TOTP enrollment with a verification code
      description: |
        Bearer-authenticated. Verifies a 6-digit TOTP code against the
        pending secret stored by `/auth/mfa/setup`. On success flips
        `users.mfa_enabled` to TRUE; subsequent logins for this user
        return 423 + `MfaChallenge`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: {type: string, pattern: '^\d{6}$'}
      responses:
        '204': {description: MFA enabled}
        '400': {description: Setup not started or code invalid}
        '409': {description: MFA is already enabled}

  /api/v1/auth/mfa/disable:
    post:
      tags: [auth]
      summary: Disable MFA after re-proving password and a current MFA code
      description: |
        Bearer-authenticated. Requires both the user's current password
        AND a current TOTP code (or a single-use recovery code). On
        success clears the TOTP secret, recovery codes, and the
        `mfa_enabled` flag. Wrong-password and wrong-code branches both
        return 401 — the response shape does not reveal which leg
        failed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, code]
              properties:
                password: {type: string}
                code: {type: string}
      responses:
        '204': {description: MFA disabled}
        '400': {description: MFA is not enabled}
        '401': {description: Invalid credentials or MFA code}

  /api/v1/auth/change-password:
    post:
      tags: [auth]
      summary: Change the calling user's password
      description: |
        Bearer-authenticated. Verifies the current password before
        accepting a new one (defense against a stolen access token).
        Clears `must_change_password` if it was set (used by the
        first-run admin flow per Task B2). Revokes all active sessions
        for the user; the caller must re-authenticate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204': {description: Password changed successfully}
        '400': {description: New password fails policy (too short, identical to current)}
        '401': {description: Bearer token invalid or current_password is wrong}
        '403':
          description: |
            Reserved by the must-change-password gate elsewhere; the
            change-password endpoint itself is reachable while the gate
            is active.

  # ----------- USERS -----------
  /api/v1/users/me:
    get:
      tags: [users]
      summary: Get current user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    patch:
      tags: [users]
      summary: Update the caller's own profile (display_name)
      description: |
        Bearer-authenticated. Caller-scoped — updates only the
        authenticated user's own row; no user id is accepted from the
        path or body. Currently edits `display_name` only: the value is
        trimmed, must be non-empty after trimming, and is length-capped
        (200 chars). Omitting `display_name` (or sending an empty body)
        is a 422 — there is nothing to update. Writes a
        `user.profile_updated` audit row listing the changed fields and
        returns the updated `User` (same shape as `GET /users/me`).

        Email self-service editing is intentionally out of scope on this
        surface — changing the login email pulls in re-verification, MFA,
        and uniqueness concerns and warrants its own dedicated flow (a
        future enhancement).
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserProfileUpdate'}
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422': {description: Validation error (empty/whitespace/over-length display_name, or no fields to update)}

  /api/v1/users/me/export:
    post:
      tags: [users]
      summary: Request a per-user data export (GDPR Article 20)
      description: |
        Bearer-authenticated. Inserts a `user_export_jobs` row with
        status `queued` and enqueues the worker job that builds +
        uploads the ZIP. Returns 202 immediately — clients poll the
        per-job endpoint below for completion.
      responses:
        '202':
          description: Export job queued
          content:
            application/json:
              schema:
                type: object
                required: [job_id, status]
                properties:
                  job_id: {type: string, format: uuid}
                  status: {type: string, enum: [queued, processing, completed, failed]}
                  download_url: {type: string, nullable: true}

  /api/v1/users/me/export/{job_id}:
    get:
      tags: [users]
      summary: Poll a user-export job's status
      description: |
        Bearer-authenticated. Returns the current status of the export
        job. When `status=completed` and the bundle has not yet expired,
        `download_url` is a presigned MinIO URL valid for 24 hours. A
        404 covers both "no such job" and "job belongs to another user"
        (does not leak existence cross-user).
      parameters:
        - name: job_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                type: object
                required: [job_id, status]
                properties:
                  job_id: {type: string, format: uuid}
                  status: {type: string, enum: [queued, processing, completed, failed]}
                  download_url: {type: string, nullable: true}
        '404': {description: Job not found}

  /api/v1/users/me/delete:
    post:
      tags: [users]
      summary: Request account deletion (GDPR Article 17)
      description: |
        Bearer-authenticated. Soft-schedules deletion: sets
        `users.deletion_scheduled_at = now() + gdpr_grace_period_days`,
        revokes all active sessions, and audit-logs the request. Login
        during the grace period is preserved so the user can call the
        cancel endpoint. Hard delete itself runs daily via a worker
        cron. Idempotent: re-calling returns the existing schedule
        rather than pushing it back.
      responses:
        '202':
          description: Deletion queued
          content:
            application/json:
              schema:
                type: object
                required: [scheduled_deletion_at, grace_period_days]
                properties:
                  scheduled_deletion_at: {type: string, format: date-time}
                  grace_period_days: {type: integer}

  /api/v1/users/me/delete/cancel:
    post:
      tags: [users]
      summary: Cancel a pending account deletion
      description: |
        Bearer-authenticated. Clears `deletion_scheduled_at` if a
        pending deletion exists; returns 400 if there is no pending
        deletion to cancel. Only valid during the grace-period window —
        once the hard-delete worker has run, there is no user row to
        recover.
      responses:
        '204': {description: Pending deletion cancelled}
        '400': {description: No pending deletion to cancel}

  /api/v1/users/me/preferences:
    get:
      tags: [users]
      summary: Read the caller's preferences (Wave A — PRD §3.2)
      description: |
        Returns the preferences slice of the user profile. The same
        fields appear on ``GET /users/me``; this dedicated endpoint
        exists so frontends can subscribe to preferences changes
        without re-fetching the whole user object.
      responses:
        '200':
          description: Preferences snapshot
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserPreferences'}
    patch:
      tags: [users]
      summary: Update the caller's preferences (partial)
      description: |
        Only the fields the user supplies move. An idempotent PATCH
        (same value re-supplied) returns 200 without writing an audit
        row, matching the user_skills / saved_prompts pattern. Real
        changes write a ``user.preferences_updated`` audit row with
        before/after values in details.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserPreferencesUpdate'}
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserPreferences'}

  # ----------- ENHANCE PROMPT (PRD §3.2 — Wave A) -----------
  /api/v1/enhance-prompt:
    post:
      tags: [enhance-prompt]
      summary: Expand a short prompt into a structured legal prompt
      description: |
        Invokes the ``enhance-prompt`` skill against the gateway (with
        ``lq_ai_skills=['enhance-prompt']`` so user/team-scope
        shadows of the skill are honored per the D8.1b resolver).
        Returns the structured expansion the SKILL.md output schema
        produces — ``expansion_applied`` + ``expanded_prompt`` +
        ``reasoning`` + ``skip_reason`` + ``preview_to_user`` — plus
        an ``interaction_id`` the frontend uses to PATCH ``used`` /
        ``edited_before_use`` after the user acts on the preview.

        Defaults to the ``fast`` model alias (cheaper/smaller than
        ``smart`` per the spec's "smaller/cheaper model" guidance);
        ``model`` on the body overrides per-request.

        When the model produces malformed structured output, the
        response carries ``expansion_applied=false`` +
        ``skip_reason='parse_error'`` rather than 500 — the frontend
        falls back to submitting the original prompt.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EnhancePromptRequest'}
      responses:
        '200':
          description: Expansion (or a structured skip decision)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EnhancePromptResponse'}
        '502':
          description: Gateway / provider failure during enhancement
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/enhance-prompt/{interaction_id}:
    parameters:
      - name: interaction_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    patch:
      tags: [enhance-prompt]
      summary: Record what the user did with the enhancement preview
      description: |
        Updates ``used`` and ``edited_before_use`` for telemetry.
        Owner-only (404 if the row belongs to another user — same
        id-probing posture as user_skills + chats). Idempotent: a
        no-op PATCH returns 200 without writing.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EnhancePromptOutcomeUpdate'}
      responses:
        '200':
          description: Updated interaction
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EnhancePromptResponse'}
        '404':
          description: Interaction not found OR not owned by the caller.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  # ----------- PROJECTS -----------
  /api/v1/projects:
    get:
      tags: [projects]
      summary: List the caller's projects
      description: |
        Returns the caller's active projects by default. ``archived=true``
        returns archived projects only; ``archived=false`` is equivalent
        to omitting the parameter (active only). Per-user isolation:
        only the caller's own projects are returned.
      parameters:
        - name: archived
          in: query
          required: false
          schema: {type: boolean}
          description: "When true, return only archived projects."
      responses:
        '200':
          description: List of projects (active or archived per the filter).
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/Project'}
    post:
      tags: [projects]
      summary: Create a project
      description: |
        Creates a project owned by the caller. ``slug`` is generated
        from ``name`` if omitted; collisions with the caller's existing
        active projects resolve with a numeric suffix (``-2``, ``-3``,
        ...). Setting ``privileged=true`` requires
        ``minimum_inference_tier`` to be set; missing-tier returns 422.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreate'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '409':
          description: Slug collision under concurrent create
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '422':
          description: Schema validation failure (e.g., privileged-without-tier)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/projects/{project_id}:
    parameters:
      - name: project_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [projects]
      summary: Fetch a single project
      description: |
        Returns the canonical ``Project`` shape with ``attached_file_ids``
        and ``attached_skill_names`` populated from the join tables.
        Archived projects are visible via direct GET so the client can
        render an archived-detail page; the list endpoint excludes them
        by default.
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Project'}
        '404':
          description: Not found (or owned by another user)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    patch:
      tags: [projects]
      summary: Partial update of a project
      description: |
        Applies only the fields the caller sets. The
        ``privileged``↔``minimum_inference_tier`` rule is re-checked
        against the *merged* state — setting either alone in a way that
        would leave the project privileged-but-tierless returns 400.
        ``archived: true`` archives the project (equivalent to DELETE);
        ``archived: false`` unarchives it.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ProjectUpdate'}
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Project'}
        '400':
          description: Cross-field rule violation (e.g., privileged-without-tier)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: Not found (or owned by another user)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    delete:
      tags: [projects]
      summary: Soft-delete (archive) a project
      description: |
        Sets ``archived_at`` on the row. Hard-delete is owned by D6.
        Idempotent: a second DELETE on an already-archived project
        returns 404.
      responses:
        '204': {description: Project archived}
        '404':
          description: Not found, or already archived
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/projects/{project_id}/skills:
    parameters:
      - name: project_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    post:
      tags: [projects]
      summary: Attach a skill to the project
      description: |
        Attaches a registry-known skill to the project by name. The
        skill must exist in the in-memory skill registry (C1); unknown
        names return 404. Re-attaching an already-attached skill
        returns 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skill_name]
              properties:
                skill_name: {type: string, minLength: 1, maxLength: 200}
      responses:
        '204': {description: Attached}
        '404':
          description: Project or skill not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '409':
          description: Skill already attached
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/projects/{project_id}/skills/{skill_name}:
    parameters:
      - name: project_id
        in: path
        required: true
        schema: {type: string, format: uuid}
      - name: skill_name
        in: path
        required: true
        schema: {type: string}
    delete:
      tags: [projects]
      summary: Detach a skill from the project
      description: |
        Removes the project↔skill join row. The skill itself is
        registry-canonical and untouched. Detaching a skill that is
        not attached returns 404 (idempotency-violating; clients
        should treat 204 and 404 as terminal success states).
      responses:
        '204': {description: Detached}
        '404':
          description: Project or attachment not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/projects/{project_id}/files:
    parameters:
      - name: project_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    post:
      tags: [projects]
      summary: Attach an uploaded file to the project
      description: |
        Attaches an uploaded file to the project. The caller must own
        both the project and the file (cross-user → 404 on either).
        Re-attaching an already-attached file returns 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_id]
              properties:
                file_id: {type: string, format: uuid}
      responses:
        '204': {description: Attached}
        '404':
          description: Project or file not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '409':
          description: File already attached
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/projects/{project_id}/files/{file_id}:
    parameters:
      - name: project_id
        in: path
        required: true
        schema: {type: string, format: uuid}
      - name: file_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    delete:
      tags: [projects]
      summary: Detach a file from the project
      description: |
        Removes the project↔file join row. The file row itself is
        untouched (use ``DELETE /api/v1/files/{file_id}`` to soft-
        delete the file). Detaching a file that is not attached
        returns 404.
      responses:
        '204': {description: Detached}
        '404':
          description: Project or attachment not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  # ----------- PROJECTS SANDBOX (Wave D.2 Task 2.2) -----------
  /api/v1/projects/sandbox/ensure:
    post:
      tags: [projects]
      summary: Find or create the caller's try-it sandbox matter (Wave D.2)
      description: |
        Idempotent find-or-create for the per-user *try-it sandbox*
        project. The sandbox is a system-managed matter (slug
        ``__sandbox__``, ``is_sandbox=true``) used to scope skill try-it
        conversations that should not count toward billable matter
        activity.

        * First call returns 201 with a fresh row.
        * Subsequent calls return 200 with the same row.
        * If the sandbox was previously soft-deleted, the next ensure
          call recreates it (returns 201).

        Concurrent callers are safe: the ``ON CONFLICT DO NOTHING`` path
        ensures only one row is ever created per owner.
      responses:
        '200':
          description: Existing sandbox (already existed)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Project'}
        '201':
          description: Sandbox created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Project'}

  # ----------- CHATS -----------
  /api/v1/chats/search:
    get:
      tags: [chats]
      summary: Full-text search across chats + messages (PRD §1.7)
      description: |
        Wave B. Postgres ``websearch_to_tsquery`` against the
        ``chats.title_tsv`` + ``messages.content_tsv`` generated
        columns (migration 0016). Owner-scoped; archived chats are
        excluded. Returns ranked hits with a ``ts_headline`` snippet
        of the matching message (or the title itself for title hits).
      parameters:
        - name: q
          in: query
          required: true
          schema: {type: string, minLength: 1, maxLength: 500}
        - name: limit
          in: query
          schema: {type: integer, default: 20, minimum: 1, maximum: 100}
      responses:
        '200':
          description: Ranked search hits
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ChatSearchResponse'}

  /api/v1/chats:
    get:
      tags: [chats]
      summary: List the caller's chats (cursor-paginated)
      parameters:
        - name: project_id
          in: query
          schema: {type: string, format: uuid}
          description: "Filter to chats inside a specific project."
        - name: archived
          in: query
          schema: {type: boolean}
          description: "When true, return archived chats only. Default excludes archived."
        - name: cursor
          in: query
          schema: {type: string}
          description: "Opaque cursor from a previous page's `next_cursor`."
        - name: limit
          in: query
          schema: {type: integer, default: 20, minimum: 1, maximum: 100}
      responses:
        '200':
          description: Paginated chats
          content:
            application/json:
              schema:
                type: object
                required: [items, next_cursor]
                properties:
                  items:
                    type: array
                    items: {$ref: '#/components/schemas/Chat'}
                  next_cursor: {type: string, nullable: true}
    post:
      tags: [chats]
      summary: Create a new chat
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ChatCreate'}
      responses:
        '201':
          description: Chat created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Chat'}

  /api/v1/chats/{chat_id}:
    parameters:
      - name: chat_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [chats]
      summary: Fetch a single chat (archived rows are visible)
      responses:
        '200':
          description: Chat
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Chat'}
        '404':
          description: Chat does not exist or is owned by a different user
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    patch:
      tags: [chats]
      summary: Partial update of a chat (title or archived flag)
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ChatUpdate'}
      responses:
        '200':
          description: Chat updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Chat'}
        '404':
          description: Chat does not exist or is owned by a different user
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    delete:
      tags: [chats]
      summary: Soft-delete the chat (sets `archived_at`)
      responses:
        '204': {description: Chat archived}
        '404':
          description: Chat already archived or does not exist
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/chats/{chat_id}/messages:
    parameters:
      - name: chat_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [messages]
      summary: List messages in chat (cursor-paginated, oldest-first)
      parameters:
        - name: cursor
          in: query
          schema: {type: string}
          description: "Opaque cursor from a previous page's `next_cursor`."
        - name: limit
          in: query
          schema: {type: integer, default: 20, minimum: 1, maximum: 100}
      responses:
        '200':
          description: Paginated messages
          content:
            application/json:
              schema:
                type: object
                required: [items, next_cursor]
                properties:
                  items:
                    type: array
                    items: {$ref: '#/components/schemas/Message'}
                  next_cursor: {type: string, nullable: true}
    post:
      tags: [messages]
      summary: Post a user message and get the model response
      description: |
        Posts a user message and returns the assistant response. The
        request's `stream` field selects between two response shapes:

        * `stream: false` (default) → JSON response with the persisted
          assistant message, the routed Inference Tier, and routing
          metadata.
        * `stream: true` → Server-Sent Events stream:
            1. The opening `start` frame carries `lq_ai_message_id`
               (the persisted assistant message id) so clients can
               poll the row later.
            2. Each `delta` frame carries `lq_ai_message_id`,
               `routed_inference_tier`, and `applied_skills` per
               ADR 0007.
            3. The terminal `complete` frame (success) or `Error`
               envelope (mid-stream failure) precedes the OpenAI-style
               `data: [DONE]` line.

        **C3 persistence.** The backend writes the user message row
        first (unconditionally), generates the assistant message UUID,
        forwards it to the gateway as `lq_ai_message_id` so the
        gateway's `inference_routing_log` row carries the same id, and
        persists the assistant row at end-of-stream (or end of the
        non-streaming response). On streaming failure the assistant
        row is persisted with whatever content was received and
        `error_code` populated for audit.

        Citations are an empty array until M2's citation engine ships.

        The response also surfaces the routed Inference Tier in the
        `X-LQ-AI-Routed-Inference-Tier` HTTP header (header-only
        consumers don't need to parse the body).
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/MessageCreate'}
      responses:
        '200':
          description: Either a JSON response or an SSE stream depending on `stream`
          content:
            application/json:
              schema: {$ref: '#/components/schemas/MessagePostResponse'}
            text/event-stream:
              schema: {$ref: '#/components/schemas/MessageStreamEvent'}
          headers:
            X-LQ-AI-Routed-Inference-Tier:
              schema: {type: integer, enum: [1,2,3,4,5]}
              description: "Routed Inference Tier — duplicates the body field for header-only consumers"
            X-LQ-AI-Routed-Provider:
              schema: {type: string}
              description: "Provider that handled the request (set by gateway)"
        '400':
          description: Invalid request (bad chat_id, empty content, malformed body)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '403':
          description: Forced password change required (B2 gate) or tier-floor refusal (D1)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '502':
          description: Gateway returned an upstream error (provider_unavailable, etc.)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '503':
          description: Gateway unreachable (network failure or 5xx)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '504':
          description: Gateway request timed out
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/chats/{chat_id}/messages/{message_id}/citations:
    parameters:
      - name: chat_id
        in: path
        required: true
        schema: {type: string, format: uuid}
      - name: message_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [messages]
      summary: Get citations for a message (resolves to source documents)
      responses:
        '200':
          description: Citations
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/Citation'}

  # ----------- SKILLS -----------
  /api/v1/skills:
    get:
      tags: [skills]
      summary: List available skills
      parameters:
        - name: scope
          in: query
          schema: {type: string, enum: [builtin, user, team, all], default: all}
        - name: tag
          in: query
          schema: {type: string}
      responses:
        '200':
          description: Skills
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/SkillSummary'}

  /api/v1/skills/{skill_name}:
    parameters:
      - name: skill_name
        in: path
        required: true
        schema: {type: string}
    get:
      tags: [skills]
      summary: Get skill details (frontmatter + body + reference files)
      responses:
        '200':
          description: Skill
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Skill'}
        '404':
          description: No skill with that name is in the registry.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/skills/{skill_name}/contents:
    parameters:
      - name: skill_name
        in: path
        required: true
        schema: {type: string}
    get:
      tags: [skills]
      summary: Full skill contents for the skill inspector (PRD §3.4 — Wave A)
      description: |
        Returns the same payload shape as ``GET /skills/{skill_name}``
        (SKILL.md frontmatter + body + reference + example files). The
        dedicated URL exists because PRD §3.4 names it explicitly as
        the contract behind the "view this skill" affordance + the
        skill inspector side panel. Applies the D8.1b resolution stack
        (user > team > built-in).
      responses:
        '200':
          description: Skill (same shape as the base GET)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Skill'}
        '404':
          description: No skill with that name resolves for the caller.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/skills/{skill_name}/inputs:
    parameters:
      - name: skill_name
        in: path
        required: true
        schema: {type: string}
    get:
      tags: [skills]
      summary: Declared inputs (form schema) for the skill (PRD §3.4 — Wave A)
      description: |
        The PRD §3.4 skill-input-form pattern: skills declare inputs
        in their frontmatter so the UI can render a structured form
        rather than letting the model ask for missing context
        conversationally. The endpoint resolves user > team > built-in
        and looks for the inputs block at either the top of the
        frontmatter (formal-guide shape) or under ``lq_ai.inputs``
        (corpus reality for skills like enhance-prompt). Returns a
        name-only stub when the skill declares no inputs.
      responses:
        '200':
          description: Inputs (required + optional)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SkillInputs'}
        '404':
          description: No skill with that name resolves for the caller.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/skills/{skill_name}/fork:
    parameters:
      - name: skill_name
        in: path
        required: true
        schema: {type: string}
    post:
      tags: [skills]
      summary: Fork a built-in skill into the caller's user scope (D8)
      description: |
        Copies the built-in's resolved frontmatter and body into a new
        ``user_skills`` row owned by the caller (ADR 0012). The request
        body's ``new_name`` becomes the new row's slug (omitted →
        defaults to the source slug, which produces a same-slug shadow);
        ``scope`` MUST be ``user`` in D8 — ``team`` is reserved for
        D8.1 and returns 400.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                new_name: {type: string, description: New slug for the user-scope row}
                scope: {type: string, enum: [user, team], default: user}
      responses:
        '201':
          description: Fork created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Skill'}
        '400':
          description: ``scope=team`` requested (deferred to D8.1).
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '409':
          description: A user-scope skill with that slug already exists for this user.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  # ----------- SKILLS AUTOCOMPLETE (Wave D.2 Task 2.5) -----------
  /api/v1/skills/autocomplete:
    get:
      tags: [skills]
      summary: Typeahead for the chat composer's skill picker (Wave D.2)
      description: |
        Two modes based on the ``q`` query parameter:

        * **Empty ``q``** — returns the caller's most-recently-used skills
          (by ``messages.applied_skills``), filled out alphabetically to
          ``limit`` when recents are fewer than ``limit``.
        * **Non-empty ``q``** — ranks the merged catalog by three signals
          (slash-alias prefix > slug prefix > title substring) and returns
          up to ``limit`` non-zero matches.

        Shadowing: a user-scope row at the same slug as a built-in hides
        the built-in (ADR 0012). ``scope`` on each result distinguishes
        user shadows from built-ins.

        ``limit`` is hard-clamped at 25 — a request for ``limit=50``
        returns 422 rather than silently truncating.
      parameters:
        - name: q
          in: query
          required: false
          schema: {type: string, default: ''}
          description: Substring to match. Empty returns recents.
        - name: limit
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 25, default: 10}
      responses:
        '200':
          description: Autocomplete results (may be empty)
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required: [slug, title, scope]
                      properties:
                        slug: {type: string}
                        slash_alias: {type: string, nullable: true}
                        title: {type: string}
                        description: {type: string, nullable: true}
                        scope: {type: string, enum: [builtin, user, team]}
                        icon: {type: string, nullable: true}
        '422':
          description: limit out of range (must be 1–25).

  # ----------- USER SKILLS (D8 — DB-backed CRUD per ADR 0012) -----------
  /api/v1/user-skills:
    get:
      tags: [user-skills]
      summary: List the caller's editable skills (user-scope by default; ?scope=team|all)
      description: |
        Returns the rich ``UserSkill`` view (body + frontmatter_extra
        included) for the management UI. The picker-side merge view
        lives at ``GET /api/v1/skills?scope=all`` (summary shape).

        Scope filter (D8.1c — default ``user`` for back-compat):

        * ``user`` — caller's user-scope rows only.
        * ``team`` — team-scope rows from teams where the caller is a
          team-admin. (Non-admin members read team skills in the picker,
          not here, since they can't mutate.)
        * ``all`` — both layers merged + sorted by ``updated_at DESC``.
      parameters:
        - name: scope
          in: query
          required: false
          schema: {type: string, enum: [user, team, all], default: user}
      responses:
        '200':
          description: List of editable skill rows for the caller
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/UserSkill'}
    post:
      tags: [user-skills]
      summary: Create a user- or team-scope skill (D8 + D8.1b)
      description: |
        Creates a new skill row. Scope branches (per ADR 0012 + D8.1b):

        * ``scope='user'`` (default) — owned by the caller. Slug
          collision with the caller's existing non-archived rows
          returns 409. Collision with a filesystem built-in is
          **allowed** — the deliberate shadow case; the user's row
          wins for their chats.
        * ``scope='team'`` — owned by ``owner_team_id``. Caller must
          be a team-admin of that team or 404 (id-probing-safe).
          Slug collision within the team's non-archived rows returns
          409. The D8.1b resolver picks user > team > built-in.

        422 fires when ``scope`` and ``owner_team_id`` are inconsistent.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserSkillCreate'}
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserSkill'}
        '404':
          description: Team referenced by owner_team_id does not exist OR caller is not a team-admin (id-probing-safe).
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '409':
          description: Slug collides with the caller's user-scope rows OR the named team's team-scope rows.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '422':
          description: scope/owner_team_id combination is invalid (team missing team id, or user carrying team id).
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  # ----------- TEAMS (D8.1a — operator-admin-controlled) -----------
  /api/v1/teams:
    get:
      tags: [teams]
      summary: List teams the caller belongs to (newest first)
      description: |
        Each row carries ``caller_role`` (admin | member) so the UI can
        render mutate affordances without a second round-trip. The
        optional ``?role=`` filter (D8.1c) restricts to a specific
        role — the team-scope skill creation picker uses
        ``?role=admin``.
      parameters:
        - name: role
          in: query
          required: false
          schema: {type: string, enum: [admin, member]}
      responses:
        '200':
          description: Caller's teams (with caller_role populated)
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/TeamSummary'}

  /api/v1/teams/{team_id}:
    parameters:
      - name: team_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [teams]
      summary: Fetch a team (member-only; 404 conflates "no such team" and "not a member")
      responses:
        '200':
          description: Team payload with member roster
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Team'}
        '404':
          description: Team does not exist OR caller is not a member.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/admin/teams:
    get:
      tags: [teams]
      summary: List every team in the deployment (admin)
      responses:
        '200':
          description: All teams
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/TeamSummary'}
    post:
      tags: [teams]
      summary: Create a new team; admin is auto-added as the first admin member
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TeamCreate'}
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Team'}
        '409':
          description: A team with that slug already exists.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/admin/teams/{team_id}:
    parameters:
      - name: team_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [teams]
      summary: Fetch a team with its member roster (admin)
      responses:
        '200':
          description: Team payload
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Team'}
    patch:
      tags: [teams]
      summary: Update name / description (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TeamUpdate'}
      responses:
        '200':
          description: Updated team
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Team'}
    delete:
      tags: [teams]
      summary: Delete a team; CASCADES to team_members and team-scope user_skills
      responses:
        '204':
          description: Deleted

  /api/v1/admin/teams/{team_id}/members:
    parameters:
      - name: team_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    post:
      tags: [teams]
      summary: Add a user to a team (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: {type: string, format: uuid}
                role: {type: string, enum: [admin, member], default: member}
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TeamMember'}
        '409':
          description: User is already a member of this team.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/admin/teams/{team_id}/members/{user_id}:
    parameters:
      - name: team_id
        in: path
        required: true
        schema: {type: string, format: uuid}
      - name: user_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    patch:
      tags: [teams]
      summary: Change a member's role (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: {type: string, enum: [admin, member]}
      responses:
        '200':
          description: Updated membership
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TeamMember'}
    delete:
      tags: [teams]
      summary: Remove a user from a team (admin)
      responses:
        '204':
          description: Member removed

  /api/v1/user-skills/{skill_id}:
    parameters:
      - name: skill_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [user-skills]
      summary: Fetch a single user- or team-scope skill (owner or team-admin)
      description: |
        Owner-only for ``scope='user'`` rows; team-admin-only for
        ``scope='team'`` rows (D8.1b). Non-admin team members read team
        skills through the merged picker at ``GET /api/v1/skills/{slug}``,
        not through this management endpoint.
      responses:
        '200':
          description: Skill row
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserSkill'}
        '404':
          description: Skill not found OR caller is not the owner / not a team-admin (id-probing-safe).
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    patch:
      tags: [user-skills]
      summary: Partial update (owner or team-admin)
      description: |
        Owner-only for ``scope='user'`` rows; team-admin-only for
        ``scope='team'`` rows (D8.1b). Audit details on team-scope
        rows carry ``team_id`` alongside slug + changed fields.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserSkillUpdate'}
      responses:
        '200':
          description: Updated row
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserSkill'}
        '404':
          description: Skill not found OR caller is not the owner / not a team-admin.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    delete:
      tags: [user-skills]
      summary: Soft-delete (owner or team-admin)
      description: |
        Owner-only for ``scope='user'`` rows; team-admin-only for
        ``scope='team'`` rows (D8.1b). Sets ``archived_at = now()``.
        The slug is freed for a new skill at the same slug after
        archive. Audit log records the deletion with the row's
        identity; team-scope rows carry ``team_id`` in the details bag.
      responses:
        '204':
          description: Deleted
        '404':
          description: Skill not found OR caller is not the owner / not a team-admin.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '410':
          description: Skill is already archived.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/user-skills/{skill_id}/versions:
    parameters:
      - name: skill_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [user-skills]
      summary: Audit-log view of edits for this user-skill (Wave D.2)
      description: |
        Returns ``audit_log`` rows for ``resource_type='user_skill'``
        keyed by this skill id, ordered ``timestamp DESC`` (newest first).
        The timeline UI renders top-down so the most recent edit appears
        at the top; ``user_skill.created`` lands last.

        Access gate mirrors the mutable surface: owner-only for
        ``scope='user'`` rows; team-admin-only for ``scope='team'`` rows.
        404 conflates "no such id" and "not your skill" (id-probing-safe).
        Active AND archived rows are accessible so a freshly-archived
        skill's timeline can still be rendered.
      parameters:
        - name: limit
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 200, default: 50}
      responses:
        '200':
          description: Version history items, newest first
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [timestamp, action]
                      properties:
                        timestamp: {type: string, format: date-time}
                        actor_user_id: {type: string, format: uuid, nullable: true}
                        actor_email: {type: string, nullable: true}
                        action: {type: string, description: "e.g. 'user_skill.created' or 'user_skill.updated'"}
                        version: {type: string, nullable: true}
                        details: {type: object, additionalProperties: true, nullable: true}
        '404':
          description: Skill not found OR caller is not the owner / not a team-admin.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  # ----------- MODELS (D0) -----------
  /api/v1/models:
    get:
      tags: [models]
      summary: List available models — proxy to gateway /v1/models (D0)
      description: |
        Authenticated proxy that forwards the gateway's merged
        ``GET /v1/models`` payload (aliases + live-discovered Ollama
        tags + live-discovered Anthropic catalog rows). The LQ.AI shell's
        model picker consumes this endpoint; the response shape is
        identical to the gateway's per
        ``docs/api/gateway-openapi.yaml`` so the contract stays single-
        sourced.

        Auth: bearer token + cleared ``must_change_password``. The
        picker contents reveal which providers the operator has
        configured, so anonymous reads are intentionally not allowed.

        Errors:
        - Gateway timeout → 504 ``gateway_timeout``.
        - Gateway unreachable / 5xx / 401 → 503 ``gateway_unreachable``.
          A 401 from the gateway is operator-side misconfiguration; the
          user must not see the underlying detail.
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                type: object
                required: [object, data]
                properties:
                  object: {type: string, enum: [list]}
                  data:
                    type: array
                    items:
                      type: object
                      required: [id, object, created, owned_by, lq_ai_kind]
                      properties:
                        id: {type: string}
                        object: {type: string, enum: [model]}
                        created: {type: integer}
                        owned_by: {type: string}
                        lq_ai_kind: {type: string, enum: [alias, provider_native]}
                        # routed_inference_tier is present on provider_native rows AND on
                        # alias rows (the tier of the alias's primary resolution).
                        routed_inference_tier: {type: integer, enum: [1, 2, 3, 4, 5]}
                        provider_type:
                          type: string
                          enum: [anthropic, openai, vertex, cohere, azure_openai, bedrock, ollama, vllm, openai_compatible]
                        # alias rows only (absent on provider_native):
                        lq_ai_resolves_to: {type: string}
                        # alias rows, present only when > 0 (absent otherwise / on provider_native):
                        lq_ai_fallback_count: {type: integer}
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '503':
          description: Gateway unreachable
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '504':
          description: Gateway timed out
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  # ----------- INTERNAL (gateway → backend, ADR 0007) -----------
  /api/v1/internal/skills/{skill_name}:
    parameters:
      - name: skill_name
        in: path
        required: true
        schema: {type: string}
      - name: user_id
        in: query
        required: false
        schema: {type: string, format: uuid}
        description: |
          When supplied, the resolver applies the D8.1b stack (per
          ADR 0012): user shadow → team shadow → filesystem built-in.
          A non-archived ``user_skills`` row for that user at this slug
          wins outright; otherwise the newest non-archived team-scope
          row owned by any team the user is a member of wins;
          otherwise the filesystem-canonical built-in is returned.
          When omitted, the registry view (built-in only) is returned.
    get:
      tags: [internal]
      summary: Internal — fetch a skill (gateway → backend; user > team > built-in)
      description: |
        Service-to-service endpoint used by the Inference Gateway during
        prompt assembly (Task C2 / ADR 0007). The user-facing
        `GET /api/v1/skills/{name}` endpoint is gated by user-token auth
        (`get_active_user`) and is inappropriate for the gateway's calls
        — the gateway has no user. This route is gated by the shared
        `X-LQ-AI-Gateway-Key` secret instead.

        Trust-domain separation: user-facing routes stay under user-token
        auth; internal routes stay under shared-secret auth. The two
        never mix on a single route.

        The optional ``user_id`` query param activates the D8.1b
        resolution stack (user > team > built-in). Multi-team conflicts
        resolve to the row with the most recent ``updated_at``. The
        gateway's skill cache stays keyed on ``(name, user_id)``;
        team-membership changes propagate via the existing TTL.

        The response shape matches `GET /api/v1/skills/{name}` (the
        `Skill` schema) so the gateway-side client reuses the same
        response model.
      security:
        - gatewayKeyAuth: []
      responses:
        '200':
          description: Skill detail
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Skill'}
        '401':
          description: Missing or invalid `X-LQ-AI-Gateway-Key`.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: No skill with that name is in the registry.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '500':
          description: |
            Operator has not configured `LQ_AI_GATEWAY_KEY` on the
            backend; service-to-service traffic is refused rather than
            silently accepted.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/internal/organization-profile:
    get:
      tags: [internal]
      summary: Internal — fetch the deployment's Organization Profile (gateway → backend)
      description: |
        Service-to-service endpoint used by the Inference Gateway during
        prompt assembly (Task D4-coverage). Returns the Organization
        Profile (PRD §3.12) as a `Skill`-shaped JSON body so the
        gateway can plug it into the same prompt-assembler that
        consumes user-attached skills. The synthesized frontmatter
        carries `is_organization_profile: true` and
        `use_organization_profile: false` so consumers identify the
        Profile by metadata and the assembler never recursively
        re-prepends the Profile to itself.

        Same trust posture as `/internal/skills/{name}`:
        `X-LQ-AI-Gateway-Key` shared-secret auth (constant-time
        compare); user-facing reads of the Profile use the bearer-
        authed `/api/v1/organization-profile` route instead.
      security:
        - gatewayKeyAuth: []
      responses:
        '200':
          description: Profile present; body is the `Skill`-shaped synthesized payload.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Skill'}
        '401':
          description: Missing or invalid `X-LQ-AI-Gateway-Key`.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: |
            No Profile is set on this deployment, or the Profile's body
            is empty. The gateway treats this as "no Profile to
            prepend" and proceeds with skill-only prompt assembly.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '500':
          description: |
            Operator has not configured `LQ_AI_GATEWAY_KEY` on the
            backend; service-to-service traffic is refused rather than
            silently accepted.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  # ----------- FILES -----------
  /api/v1/files:
    post:
      tags: [files]
      summary: Upload a file
      description: |
        Streaming multipart upload. The body is streamed to MinIO without
        loading the whole file into memory; a SHA-256 is computed as bytes
        flow past, and metadata is persisted with `ingestion_status='pending'`.
        The document pipeline (Task C5) picks the row up asynchronously
        and flips status through `processing` → `ready` (or `failed`).

        Per-request size limit: `LQ_AI_MAX_UPLOAD_SIZE_MB` (default 100 MB
        per Task C4). Exceeding it returns 413 with `code=payload_too_large`.

        `project_id` is accepted for forward compatibility (it appears in
        the multipart body) but is currently ignored; project attachment
        lands in C7. Files always start unattached and are linked to a
        project via `POST /api/v1/projects/{project_id}/files` (C7).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: {type: string, format: binary}
                project_id: {type: string, format: uuid, nullable: true}
      responses:
        '201':
          description: File uploaded; ingestion may be async.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/File'}
        '400':
          description: Validation error (e.g., missing filename on multipart part).
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '403':
          description: |
            User must change their password before uploading (B2 gate).
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '413':
          description: |
            Uploaded body exceeds the per-request size cap
            (`LQ_AI_MAX_UPLOAD_SIZE_MB`, default 100 MB). The response
            body's `details` carries `limit_bytes` and `received_bytes`.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/files/{file_id}:
    parameters:
      - name: file_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [files]
      summary: Get file metadata
      responses:
        '200':
          description: File metadata.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/File'}
        '400':
          description: `file_id` is not a valid UUID.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: |
            File does not exist, has been soft-deleted, or is owned by a
            different user. The cross-user case returns 404 (not 403) to
            avoid leaking existence information.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    delete:
      tags: [files]
      summary: Soft-delete a file
      description: |
        Sets `deleted_at` on the row; the MinIO object is left in place
        and reaped later by D6 (per-user export+delete) or a future GC
        sweep, per `docs/adr/0005-file-storage-soft-delete-and-key-scheme.md`.
        Idempotent: deleting an already-soft-deleted or missing file
        returns 404.
      responses:
        '204':
          description: File soft-deleted (no body).
        '400':
          description: `file_id` is not a valid UUID.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: File missing, soft-deleted, or owned by a different user.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/files/{file_id}/content:
    parameters:
      - name: file_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [files]
      summary: Download original file content
      description: |
        Streams the original bytes back as the upload arrived. The
        `Content-Type` is the stored MIME type, `Content-Length` is the
        stored size in bytes, and `Content-Disposition` is
        `attachment; filename="..."` with an RFC 5987 `filename*=UTF-8''...`
        for non-ASCII filenames.
      responses:
        '200':
          description: File bytes (streaming).
          headers:
            Content-Disposition:
              description: |
                `attachment; filename="..."` (RFC 6266); for non-ASCII
                filenames an additional RFC 5987 `filename*=UTF-8''...`
                parameter is included.
              schema: {type: string}
            X-Content-Type-Options:
              description: Always `nosniff`.
              schema: {type: string}
          content:
            application/octet-stream: {}
        '400':
          description: `file_id` is not a valid UUID.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: File missing, soft-deleted, or owned by a different user.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  # ----------- KNOWLEDGE BASES (Task C6) -----------
  /api/v1/knowledge-bases:
    get:
      tags: [knowledge-bases]
      summary: List the caller's knowledge bases
      parameters:
        - name: archived
          in: query
          required: false
          schema: {type: boolean}
          description: "When true, list archived KBs. Default (omit) lists active only."
        - name: project_id
          in: query
          required: false
          schema: {type: string, format: uuid}
          description: "Filter to KBs associated with this project."
      responses:
        '200':
          description: KBs accessible to the user
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/KnowledgeBase'}
    post:
      tags: [knowledge-bases]
      summary: Create a knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/KnowledgeBaseCreate'}
      responses:
        '201':
          description: KB created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/KnowledgeBase'}
        '404':
          description: Project (if `project_id` was provided) not found.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/knowledge-bases/{kb_id}:
    parameters:
      - name: kb_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [knowledge-bases]
      summary: Fetch a single knowledge base with metadata + file count
      responses:
        '200':
          description: Knowledge base
          content:
            application/json:
              schema: {$ref: '#/components/schemas/KnowledgeBase'}
        '404':
          description: Not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    patch:
      tags: [knowledge-bases]
      summary: Partial update — name, description, project association, alpha, or archived
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/KnowledgeBaseUpdate'}
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/KnowledgeBase'}
        '404':
          description: Not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    delete:
      tags: [knowledge-bases]
      summary: Soft-delete a knowledge base
      responses:
        '204':
          description: Soft-deleted
        '404':
          description: Not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/knowledge-bases/{kb_id}/files:
    parameters:
      - name: kb_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [knowledge-bases]
      summary: List the files attached to a knowledge base
      description: |
        Returns the files currently attached to the KB (the `File`
        shape from `GET /files/{id}` plus the `attached_at` timestamp
        from the join). Owner-scoped — cross-user / unknown KB id
        returns 404. Soft-deleted files are excluded. Sorted by
        `attached_at DESC` so the most recent uploads surface first.

        Drives the Knowledge surface's detail-page document list per
        the M1 frontend design spec (Wave C).
      responses:
        '200':
          description: List of attached files
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/KBFile'}
        '404':
          description: KB not found / cross-user
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    post:
      tags: [knowledge-bases]
      summary: Attach a file to a knowledge base
      description: |
        The file must be owned by the caller and have completed the C5
        ingest pipeline (`ingestion_status='ready'`). After successful
        attach the backend enqueues an embed job; the query path also
        covers any unembedded chunks lazily (embed-on-read).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_id]
              properties:
                file_id: {type: string, format: uuid}
      responses:
        '204':
          description: Attached
        '400':
          description: file_id is malformed
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: KB or file not found / cross-user
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '409':
          description: File already attached to this KB (idempotency-violating POST)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '422':
          description: File is not in `ingestion_status='ready'`
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/knowledge-bases/{kb_id}/files/{file_id}:
    parameters:
      - name: kb_id
        in: path
        required: true
        schema: {type: string, format: uuid}
      - name: file_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    delete:
      tags: [knowledge-bases]
      summary: Detach a file from a knowledge base
      responses:
        '204':
          description: Detached
        '404':
          description: KB not found, or the file is not attached
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/knowledge-bases/{kb_id}/query:
    parameters:
      - name: kb_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    post:
      tags: [knowledge-bases]
      summary: Hybrid (vector + FTS) search over the knowledge base
      description: |
        Per ADR 0008 the score is `(1 - alpha) * vector + alpha * fts`,
        where each side is min-max normalized across the union of the
        per-side candidate sets (each side returns up to `top_k * 4`
        candidates). `hybrid_alpha` defaults to the KB's stored value
        (which itself defaults to 0.5).

        Embed-on-read: if the gateway's `/v1/embeddings` is unavailable
        the query degrades gracefully to FTS-only ranking; the response
        carries `score_components.vector = 0` for every result in that
        case so the client can detect the degraded mode.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/KBQueryRequest'}
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema: {$ref: '#/components/schemas/KBQueryResponse'}
        '404':
          description: KB not found / cross-user
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  # ----------- ORGANIZATION PROFILE -----------
  /api/v1/organization-profile:
    get:
      tags: [organization-profile]
      summary: Get the deployment's Organization Profile (singleton)
      description: |
        Bearer-authenticated. Readable by every authenticated user
        (PRD §1.3 transparency: users are entitled to see what's
        shaping their output). Returns `content_md=""` plus null
        timestamps when no admin has set a Profile yet — the read
        path never 404s.
      responses:
        '200':
          description: Organization Profile (or empty placeholder)
          content:
            application/json:
              schema:
                type: object
                required: [content_md]
                properties:
                  content_md: {type: string}
                  updated_at: {type: string, format: date-time, nullable: true}
                  updated_by: {type: string, format: uuid, nullable: true}
    put:
      tags: [organization-profile]
      summary: Update the Organization Profile (admin only)
      description: |
        Admin-only upsert: idempotent against the singleton row. Empty
        `content_md` is allowed (operators may want to clear without
        deleting). Audit-logged as `organization_profile.updated`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content_md]
              properties:
                content_md: {type: string, maxLength: 200000}
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required: [content_md]
                properties:
                  content_md: {type: string}
                  updated_at: {type: string, format: date-time, nullable: true}
                  updated_by: {type: string, format: uuid, nullable: true}
        '401': {description: Bearer token missing or invalid}
        '403': {description: Caller is not an admin}

  /api/v1/organization-profile/raw:
    get:
      tags: [organization-profile]
      summary: Get the Profile body as raw Markdown
      description: |
        Bearer-authenticated. Convenience endpoint for the Skill
        Inspector (§3.4) and any UI surface that wants to render the
        Profile as Markdown without JSON-decoding the body. Returns
        an empty 200 when no Profile is set.
      responses:
        '200':
          description: Profile body
          content:
            text/markdown: {}

  # ----------- SAVED PROMPTS -----------
  /api/v1/saved-prompts:
    get:
      tags: [saved-prompts]
      responses:
        '200':
          description: User's saved prompts
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/SavedPrompt'}
    post:
      tags: [saved-prompts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, prompt_text]
              properties:
                name: {type: string}
                prompt_text: {type: string}
                tags: {type: array, items: {type: string}}
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SavedPrompt'}

  /api/v1/saved-prompts/{prompt_id}:
    parameters:
      - name: prompt_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [saved-prompts]
      summary: Fetch a single saved prompt
      responses:
        '200':
          description: Saved prompt
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SavedPrompt'}
        '404': {description: Not found}
    patch:
      tags: [saved-prompts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: {type: string}
                prompt_text: {type: string}
                tags: {type: array, items: {type: string}}
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SavedPrompt'}
    delete:
      tags: [saved-prompts]
      responses:
        '204': {description: Deleted}

  # ----------- ADMIN: AUDIT LOG -----------
  /api/v1/admin/audit-log:
    get:
      tags: [audit-log]
      summary: Query audit log (admin only)
      parameters:
        - name: user_id
          in: query
          schema: {type: string, format: uuid}
        - name: action
          in: query
          schema: {type: string}
        - name: resource_type
          in: query
          schema: {type: string}
        - name: privilege_marked
          in: query
          schema: {type: boolean}
        - name: routed_inference_tier
          in: query
          schema: {type: integer, enum: [1,2,3,4,5]}
        - name: from
          in: query
          schema: {type: string, format: date-time}
        - name: to
          in: query
          schema: {type: string, format: date-time}
        - name: cursor
          in: query
          schema: {type: string}
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: object
                required: [items, next_cursor]
                properties:
                  items:
                    type: array
                    items: {$ref: '#/components/schemas/AuditLogEntry'}
                  next_cursor: {type: string, nullable: true}

  # ----------- ADMIN: MODEL ALIAS CRUD (D0.5) -----------
  /api/v1/playbooks:
    get:
      tags: [playbooks]
      summary: List playbooks visible to the caller (M3-A4)
      description: |
        Returns playbooks the caller can see: admins see all;
        non-admins see playbooks they authored or built-in playbooks
        (``created_by IS NULL``). Soft-deleted rows (``deleted_at IS NOT
        NULL``) are excluded for everyone, including admins. Positions
        are NOT inlined; clients call ``GET /api/v1/playbooks/{id}`` to
        fetch them.
      responses:
        '200':
          description: List of playbooks (positions empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Playbook'
        '401':
          description: Not authenticated.
    post:
      tags: [playbooks]
      summary: Create a new playbook (M3-A6)
      description: |
        Creates a playbook owned by the caller (``created_by =
        caller.id``). Admins do not get to mint built-ins through this
        endpoint — built-ins (``created_by IS NULL``) ship via seed
        migration only. The Inference-Tier and audit posture matches
        other write endpoints on the API.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PlaybookCreate'}
      responses:
        '201':
          description: Playbook created. Body includes the assembled positions.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Playbook'}
        '401':
          description: Not authenticated.
        '422':
          description: Validation error (e.g., unknown field, invalid severity enum).

  /api/v1/playbooks/{playbook_id}:
    parameters:
      - in: path
        name: playbook_id
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [playbooks]
      summary: Get a playbook with its full position list (M3-A4)
      description: |
        Returns the playbook header + positions + fallback tiers.
        Visibility matches ``GET /api/v1/playbooks``. 404 (not 403)
        on unauthorized access, including for soft-deleted rows.
      responses:
        '200':
          description: Full playbook with positions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playbook'
        '404':
          description: Playbook not found, or caller is not authorized to see it.
        '401':
          description: Not authenticated.
    patch:
      tags: [playbooks]
      summary: Update a playbook header; optionally replace positions (M3-A6)
      description: |
        Patches the playbook. Authorization:

        * Built-in playbooks (``created_by IS NULL``) are 403 to
          everyone, including admins — operators fork-then-edit. This
          keeps shared deployment-level content immutable to a single
          operator's mistake.
        * Non-built-in playbooks can be patched by the playbook's author
          OR by an admin. Cross-user / soft-deleted cases return 404.

        Position replacement is atomic: when ``positions`` is supplied,
        every existing position row for this playbook is deleted and
        the new list is inserted in a single transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PlaybookUpdate'}
      responses:
        '200':
          description: Playbook updated; response is the fresh full shape.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Playbook'}
        '403':
          description: Built-in playbooks cannot be edited through this endpoint.
        '404':
          description: Playbook not found, soft-deleted, or not authorized.
        '401':
          description: Not authenticated.
        '422':
          description: Validation error.
    delete:
      tags: [playbooks]
      summary: Soft-delete a playbook (M3-A6)
      description: |
        Sets ``deleted_at`` on the row. The ``playbook_positions`` rows
        remain so historical executions still resolve their position
        references. Authorization mirrors PATCH: built-ins are 403;
        non-built-ins require admin OR ownership; cross-user / already-
        deleted is 404. Subsequent reads (GET, list) treat the row as
        absent.
      responses:
        '204':
          description: Playbook soft-deleted.
        '403':
          description: Built-in playbooks cannot be deleted through this endpoint.
        '404':
          description: Playbook not found, already soft-deleted, or not authorized.
        '401':
          description: Not authenticated.

  /api/v1/playbooks/easy:
    post:
      tags: [playbooks]
      summary: Start an Easy Playbook generation run (M3-A6)
      description: |
        Kicks off the Easy Playbook auto-generation pipeline against
        the supplied document corpus. Creates an
        ``EasyPlaybookGeneration`` row at ``status='pending'`` and
        enqueues the ARQ worker job on the ``arq:m3a6`` queue (the
        dedicated M3-A6 worker — see ``app/workers/arq_setup.py``).
        Returns 202 immediately; the wizard's Step 2 polls
        ``GET /api/v1/playbooks/easy/{generation_id}`` until status
        reaches a terminal value.

        Authorization: caller must own every document in
        ``document_ids`` (admins bypass). Cross-user / missing /
        soft-deleted documents collapse into 404.

        Generation completion does NOT mean the playbook is fit for
        use; the wizard's Step 3 inline editor is where the user-
        attorney validates and edits before the final save (which
        POSTs to ``/api/v1/playbooks`` like any other playbook).
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EasyPlaybookGenerationCreate'}
      responses:
        '202':
          description: Generation scheduled; row created at status `pending`.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EasyPlaybookGeneration'}
        '404':
          description: One or more documents not found / not authorized.
        '422':
          description: Validation error (empty ``document_ids``, unknown field, etc.).
        '401':
          description: Not authenticated.

  /api/v1/playbooks/easy/{generation_id}:
    parameters:
      - in: path
        name: generation_id
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [playbooks]
      summary: Poll an Easy Playbook generation row (M3-A6)
      description: |
        Returns the current state of one Easy Playbook generation.
        Caller must be the row's user OR an admin; cross-user / missing
        rows return 404.

        When ``status='completed'``, ``draft_playbook`` carries the
        assembled ``PlaybookCreate`` shape — the wizard's Step 3 inline
        editor binds to this. When ``status='error'``, ``error_message``
        is populated. The wizard's Step 2 polls every few seconds until
        a terminal status arrives.
      responses:
        '200':
          description: Current generation row.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EasyPlaybookGeneration'}
        '404':
          description: Generation not found or not authorized.
        '401':
          description: Not authenticated.

  # M3-C2 — Tabular / Multi-Document Review surface (PRD §3.14).
  /api/v1/tabular/preview-cost:
    post:
      tags: [tabular]
      summary: Preview the cost of a proposed tabular execution (M3-C2)
      description: |
        Synchronous cost preview — no execution row is created. The UI
        calls this before showing the confirmation modal so the
        operator sees the cell-count + estimated cost + per-tier
        breakdown (Phase C prep doc Decision C-5).

        Either ``skill_name`` or ``columns`` is required (not both).
        The estimator uses a rolling-average over recent
        ``purpose='tabular_extraction'`` routing-log rows; cold-start
        deployments see the conservative default per-cell cost until
        enough calibration data accumulates.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TabularPreviewCostRequest'}
      responses:
        '200':
          description: Cost preview.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TabularPreviewCostResponse'}
        '400':
          description: Both ``skill_name`` and ``columns`` provided, or skill has no columns.
        '404':
          description: ``skill_name`` not found in the live skill registry.
        '422':
          description: Validation error (empty ``document_ids``, malformed column spec, etc.).
        '401':
          description: Not authenticated.

  /api/v1/tabular/execute:
    post:
      tags: [tabular]
      summary: Start a tabular execution (M3-C2)
      description: |
        Kicks off a tabular execution against the supplied document
        corpus. Creates a ``TabularExecution`` row at
        ``status='pending'`` and enqueues the ARQ worker job on the
        shared playbook queue (per Decision C-3 — same queue as Easy
        Playbook). Returns 202 immediately; the result view polls
        ``GET /api/v1/tabular/executions/{id}`` until status reaches
        a terminal value.

        Authorization: caller must own every document in
        ``document_ids`` (admins bypass). Cross-user / missing /
        soft-deleted documents collapse into 404.

        Execution completion does NOT mean every cell is correct —
        the result view's per-cell citation drawer is where the
        user-attorney validates extractions before relying on them.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TabularExecutionCreate'}
      responses:
        '202':
          description: Execution scheduled; row created at status `pending`.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TabularExecution'}
        '400':
          description: Both ``skill_name`` and ``columns`` provided, or skill has no columns.
        '404':
          description: One or more documents not found / not authorized, or skill not found.
        '422':
          description: Validation error.
        '401':
          description: Not authenticated.

  /api/v1/tabular/executions:
    get:
      tags: [tabular]
      summary: List the caller's tabular executions (M3-C2)
      description: |
        Returns the caller's tabular executions in recent-first order.
        Soft-deleted rows are excluded. Admins see all rows; non-admins
        see only their own.
      parameters:
        - in: query
          name: limit
          schema: {type: integer, default: 50, minimum: 1, maximum: 200}
          description: Maximum rows to return; default 50.
      responses:
        '200':
          description: List of tabular execution summaries.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/TabularExecutionSummary'}
        '401':
          description: Not authenticated.

  /api/v1/tabular/executions/{execution_id}:
    parameters:
      - in: path
        name: execution_id
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [tabular]
      summary: Get a tabular execution by id (M3-C2)
      description: |
        Returns the full execution — status, results grid, costs,
        timing. Caller must be the row's user OR an admin; cross-user
        / missing / soft-deleted rows return 404.
      responses:
        '200':
          description: Current execution row.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TabularExecution'}
        '404':
          description: Execution not found or not authorized.
        '401':
          description: Not authenticated.
    delete:
      tags: [tabular]
      summary: Soft-delete a tabular execution (M3-C2)
      description: |
        Sets ``deleted_at`` to now. Soft-deleted rows are invisible
        to list / get / cancel endpoints; subsequent operations
        return 404.
      responses:
        '204':
          description: Soft-deleted.
        '404':
          description: Execution not found or already deleted.
        '401':
          description: Not authenticated.

  /api/v1/tabular/executions/{execution_id}/cancel:
    parameters:
      - in: path
        name: execution_id
        required: true
        schema: {type: string, format: uuid}
    post:
      tags: [tabular]
      summary: Cancel a pending or running tabular execution (M3-C2)
      description: |
        Sets status to ``cancelled`` and ``completed_at`` to now.
        The worker's per-cell loop checks the row status at each
        cell-iteration boundary; on cancellation it stops accepting
        new cells and the aggregate node writes whatever partial
        results landed. Terminal rows (``completed`` / ``failed`` /
        ``cancelled``) return 409 — operators wanting a clean re-run
        start a new execution via ``POST /tabular/execute``.
      responses:
        '200':
          description: Cancellation accepted; row updated.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TabularExecution'}
        '404':
          description: Execution not found or not authorized.
        '409':
          description: Execution already in a terminal status.
        '401':
          description: Not authenticated.

  /api/v1/tabular/executions/{execution_id}/export:
    parameters:
      - in: path
        name: execution_id
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [tabular]
      summary: Export a completed tabular grid as XLSX or CSV (M3-C4a)
      description: |
        Streams the tabular grid in the requested format. Both formats
        carry the document column (leftmost) plus one column per declared
        column spec, in spec order. Cells with ``confidence='failed'``
        render as ``"(failed)"`` so operators can spot gaps.

        Citation surfacing differs by format:

        * **XLSX** — each grid cell with at least one citation carries an
          openpyxl cell ``Comment`` listing the citation ids + confidences
          (up to 5 per comment; the cell retains the full count). Operators
          hover any cell in Excel / Numbers / Google Sheets to see sources.
        * **CSV** — a trailing ``citation_links`` column per row carries a
          semicolon-separated list of ``"<column_name>:<citation_id>"``
          pairs across the row's cells; empty when no cell had citations.

        The execution must be in ``status='completed'`` — pending /
        running / cancelled / failed rows return 409 (partial grids would
        mislead downstream consumers).
      parameters:
        - in: query
          name: format
          required: false
          schema: {type: string, enum: [xlsx, csv], default: xlsx}
          description: Export format. `xlsx` carries citations as cell comments; `csv` flattens them into a `citation_links` column.
      responses:
        '200':
          description: Streaming export; `Content-Type` matches the format.
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: {type: string, format: binary}
            text/csv:
              schema: {type: string, format: binary}
        '404':
          description: Execution not found or not authorized.
        '409':
          description: Execution not in a terminal `completed` status — cannot export.
        '401':
          description: Not authenticated.

  /api/v1/playbooks/{playbook_id}/execute:
    parameters:
      - in: path
        name: playbook_id
        required: true
        schema: {type: string, format: uuid}
    post:
      tags: [playbooks]
      summary: Kick off a playbook execution against a target document (M3-A2)
      description: |
        Creates a new ``playbook_executions`` row at status ``'pending'``
        and schedules the four-node LangGraph workflow
        (retrieve → classify → redline → compile) as a FastAPI
        BackgroundTask. The response returns immediately (202) with the
        new row; clients poll
        ``GET /api/v1/playbook-executions/{execution_id}`` until they
        see a terminal status (``completed`` or ``error``).

        Authorization: caller must be an admin or the playbook's
        author, and own the target document's parent file. If
        ``project_id`` is supplied, caller must also own the project.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_document_id]
              additionalProperties: false
              properties:
                target_document_id:
                  type: string
                  format: uuid
                project_id:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        '202':
          description: Execution scheduled; row created at status `pending`.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PlaybookExecution'}
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: Playbook, target document, or project not found / not owned.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '422':
          description: Request body validation error (e.g., missing or malformed `target_document_id`, unknown field).
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/playbook-executions/{execution_id}:
    parameters:
      - in: path
        name: execution_id
        required: true
        schema: {type: string, format: uuid}
    get:
      tags: [playbooks]
      summary: Poll the current state of a playbook execution (M3-A2)
      description: |
        Returns the row regardless of completion state. Callers poll
        until they see a terminal ``completed`` or ``error`` status.
        Authorization: caller must own the execution (``user_id``
        match) or be an admin.
      responses:
        '200':
          description: Current execution state.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PlaybookExecution'}
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: Execution not found or caller does not own it.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/admin/ingest-health:
    get:
      tags: [admin]
      summary: Aggregate ingest-status counts across the deployment (admin-only)
      description: |
        Reports document-level + file-level ingest health in a single
        response: ``ok`` (chunks embedded), ``embed_failed`` /
        ``partial`` (document-level post-parse failures introduced by
        M3-0.3 / DE-276), and ``parse_failed`` (file-level parse
        failures from the M1 pipeline). Soft-deleted rows are excluded.

        A non-zero ``embed_failed`` or ``partial`` count is the
        operator's canonical signal that hybrid retrieval has silently
        degraded for some documents — the exact failure mode DE-276
        was filed to surface. A non-zero ``parse_failed`` count means
        operators should inspect the file-list UI for the specific
        failures.
      responses:
        '200':
          description: Aggregate ingest-health summary
          content:
            application/json:
              schema:
                type: object
                required: [ok, embed_failed, partial, parse_failed, total_documents]
                properties:
                  ok:
                    type: integer
                    description: Documents with all chunks successfully embedded.
                  embed_failed:
                    type: integer
                    description: |
                      Documents whose embed worker raised before any chunk
                      was embedded — hybrid retrieval falls back to FTS-only.
                  partial:
                    type: integer
                    description: |
                      Documents whose embed worker raised mid-batch — some
                      chunks have vectors, others are NULL.
                  parse_failed:
                    type: integer
                    description: |
                      Files that failed at parse time and never produced a
                      ``documents`` row (``files.ingestion_status='failed'``).
                  total_documents:
                    type: integer
                    description: Sum of ok + embed_failed + partial.
                example:
                  ok: 124
                  embed_failed: 0
                  partial: 1
                  parse_failed: 2
                  total_documents: 125
        '403':
          description: Caller is not an admin
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/admin/bootstrap-status:
    get:
      tags: [admin]
      summary: Report whether the first-run bootstrap admin password is still active
      description: |
        **Unauthenticated.** Consulted by the login UI before the operator
        has credentials, so it can render a fresh-install hint pointing at
        the API container logs when the bootstrap password has not yet
        been rotated (M3-0.1 / DE-283).

        ``default_password_active`` is True when at least one non-deleted
        admin user still has ``must_change_password=True``. The flag flips
        to False once the operator hits ``POST /api/v1/auth/change-password``,
        at which point the login UI stops surfacing the hint.

        The signal exposed by this endpoint is low-sensitivity: the
        bootstrap password is 24 characters of CSPRNG output, so knowing
        a deployment is in fresh-install state does not measurably help
        an attacker who lacks the log line.
      responses:
        '200':
          description: Bootstrap state
          content:
            application/json:
              schema:
                type: object
                required: [default_password_active, logs_hint]
                properties:
                  default_password_active:
                    type: boolean
                    description: |
                      True when at least one admin user is still in the
                      ``must_change_password=True`` state, indicating the
                      first-run bootstrap password has not been rotated.
                  logs_hint:
                    type: string
                    description: |
                      Shell command an operator can run to retrieve the
                      bootstrap password from the API container's logs.
                example:
                  default_password_active: true
                  logs_hint: 'docker compose logs api 2>&1 | grep "First-run admin password"'

  /api/v1/admin/aliases:
    get:
      tags: [admin]
      summary: List configured model aliases (admin only)
      description: |
        Proxies the gateway's ``/admin/v1/aliases`` surface. The user's
        bearer token must have ``is_admin = true`` or the endpoint
        returns 403 ``forbidden``.
      responses:
        '200':
          description: Alias list
          content:
            application/json:
              schema:
                type: object
                required: [object, data]
                properties:
                  object: {type: string, enum: [list]}
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/AdminAliasEntry'}
        '403':
          description: Caller is not an admin
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    post:
      tags: [admin]
      summary: Create a new model alias (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AdminAliasCreate'}
      responses:
        '201':
          description: Alias created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminAliasEntry'}
        '409':
          description: Alias name already configured
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/admin/aliases/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema: {type: string}
    get:
      tags: [admin]
      summary: Get a single alias (admin only)
      responses:
        '200':
          description: Alias detail
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminAliasEntry'}
        '404':
          description: Alias not configured
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    patch:
      tags: [admin]
      summary: Update an alias (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AdminAliasUpdate'}
      responses:
        '200':
          description: Alias updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminAliasEntry'}
        '404':
          description: Alias not configured
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    delete:
      tags: [admin]
      summary: Remove an alias (admin only)
      responses:
        '204':
          description: Alias removed
        '404':
          description: Alias not configured
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/admin/provider-keys:
    get:
      tags: [admin]
      summary: List provider-key status (admin only)
      description: |
        Donna #7 (runtime BYOK). Proxies the gateway's
        ``/admin/v1/provider-keys`` surface. The backend holds the
        gateway-key; the frontend never does. Returns a secret-safe status
        row per configured provider — the response NEVER contains a full
        key, only the last 4 characters of a resolved key. The caller's
        bearer token must have ``is_admin = true`` or the endpoint returns
        403 ``forbidden``.
      responses:
        '200':
          description: Provider-key status list
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ProviderKeyList'}
        '403':
          description: Caller is not an admin
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    post:
      tags: [admin]
      summary: Set/replace a provider's runtime key (admin only)
      description: |
        Proxies the gateway's set-key path. The gateway encrypts the
        plaintext key, persists it to gateway.yaml, and hot-applies the
        rebuilt adapter — no restart. The backend forwards the JSON and
        never returns the secret. 400 when the gateway master key is unset
        (surfaced as ``validation_error``); 404 when the provider isn't a
        configured entry.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ProviderKeySetRequest'}
      responses:
        '200':
          description: Key applied; provider status returned (no secret)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ProviderKeyStatus'}
        '400':
          description: Gateway master key is not set
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '403':
          description: Caller is not an admin
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: Provider not configured
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/admin/provider-keys/{provider}:
    parameters:
      - in: path
        name: provider
        required: true
        schema: {type: string}
    patch:
      tags: [admin]
      summary: Rotate a provider's runtime key (admin only)
      description: |
        Same mechanics as POST /api/v1/admin/provider-keys; the provider
        comes from the path. Proxies the gateway, which retires the
        displaced adapter and swaps the rebuilt one in. The backend never
        returns the secret. 400 when the gateway master key is unset; 404
        when the provider isn't configured.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ProviderKeyRotateRequest'}
      responses:
        '200':
          description: Key rotated; provider status returned (no secret)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ProviderKeyStatus'}
        '400':
          description: Gateway master key is not set
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '403':
          description: Caller is not an admin
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: Provider not configured
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
    delete:
      tags: [admin]
      summary: Revoke a provider's runtime key (admin only)
      description: |
        Proxies the gateway's revoke path. Only runtime
        (encrypted-at-rest) keys can be revoked; an env-sourced key is
        owned by the operator's environment and returns 409.
      responses:
        '204':
          description: Runtime key revoked
        '403':
          description: Caller is not an admin
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: Provider not configured
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '409':
          description: Provider has no runtime key to revoke (e.g., env-sourced)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/admin/config:
    get:
      tags: [admin]
      summary: Sanitized live gateway config (admin only)
      description: |
        Proxies the gateway's ``/admin/v1/config`` endpoint. Used by
        the web UI to populate the provider dropdown when editing
        aliases. Secrets are not in the schema; the payload contains
        env-var *names* only.
      responses:
        '200':
          description: Sanitized config payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # ----------- ADMIN: USERS (Wave C — PRD §5.2) -----------
  /api/v1/admin/users:
    get:
      tags: [admin]
      summary: List users for RBAC administration (Wave B v2 — PRD §5.2)
      description: |
        Admin-only. Returns the full list of non-deleted users with
        their role + auth state. Supports filtering by role, email
        substring search, and pagination. Default sort is email ASC.
        Used by /lq-ai/admin/developer's role-management card.
      parameters:
        - name: role
          in: query
          schema: {type: string, enum: [admin, member, viewer]}
        - name: email_q
          in: query
          schema: {type: string}
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 200, default: 50}
        - name: offset
          in: query
          schema: {type: integer, minimum: 0, default: 0}
      responses:
        '200':
          description: User list (paginated)
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminUserListResponse'}
        '400':
          description: Invalid role filter
        '403':
          description: Caller is not admin

  /api/v1/admin/users/{user_id}/role:
    parameters:
      - name: user_id
        in: path
        required: true
        schema: {type: string, format: uuid}
    patch:
      tags: [admin]
      summary: Set a user's RBAC role (admin | member | viewer)
      description: |
        Wave C. Updates ``users.role`` and keeps ``is_admin`` in sync
        (True iff role='admin'). Idempotent: re-applying the same role
        returns 200 without an audit row. Real changes write a
        ``user.role_updated`` audit row with before/after values.

        Lockout protection: refuses to demote the last admin in the
        deployment (409 — promote someone else first).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: {type: string, enum: [admin, member, viewer]}
      responses:
        '200':
          description: Updated role
          content:
            application/json:
              schema:
                type: object
                required: [user_id, email, role, is_admin]
                properties:
                  user_id: {type: string, format: uuid}
                  email: {type: string, format: email}
                  role: {type: string, enum: [admin, member, viewer]}
                  is_admin: {type: boolean}
        '403':
          description: Last-admin demotion lockout.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: Target user not found.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '422':
          description: Invalid role value.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  # ----------- ADMIN: TIER POLICY -----------
  /api/v1/admin/tier-policy:
    get:
      tags: [tier-policy]
      summary: Get current Inference Tier policy
      responses:
        '200':
          description: Policy
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TierPolicy'}
    patch:
      tags: [tier-policy]
      summary: Partial update to Inference Tier policy
      description: |
        Admin-only. Audited. Partial-update semantics — fields omitted from
        the request body are left unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TierPolicy'}
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TierPolicy'}

  # ----------- ADMIN: USAGE (PRD §5.5 — Wave B) -----------
  /api/v1/admin/usage:
    get:
      tags: [admin]
      summary: Cost + tokens aggregation across inference_routing_log
      description: |
        Admin-only. Aggregates ``inference_routing_log`` rows by one of
        user | provider | model | tier | day. Refusals are excluded by
        default (they didn't consume upstream tokens). Filters: date
        range + the same grouping dimensions. Returns per-group rows
        plus deployment-wide totals so the admin UI can render
        percentages without a second query.
      parameters:
        - name: group_by
          in: query
          schema: {type: string, enum: [user, provider, model, tier, day], default: provider}
        - name: date_from
          in: query
          schema: {type: string, format: date-time}
        - name: date_to
          in: query
          schema: {type: string, format: date-time}
        - name: user_id
          in: query
          schema: {type: string, format: uuid}
        - name: provider
          in: query
          schema: {type: string}
        - name: model
          in: query
          schema: {type: string}
        - name: tier
          in: query
          schema: {type: integer, minimum: 1, maximum: 5}
      responses:
        '200':
          description: Aggregated usage rows + totals
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UsageResponse'}

  # ----------- WORD ADD-IN (M3-B1) -----------
  /api/v1/admin/word-addin/manifest:
    get:
      tags: [admin]
      summary: Render the Word add-in manifest XML for sideload (M3-B1)
      description: |
        Admin-only. Renders the Office Add-in XML manifest with the
        operator's deployment URL + a freshly generated GUID substituted
        into the template. Operators use the rendered file to sideload
        the add-in via Microsoft 365 Admin Center.

        Origin resolution order:
        1. ``deployment_origin`` query param when supplied
        2. ``X-Forwarded-Proto`` + ``X-Forwarded-Host`` headers (the
           operator's reverse-proxy reports these)
        3. The request URL's scheme + host (single-process dev fallback)

        Per PRD §9 DE-287, the Word add-in's user-facing feature tabs
        (chat / skills / playbook execution / Inference Tier badge) are
        descoped to M4 / community contribution; this M3-B1 endpoint
        ships the install-and-authenticate plumbing.
      parameters:
        - name: deployment_origin
          in: query
          required: false
          description: |
            Override the deployment origin embedded in the manifest.
            Defaults to the request's effective origin (reverse-proxy
            aware). No trailing slash.
          schema: {type: string, format: uri, example: 'https://lq.acme.example'}
        - name: display_name
          in: query
          required: false
          description: |
            Branded name surfaced inside Word's ribbon and the task
            pane GetStarted message.
          schema: {type: string, maxLength: 64, default: 'LQ.AI'}
        - name: provider_name
          in: query
          required: false
          description: |
            ProviderName value the manifest surfaces to Microsoft 365
            Admin Center; typically the operator org's name.
          schema: {type: string, maxLength: 64, default: 'LegalQuants'}
      responses:
        '200':
          description: Rendered Office Add-in XML manifest
          headers:
            Content-Disposition:
              schema: {type: string, example: 'attachment; filename="lq-ai-word-addin-manifest.xml"'}
              description: Tells the browser to download the manifest as a file.
          content:
            application/xml:
              schema: {type: string, format: byte}
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '403':
          description: Caller is not an admin user
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/word-addin/version:
    get:
      tags: [word-addin]
      summary: Word add-in version handshake (M3-B8)
      description: |
        **Unauthenticated.** The Word add-in's task pane calls this on
        mount, BEFORE the user has signed in, so an out-of-date add-in
        can surface an "Update needed" overlay rather than getting
        stuck at a broken OAuth handshake or a breaking-change API
        call.

        Response payload:
        - `deployment_version` — the LQ.AI api package version (the
          deployment's release number). Informational; the add-in
          surfaces it in the "Update needed" overlay so a user can
          quote it to support.
        - `addin_min_compatible_version` / `addin_max_compatible_version`
          — the semver range of add-in bundles this deployment can
          talk to. The task pane refuses to render features outside
          the range.
        - `taskpane_bundle_url` — canonical URL of the task pane HTML
          entry. The task pane already knows this from `window.location`
          today; the field exists in the handshake so a future
          deployment can serve the bundle from a CDN or operator-chosen
          path without changing the manifest.
        - `taskpane_bundle_hash` — optional SHA-256 of the deployed
          bundle JS. M3-B8 ships this nullable; M3-B7 signing CI
          populates the value from the build manifest. Null means
          "don't enforce" — not an error.
      responses:
        '200':
          description: Version handshake payload
          content:
            application/json:
              schema: {$ref: '#/components/schemas/WordAddinVersionResponse'}

  # ----------- INFERENCE (PRD §3.13 — Wave B) -----------
  /api/v1/inference/current-tier:
    get:
      tags: [inference]
      summary: Derive routed tier for a (provider, model) pair
      description: |
        The Tier Awareness UI's click-for-details panel calls this so
        the user sees the human-readable tier label + the provider type
        the Provider Compliance Matrix renders against. 404 when the
        pair isn't in the gateway's model list.
      parameters:
        - name: provider
          in: query
          required: true
          schema: {type: string}
        - name: model
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Current tier + explanation
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CurrentTierResponse'}
        '404':
          description: No (provider, model) entry in the gateway's model list.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/inference/tier-config:
    get:
      tags: [inference]
      summary: Operator's tier policy (deployment-level disclosure)
      description: |
        User-accessible read of allowed_tiers_global + the default /
        privileged minima. The admin write surface lives at
        ``PATCH /api/v1/admin/tier-policy``.
      responses:
        '200':
          description: Tier policy snapshot
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TierConfigResponse'}

  /api/v1/inference/override-tier-floor:
    post:
      tags: [inference]
      summary: Re-run a refused inference with the tier floor lifted (admin only)
      description: |
        Wave D.1 T4. Admin-only override that re-runs the original user
        prompt with ``tier_floor=None`` for this turn. Looks up the
        ``kind='refusal'`` message at ``message_id``, finds the
        immediately preceding ``kind='user'`` message in the same chat,
        and forwards both to the gateway with no project floor and no
        per-call minimum. Persists a new ``kind='ai'`` ``Message`` row
        and writes an ``audit_log`` row with the operator-supplied
        ``reason``. Returns the new message + the routing-log row id
        the gateway wrote.

        M1 binds to the ``is_admin`` role. Per-user
        ``override_tier_floor`` capability is deferred to v1.1+.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message_id, reason]
              properties:
                message_id:
                  type: string
                  format: uuid
                reason:
                  type: string
                  minLength: 10
                  maxLength: 500
      responses:
        '200':
          description: Re-run completed; new ``kind='ai'`` message persisted.
          content:
            application/json:
              schema:
                type: object
                required: [ai_message]
                properties:
                  ai_message: {$ref: '#/components/schemas/Message'}
                  routing_log_id:
                    type: string
                    format: uuid
                    nullable: true
        '403':
          description: Caller is not an admin.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: ``message_id`` does not resolve to a refusal row.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/chats/{chat_id}/receipts:
    get:
      tags: [chats]
      summary: Chronological event log for a chat (replay-at-read)
      description: |
        Wave D.1 T5 (spec §7.6). Merges chronological events from four
        source tables into a single timestamp-ordered stream:

          * ``messages``                (``kind='message'``)
          * ``messages.applied_skills`` (one event per skill name; ``kind='skill'``)
          * ``inference_routing_log``   (``kind='inference'`` or ``kind='error'`` if ``refused=True``)
          * ``audit_log``               (``kind='audit'`` or ``kind='retrieval'`` if ``action='inference.kb_chunks_retrieved'``)

        Owner-of-chat or admin only. Replay-at-read for M1 — chats are
        bounded (<100 events typical). A materialized ``chat_receipts``
        projection is a v1.1+ candidate if latency degrades.
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: event_kinds
          in: query
          required: false
          schema: {type: string}
          description: |
            Comma-separated subset of: ``message``, ``inference``,
            ``audit``, ``skill``, ``retrieval``, ``error``. Omit for
            all kinds. Unknown tokens are silently ignored.
      responses:
        '200':
          description: Chronological list of receipt events, oldest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [ts, kind, detail]
                  properties:
                    ts:
                      type: string
                      format: date-time
                    kind:
                      type: string
                      enum: [message, inference, audit, skill, retrieval, error]
                    detail:
                      type: object
                      additionalProperties: true
        '403':
          description: Caller is not the chat owner or an admin.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}
        '404':
          description: Chat not found.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Error'}

  /api/v1/chats/{chat_id}/receipts/export.jsonl:
    get:
      summary: Export receipts as JSONL (one event per line)
      tags: [chats]
      parameters:
        - name: chat_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: event_kinds
          in: query
          required: false
          schema: { type: string }
          description: Comma-separated subset (same as the JSON endpoint)
      responses:
        '200':
          description: JSONL stream — one event per line
          content:
            application/jsonl:
              schema: { type: string }
        '403':
          description: Forbidden — not the owner or admin
        '404':
          description: Chat not found

  # ============================================================
  # M3-D1 — slack-bridge persistence surface
  # ============================================================

  /api/v1/integrations/slack/workspaces:
    post:
      tags: [integrations-slack]
      summary: Persist a Slack workspace from the slack-bridge OAuth flow (M3-D1)
      description: |
        Service-to-service endpoint. Authenticated by a shared
        `Authorization: Bearer ${LQ_AI_BRIDGE_TOKEN}` token (NOT a user
        JWT) — the slack-bridge is the only intended caller.

        The bridge POSTs the workspace tuple after the operator
        completes the Slack OAuth install flow at
        `${LQ_AI_BRIDGE_PUBLIC_URL}/slack/oauth/install`. The api
        encrypts the bot token at rest under `LQ_AI_BRIDGE_MASTER_KEY`
        (a separate Fernet master key from the gateway's
        `LQ_AI_GATEWAY_MASTER_KEY` — different threat models) and
        upserts on `team_id` so a re-install (Slack rotates bot tokens
        on re-install) replaces the old ciphertext + scope + installer
        in place. Soft-deleted rows revive on re-install.

        500 (not 401) is the response when the operator hasn't set
        `LQ_AI_BRIDGE_TOKEN` on the api — accepting bridge traffic
        with no enforced secret would silently break the trust
        contract.
      security:
        - bridgeBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlackWorkspaceCreate'
      responses:
        '201':
          description: Persisted (or upserted) the workspace record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlackWorkspaceResponse'
        '401':
          description: Missing, malformed, or non-matching bridge bearer token
        '500':
          description: Operator has not configured `LQ_AI_BRIDGE_TOKEN` on the api

  /api/v1/integrations/teams/tenants:
    post:
      tags: [integrations-teams]
      summary: Persist a Microsoft 365 tenant from the teams-bridge OAuth flow (M3-D3)
      description: |
        Service-to-service endpoint. Authenticated by the **same**
        `Authorization: Bearer ${LQ_AI_BRIDGE_TOKEN}` bearer as the
        slack-bridge endpoint per M3-D3 decision #2 — one shared
        secret authenticates every bridge → api call.

        Unlike the Slack equivalent, no bot token is persisted here:
        Microsoft Teams uses operator-supplied APP-LEVEL bot
        credentials (one `MICROSOFT_APP_ID` per deployment) not
        per-tenant tokens. The persisted record carries only the
        tenant id + display name + installer object id.

        Upserts on `tenant_id`. Soft-deleted rows revive on
        re-install. `installed_at` is NOT moved by upsert (operators
        can infer re-install activity from other field changes).
      security:
        - bridgeBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamsTenantCreate'
      responses:
        '201':
          description: Persisted (or upserted) the tenant record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamsTenantResponse'
        '401':
          description: Missing, malformed, or non-matching bridge bearer token
        '500':
          description: Operator has not configured `LQ_AI_BRIDGE_TOKEN` on the api

  # ============================================================
  # M3-D4 — admin intake-bridges surface
  # ============================================================

  /api/v1/admin/intake-bridges:
    get:
      tags: [admin-intake-bridges]
      summary: List live Slack + Teams installs for the admin UI (M3-D4)
      description: |
        Returns non-soft-deleted Slack workspaces and Teams tenants,
        sorted by `installed_at DESC` within each section. Admin-only.
        Backs the SvelteKit admin page at `/lq-ai/admin/intake-bridges`.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Live install list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntakeBridgesList'
        '401':
          description: Not authenticated
        '403':
          description: Authenticated but not an admin

  /api/v1/admin/intake-bridges/slack/{workspace_id}:
    delete:
      tags: [admin-intake-bridges]
      summary: Soft-delete a Slack workspace install (M3-D4)
      description: |
        Sets `deleted_at` to now. The row stays in the DB so a
        re-install via the slack-bridge OAuth flow revives it in
        place per the M3-D1 upsert semantics; the install history
        is preserved across disconnect/reconnect cycles.
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Soft-deleted
        '401':
          description: Not authenticated
        '403':
          description: Authenticated but not an admin
        '404':
          description: Workspace not found or already disconnected

  /api/v1/admin/intake-bridges/teams/{tenant_id}:
    delete:
      tags: [admin-intake-bridges]
      summary: Soft-delete a Microsoft 365 tenant install (M3-D4)
      description: |
        Same posture as the Slack endpoint above — soft-delete with
        revivable row.
      security:
        - bearerAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Soft-deleted
        '401':
          description: Not authenticated
        '403':
          description: Authenticated but not an admin
        '404':
          description: Tenant not found or already disconnected

# ============================================================
# M4-A4-i — Autonomous sessions read/halt API
# ============================================================

  /api/v1/autonomous/sessions:
    get:
      tags: [autonomous]
      summary: List the calling user's autonomous sessions (newest first, paginated)
      description: |
        Returns the caller's sessions ordered by ``created_at DESC``.
        ``limit`` is clamped to [1, 200]; ``offset`` to [0, ∞).
        Only the caller's own sessions are returned — cross-user isolation
        is enforced at the query level.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema: {type: integer, default: 50, minimum: 1, maximum: 200}
          description: Maximum number of sessions to return (clamped to [1, 200]).
        - name: offset
          in: query
          required: false
          schema: {type: integer, default: 0, minimum: 0}
          description: Zero-based index of the first result to return.
      responses:
        '200':
          description: Paginated list of autonomous sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousSessionListResponse'
        '401':
          description: Not authenticated

  /api/v1/autonomous/sessions/{session_id}:
    get:
      tags: [autonomous]
      summary: Fetch a single autonomous session with its full receipt
      description: |
        Returns the session plus a live-reconstructed receipt built from
        audit rows (works for running and completed sessions).  A completed
        session also has the receipt persisted in ``result``.

        Another user's ``session_id`` returns 404 (not 403) to avoid
        existence disclosure.
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Session detail with receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousSessionDetailResponse'
        '401':
          description: Not authenticated
        '404':
          description: Session not found

  /api/v1/autonomous/sessions/{session_id}/halt:
    post:
      tags: [autonomous]
      summary: Request an immediate halt for an autonomous session (idempotent)
      description: |
        Sets ``halt_state = 'halt_requested'`` so the executor's R5 temporal
        brake trips on the next tool call and transitions the session to
        ``halted``.

        **Idempotent:** if ``halt_state`` is already ``halt_requested`` or
        ``halted``, the endpoint returns the current session state with 200
        and writes no duplicate audit row.

        Another user's ``session_id`` returns 404 (not 403).
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: false
      responses:
        '200':
          description: Updated session (halt requested or already halted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousSessionRead'
        '401':
          description: Not authenticated
        '404':
          description: Session not found

  # M4-B1 — per-user memory curation API

  /api/v1/autonomous/memory:
    get:
      tags: [autonomous]
      summary: List the calling user's autonomous memory entries (non-deleted, newest first)
      description: |
        Returns the caller's non-deleted memory entries ordered by
        ``created_at DESC``.  Pass ``?state=proposed|kept|dismissed`` to
        filter by review state; omitting ``state`` returns all non-deleted
        entries.  ``limit`` is clamped to [1, 200]; ``offset`` to [0, ∞).
      security:
        - bearerAuth: []
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [proposed, kept, dismissed]
          description: Filter by review state; omit to return all non-deleted entries.
        - name: limit
          in: query
          required: false
          schema: {type: integer, default: 50, minimum: 1, maximum: 200}
          description: Maximum number of entries to return (clamped to [1, 200]).
        - name: offset
          in: query
          required: false
          schema: {type: integer, default: 0, minimum: 0}
          description: Zero-based index of the first result to return.
      responses:
        '200':
          description: Paginated list of autonomous memory entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousMemoryListResponse'
        '401':
          description: Not authenticated

  /api/v1/autonomous/memory/{memory_id}/keep:
    post:
      tags: [autonomous]
      summary: Keep (approve) an autonomous memory entry; optional edit-on-keep
      description: |
        Transitions ``proposed`` or ``dismissed`` → ``kept``.  If the
        optional body supplies ``content``, the entry's text is overwritten
        (edit-on-keep).

        **Re-keep semantics:** if the entry is already ``kept``, the action
        is allowed — content is updated if provided; ``kept_at`` is
        preserved.

        Another user's ``memory_id`` returns 404.  Audited.
      security:
        - bearerAuth: []
      parameters:
        - name: memory_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryKeepRequest'
      responses:
        '200':
          description: Updated memory entry (now kept)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousMemoryRead'
        '401':
          description: Not authenticated
        '404':
          description: Memory entry not found

  /api/v1/autonomous/memory/{memory_id}/dismiss:
    post:
      tags: [autonomous]
      summary: Dismiss an autonomous memory entry
      description: |
        Transitions ``proposed`` or ``kept`` → ``dismissed``.

        Another user's ``memory_id`` returns 404.  Audited.
      security:
        - bearerAuth: []
      parameters:
        - name: memory_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Updated memory entry (now dismissed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousMemoryRead'
        '401':
          description: Not authenticated
        '404':
          description: Memory entry not found

  /api/v1/autonomous/memory/{memory_id}:
    delete:
      tags: [autonomous]
      summary: Soft-delete an autonomous memory entry (returns 200 with updated entry)
      description: |
        Soft-deletes the entry by setting ``deleted_at=now(UTC)``.
        Returns **200** with the updated (deleted) entry — not 204 — to
        avoid the FastAPI JSONResponse/204 assertion pitfall.

        A subsequent GET excludes the entry; keep/dismiss/delete on a
        deleted entry return 404.

        Another user's ``memory_id`` returns 404.  Audited.
      security:
        - bearerAuth: []
      parameters:
        - name: memory_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Soft-deleted memory entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousMemoryRead'
        '401':
          description: Not authenticated
        '404':
          description: Memory entry not found

  # ── M4-B2 — precedent board + promote-to-Project proposal lifecycle ──

  /api/v1/autonomous/precedents:
    get:
      tags: [autonomous]
      summary: List the calling user's precedent entries (non-dismissed, newest first)
      description: |
        Returns the caller's non-dismissed precedent entries
        (``dismissed_at IS NULL``) ordered by ``created_at DESC``.  Pass
        ``?pattern_kind=`` to filter to one classifier; omitting it returns
        all non-dismissed entries.  ``limit`` is clamped to [1, 200];
        ``offset`` to [0, ∞).
      security:
        - bearerAuth: []
      parameters:
        - name: pattern_kind
          in: query
          required: false
          schema: {type: string}
          description: Filter by precedent classifier; omit to return all non-dismissed entries.
        - name: limit
          in: query
          required: false
          schema: {type: integer, default: 50, minimum: 1, maximum: 200}
          description: Maximum number of entries to return (clamped to [1, 200]).
        - name: offset
          in: query
          required: false
          schema: {type: integer, default: 0, minimum: 0}
          description: Zero-based index of the first result to return.
      responses:
        '200':
          description: Paginated list of precedent entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrecedentEntryListResponse'
        '401':
          description: Not authenticated

  /api/v1/autonomous/precedents/{precedent_id}/dismiss:
    post:
      tags: [autonomous]
      summary: Dismiss a precedent entry (idempotent)
      description: |
        Sets ``dismissed_at=now(UTC)`` so the entry drops out of the board.
        Re-dismissing leaves the original ``dismissed_at`` untouched.

        Another user's ``precedent_id`` returns 404.  Audited.
      security:
        - bearerAuth: []
      parameters:
        - name: precedent_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Updated precedent entry (now dismissed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrecedentEntryRead'
        '401':
          description: Not authenticated
        '404':
          description: Precedent entry not found

  /api/v1/autonomous/precedents/{precedent_id}/promote:
    post:
      tags: [autonomous]
      summary: Propose promoting a precedent into a Project's context (proposal only)
      description: |
        Creates a ``proposed`` project-context proposal linking the
        precedent to ``project_id``.  The ``suggested_md`` snippet is
        derived server-side from the precedent's ``summary``.

        This endpoint does **NOT** mutate ``projects.context_md`` —
        promotion is a proposal only; the user accepting it performs the
        authorized write (ADR 0013 D5).

        Another user's ``precedent_id`` — or a ``project_id`` the caller
        does not own — returns 404.  Audited.
      security:
        - bearerAuth: []
      parameters:
        - name: precedent_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromotePrecedentRequest'
      responses:
        '201':
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectContextProposalRead'
        '401':
          description: Not authenticated
        '404':
          description: Precedent or target project not found

  /api/v1/autonomous/project-context-proposals:
    get:
      tags: [autonomous]
      summary: List the calling user's project-context proposals (newest first)
      description: |
        Returns the caller's project-context proposals ordered by
        ``created_at DESC``.  Pass ``?state=proposed|accepted|rejected``
        and/or ``?project_id=`` to filter.  ``limit`` is clamped to
        [1, 200]; ``offset`` to [0, ∞).
      security:
        - bearerAuth: []
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [proposed, accepted, rejected]
          description: Filter by proposal state.
        - name: project_id
          in: query
          required: false
          schema: {type: string, format: uuid}
          description: Filter to proposals targeting one Project.
        - name: limit
          in: query
          required: false
          schema: {type: integer, default: 50, minimum: 1, maximum: 200}
          description: Maximum number of proposals to return (clamped to [1, 200]).
        - name: offset
          in: query
          required: false
          schema: {type: integer, default: 0, minimum: 0}
          description: Zero-based index of the first result to return.
      responses:
        '200':
          description: Paginated list of project-context proposals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectContextProposalListResponse'
        '401':
          description: Not authenticated

  /api/v1/autonomous/project-context-proposals/{proposal_id}/accept:
    post:
      tags: [autonomous]
      summary: Accept a proposal — append the suggested context to the Project (user-authorized write)
      description: |
        The user-authorized write (ADR 0013 D5): appends the proposal's
        ``suggested_md`` to the target Project's ``context_md``
        (initializing it if NULL), sets ``state='accepted'`` and
        ``accepted_at``.

        Idempotent on re-accept: if already ``accepted``, returns the
        current state without re-appending.  A ``rejected`` proposal may be
        accepted (rejected→accepted) and the append occurs.

        Another user's ``proposal_id`` returns 404.  Audited.
      security:
        - bearerAuth: []
      parameters:
        - name: proposal_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Updated proposal (now accepted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectContextProposalRead'
        '401':
          description: Not authenticated
        '404':
          description: Proposal not found

  /api/v1/autonomous/project-context-proposals/{proposal_id}/reject:
    post:
      tags: [autonomous]
      summary: Reject a proposal (does not touch Project context)
      description: |
        Sets ``state='rejected'`` and ``rejected_at``.  Does NOT touch
        ``projects.context_md``.

        Another user's ``proposal_id`` returns 404.  Audited.
      security:
        - bearerAuth: []
      parameters:
        - name: proposal_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Updated proposal (now rejected)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectContextProposalRead'
        '401':
          description: Not authenticated
        '404':
          description: Proposal not found

  # ------------------------------------------------------------
  # M4-B3 — Scheduled autonomous tasks
  # ------------------------------------------------------------
  /api/v1/autonomous/schedules:
    post:
      tags: [autonomous]
      summary: Create an autonomous schedule (cron-triggered run definition)
      description: |
        Validates ``cron_expr`` (a five-field cron string); invalid
        expressions return 422.  Seeds ``next_run_at`` from the cron
        expression so the dispatcher can pick it up.  Per-user isolated.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutonomousScheduleCreate'
      responses:
        '201':
          description: Schedule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousScheduleRead'
        '401':
          description: Not authenticated
        '422':
          description: Invalid cron expression
    get:
      tags: [autonomous]
      summary: List the calling user's autonomous schedules (non-deleted, newest first)
      description: |
        Returns the caller's non-deleted schedules ordered by
        ``created_at DESC``.  Optional ``?enabled=`` filter.
      security:
        - bearerAuth: []
      parameters:
        - name: enabled
          in: query
          required: false
          schema: {type: boolean}
        - name: limit
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 200, default: 50}
        - name: offset
          in: query
          required: false
          schema: {type: integer, minimum: 0, default: 0}
      responses:
        '200':
          description: Paginated list of schedules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousScheduleListResponse'
        '401':
          description: Not authenticated

  /api/v1/autonomous/schedules/{schedule_id}:
    patch:
      tags: [autonomous]
      summary: Partially update an autonomous schedule (edit / enable / disable)
      description: |
        Partial update.  If ``cron_expr`` changes it is re-validated (422
        on invalid) and ``next_run_at`` is recomputed.  Another user's
        ``schedule_id`` returns 404.  Audited.
      security:
        - bearerAuth: []
      parameters:
        - name: schedule_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutonomousScheduleUpdate'
      responses:
        '200':
          description: Updated schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousScheduleRead'
        '401':
          description: Not authenticated
        '404':
          description: Schedule not found
        '422':
          description: Invalid cron expression
    delete:
      tags: [autonomous]
      summary: Soft-delete an autonomous schedule (returns 200 with updated entity)
      description: |
        Soft-deletes by setting ``deleted_at``.  Returns 200 with the
        updated entity (NOT 204 — FastAPI JSONResponse/204 pitfall).
        A deleted schedule is excluded from list and the dispatcher;
        re-delete returns 404.  Another user's ``schedule_id`` returns 404.
        Audited.
      security:
        - bearerAuth: []
      parameters:
        - name: schedule_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Updated schedule (now soft-deleted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousScheduleRead'
        '401':
          description: Not authenticated
        '404':
          description: Schedule not found

  /api/v1/autonomous/watches:
    post:
      tags: [autonomous]
      summary: Create an autonomous watch (KB-arrival-triggered run definition)
      description: |
        Creates a watch on a knowledge base the caller owns; document
        arrivals (KB attach) then spawn an autonomous session. The caller
        must own the target ``knowledge_base_id`` — a KB they cannot see
        returns 404 (KB-sharing is out of scope). Per-user isolated.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutonomousWatchCreate'
      responses:
        '201':
          description: Watch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousWatchRead'
        '401':
          description: Not authenticated
        '404':
          description: Target knowledge base not found
    get:
      tags: [autonomous]
      summary: List the calling user's autonomous watches (non-deleted, newest first)
      description: |
        Returns the caller's non-deleted watches ordered by
        ``created_at DESC``.  Optional ``?enabled=`` and
        ``?knowledge_base_id=`` filters.
      security:
        - bearerAuth: []
      parameters:
        - name: enabled
          in: query
          required: false
          schema: {type: boolean}
        - name: knowledge_base_id
          in: query
          required: false
          schema: {type: string, format: uuid}
        - name: limit
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 200, default: 50}
        - name: offset
          in: query
          required: false
          schema: {type: integer, minimum: 0, default: 0}
      responses:
        '200':
          description: Paginated list of watches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousWatchListResponse'
        '401':
          description: Not authenticated

  /api/v1/autonomous/watches/{watch_id}:
    patch:
      tags: [autonomous]
      summary: Partially update an autonomous watch (enable / disable / retarget)
      description: |
        Partial update of ``enabled`` / ``playbook_id`` / ``skill_ref``.
        The watch's ``knowledge_base_id`` is immutable. Another user's
        ``watch_id`` returns 404.  Audited.
      security:
        - bearerAuth: []
      parameters:
        - name: watch_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutonomousWatchUpdate'
      responses:
        '200':
          description: Updated watch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousWatchRead'
        '401':
          description: Not authenticated
        '404':
          description: Watch not found
    delete:
      tags: [autonomous]
      summary: Soft-delete an autonomous watch (returns 200 with updated entity)
      description: |
        Soft-deletes by setting ``deleted_at``.  Returns 200 with the
        updated entity (NOT 204 — FastAPI JSONResponse/204 pitfall).
        A deleted watch is excluded from list and the KB-arrival trigger;
        re-delete returns 404.  Another user's ``watch_id`` returns 404.
        Audited.
      security:
        - bearerAuth: []
      parameters:
        - name: watch_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Updated watch (now soft-deleted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousWatchRead'
        '401':
          description: Not authenticated
        '404':
          description: Watch not found

  /api/v1/autonomous/notifications:
    get:
      tags: [autonomous]
      summary: List the calling user's autonomous notifications (newest first)
      description: |
        Returns the caller's notifications ordered by ``created_at DESC``.
        Pass ``?unread=true`` to narrow to unread rows (``read_at IS
        NULL``). Per-user isolated.
      security:
        - bearerAuth: []
      parameters:
        - name: unread
          in: query
          required: false
          schema: {type: boolean}
        - name: limit
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 200, default: 50}
        - name: offset
          in: query
          required: false
          schema: {type: integer, minimum: 0, default: 0}
      responses:
        '200':
          description: Paginated list of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousNotificationListResponse'
        '401':
          description: Not authenticated

  /api/v1/autonomous/notifications/{notification_id}/read:
    post:
      tags: [autonomous]
      summary: Mark an autonomous notification read (the dismiss action; idempotent)
      description: |
        Sets ``read_at`` if currently NULL; idempotent (re-read preserves
        the original timestamp). "Read" IS the dismiss action — a read
        notification drops out of ``?unread=true``. Another user's
        ``notification_id`` returns 404.  Audited.
      security:
        - bearerAuth: []
      parameters:
        - name: notification_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Updated notification (now read)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousNotificationRead'
        '401':
          description: Not authenticated
        '404':
          description: Notification not found

  /api/v1/autonomous/run-now:
    post:
      tags: [autonomous]
      summary: Run a skill or playbook once now (one-off manual autonomous session)
      description: |
        Spawns a single ``trigger_kind='manual'`` autonomous session so a
        user can test what a skill/playbook does — and inspect the
        resulting receipt — before arming it as a schedule or watch.
        Exactly one of ``playbook_id`` / ``skill_ref`` must be set (zero
        or both → 422). ``target_kb_id`` / ``project_id`` are optional
        scope; ``max_cost_usd`` is the per-run cap (NULL falls back to the
        config default so R4 always arms). Gated by opt-in
        (``autonomous_enabled``); the spawned session runs under the same
        R4/R5/R6 brakes as every other session. Per-user isolated. Audited.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutonomousManualRunRequest'
      responses:
        '201':
          description: Session spawned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutonomousSessionRead'
        '401':
          description: Not authenticated
        '403':
          description: Autonomous layer not enabled for this user
        '422':
          description: Invalid target (need exactly one of playbook_id/skill_ref)

# ============================================================
# COMPONENTS
# ============================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    gatewayKeyAuth:
      type: apiKey
      in: header
      name: X-LQ-AI-Gateway-Key
      description: |
        Shared-secret used by the Inference Gateway to call the
        backend's `/api/v1/internal/*` routes (per ADR 0007). Constant-
        time compare against `LQ_AI_GATEWAY_KEY` on the backend. The
        same secret is used in the reverse direction (backend → gateway)
        for incoming-request auth on the gateway's surface, though the
        gateway-side enforcement is a deferred D-phase item.
    bridgeBearerAuth:
      type: http
      scheme: bearer
      description: |
        Shared-secret bearer token the slack-bridge service presents
        on POSTs to `/api/v1/integrations/slack/workspaces` (M3-D1).
        Constant-time compare against `LQ_AI_BRIDGE_TOKEN` on the
        backend. Distinct from `gatewayKeyAuth` — the bridge and the
        gateway have separate service identities and separate
        threat models.

  schemas:
    SlackWorkspaceCreate:
      type: object
      description: |
        Request body for `POST /api/v1/integrations/slack/workspaces`
        (M3-D1). Shape matches what `slack-bridge/app/oauth.py`
        constructs from Slack's `oauth.v2.access` response after the
        operator completes consent. The bridge → api contract is
        position-coupled to this shape; renames here would break it.
      required:
        - team_id
        - team_name
        - bot_token
        - bot_user_id
        - installer_slack_user_id
        - scope
      additionalProperties: false
      properties:
        team_id:
          type: string
          minLength: 1
          description: Slack workspace id (T0...).
          example: 'T01234567'
        team_name:
          type: string
          minLength: 1
          description: Workspace display name at install time.
          example: 'Acme Legal'
        bot_token:
          type: string
          minLength: 1
          description: |
            The xoxb- bot user OAuth token Slack returned. Plaintext
            on the wire (the request travels over the trusted
            in-cluster network with a bridge bearer token); encrypted
            under `LQ_AI_BRIDGE_MASTER_KEY` before persistence.
          example: 'xoxb-...'
        bot_user_id:
          type: string
          minLength: 1
          description: Slack user id of the bot user.
          example: 'U99BOT'
        installer_slack_user_id:
          type: string
          minLength: 1
          description: Slack user id of the operator who completed install (audit only).
          example: 'U11INSTALLER'
        scope:
          type: string
          minLength: 1
          description: Comma-separated scope list Slack returned.
          example: 'commands,chat:write'

    TeamsTenantCreate:
      type: object
      description: |
        Request body for `POST /api/v1/integrations/teams/tenants`
        (M3-D3). Shape matches what `teams-bridge/app/oauth.py`
        constructs from the Microsoft id_token claims (`tid`, `oid`)
        + a best-effort Microsoft Graph `/organization` display-name
        lookup.
      required:
        - tenant_id
        - tenant_name
        - installer_oid
      additionalProperties: false
      properties:
        tenant_id:
          type: string
          minLength: 1
          description: Microsoft tenant id (`tid` claim — the M365 directory GUID).
          example: '00000000-0000-0000-0000-aaaaaaaaaaaa'
        tenant_name:
          type: string
          minLength: 1
          description: |
            Tenant display name at install time. Best-effort from
            Microsoft Graph `/organization`; falls back to the
            tenant_id if Graph errors.
          example: 'Acme Legal LLP'
        installer_oid:
          type: string
          minLength: 1
          description: |
            M365 `oid` claim of the admin who completed consent.
            Audit only — does not grant LQ.AI permissions.
          example: '00000000-0000-0000-0000-111111111111'

    TeamsTenantResponse:
      type: object
      description: |
        Persisted-tenant response for `POST
        /api/v1/integrations/teams/tenants`. Mirrors
        `SlackWorkspaceResponse` minus the per-tenant bot fields
        (Teams uses app-level credentials).
      required:
        - id
        - tenant_id
        - tenant_name
        - installer_oid
        - installed_at
      properties:
        id:
          type: string
          format: uuid
          description: api-side tenant row id.
        tenant_id:
          type: string
          example: '00000000-0000-0000-0000-aaaaaaaaaaaa'
        tenant_name:
          type: string
          example: 'Acme Legal LLP'
        installer_oid:
          type: string
          example: '00000000-0000-0000-0000-111111111111'
        installed_at:
          type: string
          format: date-time
          description: Original install timestamp. NOT moved by upsert.

    SlackWorkspaceSummary:
      type: object
      description: |
        One live Slack workspace row in the admin intake-bridges list
        (M3-D4). The wire shape mirrors the model row minus the bot
        token ciphertext (which the admin UI has no business seeing).
      required:
        - id
        - team_id
        - team_name
        - installer_slack_user_id
        - installed_at
      properties:
        id: { type: string, format: uuid }
        team_id: { type: string }
        team_name: { type: string }
        installer_slack_user_id: { type: string }
        installed_at: { type: string, format: date-time }

    TeamsTenantSummary:
      type: object
      description: |
        One live Microsoft 365 tenant row in the admin intake-bridges
        list (M3-D4). Mirrors the model row.
      required:
        - id
        - tenant_id
        - tenant_name
        - installer_oid
        - installed_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string }
        tenant_name: { type: string }
        installer_oid: { type: string }
        installed_at: { type: string, format: date-time }

    IntakeBridgesList:
      type: object
      description: |
        Section-split response for `GET /api/v1/admin/intake-bridges`.
        Separate sections (rather than a single polymorphic list) so
        the SvelteKit admin page renders two distinct sections without
        client-side discriminator-key gymnastics.
      required:
        - slack_workspaces
        - teams_tenants
      properties:
        slack_workspaces:
          type: array
          items: { $ref: '#/components/schemas/SlackWorkspaceSummary' }
        teams_tenants:
          type: array
          items: { $ref: '#/components/schemas/TeamsTenantSummary' }

    SlackWorkspaceResponse:
      type: object
      description: |
        Persisted-workspace response for `POST
        /api/v1/integrations/slack/workspaces`. Bot token is
        deliberately omitted — neither the plaintext nor the
        ciphertext is echoed back to the bridge.
      required:
        - id
        - team_id
        - team_name
        - bot_user_id
        - installer_slack_user_id
        - scope
        - installed_at
      properties:
        id:
          type: string
          format: uuid
          description: api-side workspace row id.
        team_id:
          type: string
          example: 'T01234567'
        team_name:
          type: string
          example: 'Acme Legal'
        bot_user_id:
          type: string
          example: 'U99BOT'
        installer_slack_user_id:
          type: string
          example: 'U11INSTALLER'
        scope:
          type: string
          example: 'commands,chat:write'
        installed_at:
          type: string
          format: date-time
          description: Original install timestamp. NOT moved by upsert.

    WordAddinVersionResponse:
      type: object
      description: |
        Response payload for `GET /api/v1/word-addin/version` (M3-B8).
        Consumed by the task pane on mount to decide whether the
        installed add-in version is compatible with this deployment.
      required:
        - deployment_version
        - addin_min_compatible_version
        - addin_max_compatible_version
        - taskpane_bundle_url
      properties:
        deployment_version:
          type: string
          example: '0.3.0'
          description: |
            LQ.AI deployment version (the api package `__version__`).
            Informational — the add-in surfaces it in the "Update
            needed" overlay so users can quote it to support.
        addin_min_compatible_version:
          type: string
          example: '0.3.0'
          description: |
            Lowest add-in version (semver string) this deployment
            accepts. The task pane refuses to render features when
            its bundled version is lower.
        addin_max_compatible_version:
          type: string
          example: '0.3.99'
          description: |
            Highest add-in version this deployment recognizes. Bundles
            newer than this still load (forward compatibility is
            best-effort) but the add-in surfaces a soft warning so the
            operator knows to update the deployment.
        taskpane_bundle_url:
          type: string
          format: uri
          example: 'https://lq.acme.example/word-addin/taskpane.html'
          description: |
            Canonical URL of the task pane bundle's HTML entry point.
        taskpane_bundle_hash:
          type: string
          nullable: true
          example: null
          description: |
            Optional SHA-256 hash of the deployed task pane bundle JS.
            M3-B8 ships nullable; M3-B7 signing CI populates the value.
            Null means "don't enforce" — not an error.

    FallbackTier:
      type: object
      required: [rank, description, language]
      description: |
        One acceptable alternative to a position's standard language.
        Ranked 1-based (1 = preferred fallback). Stored as JSONB on
        ``playbook_positions.fallback_tiers`` (M3-A1).
      properties:
        rank: {type: integer, minimum: 1}
        description: {type: string}
        language: {type: string}

    Position:
      type: object
      required:
        - id
        - issue
        - standard_language
        - severity_if_missing
      description: |
        One issue in a playbook — the org's standard + fallbacks for a
        clause. Mirrors the ``Position`` shape in PRD §3.7.
      properties:
        id: {type: string, format: uuid}
        issue: {type: string}
        description: {type: string}
        standard_language: {type: string}
        fallback_tiers:
          type: array
          items: {$ref: '#/components/schemas/FallbackTier'}
        redline_strategy: {type: string}
        severity_if_missing:
          type: string
          enum: [critical, high, medium, low]
        detection_keywords:
          type: array
          items: {type: string}
        detection_examples:
          type: array
          items: {type: string}
        position_order: {type: integer, minimum: 0}

    Playbook:
      type: object
      required: [id, name, contract_type, created_at, updated_at]
      description: |
        Full playbook — header plus ordered positions. Mirrors PRD §3.7.
        ``GET /api/v1/playbooks`` returns this shape with ``positions``
        empty; ``GET /api/v1/playbooks/{id}`` returns it with the full
        position list inlined.
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        contract_type: {type: string}
        description: {type: string}
        version: {type: string}
        created_by: {type: string, format: uuid, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        positions:
          type: array
          items: {$ref: '#/components/schemas/Position'}

    PositionCreate:
      type: object
      additionalProperties: false
      required: [issue, standard_language, severity_if_missing]
      description: |
        Request shape for a single position when creating or updating a
        playbook (M3-A6). Identical to ``Position`` minus the server-
        assigned ``id`` (the server mints UUIDs at insert time).
      properties:
        issue: {type: string}
        description: {type: string}
        standard_language: {type: string}
        fallback_tiers:
          type: array
          items: {$ref: '#/components/schemas/FallbackTier'}
        redline_strategy: {type: string}
        severity_if_missing:
          type: string
          enum: [critical, high, medium, low]
        detection_keywords:
          type: array
          items: {type: string}
        detection_examples:
          type: array
          items: {type: string}
        position_order: {type: integer, minimum: 0}

    PlaybookCreate:
      type: object
      additionalProperties: false
      required: [name, contract_type]
      description: |
        Request shape for ``POST /api/v1/playbooks`` (M3-A6). The server
        sets ``created_by`` to the caller's id unconditionally; there is
        no path to mint a built-in (``created_by IS NULL``) via the HTTP
        surface (built-ins ship via seed migration only).
      properties:
        name: {type: string}
        contract_type: {type: string}
        description: {type: string}
        version: {type: string}
        positions:
          type: array
          items: {$ref: '#/components/schemas/PositionCreate'}

    PlaybookUpdate:
      type: object
      additionalProperties: false
      description: |
        Request shape for ``PATCH /api/v1/playbooks/{id}`` (M3-A6). All
        fields optional; a missing field is "leave alone." If
        ``positions`` is supplied, the server **atomically replaces**
        the entire positions list. To leave positions alone, omit the
        field; to clear them, send ``positions: []``.
      properties:
        name: {type: string}
        contract_type: {type: string}
        description: {type: string}
        version: {type: string}
        positions:
          type: array
          nullable: true
          items: {$ref: '#/components/schemas/PositionCreate'}

    EasyPlaybookGenerationCreate:
      type: object
      additionalProperties: false
      required: [document_ids, contract_type]
      description: |
        Request shape for ``POST /api/v1/playbooks/easy`` (M3-A6). The
        document corpus the wizard's Step 1 collected, plus the
        contract family and an optional caller-supplied name.
      properties:
        document_ids:
          type: array
          minItems: 1
          maxItems: 50
          items: {type: string, format: uuid}
        contract_type:
          type: string
          minLength: 1
          description: |
            The contract family the playbook targets ("NDA",
            "MSA-SaaS", "DPA", etc.). Free-form; passed to the
            extractor + assembly LLM calls as a hint.
        name:
          type: string
          nullable: true
          description: |
            Playbook name. Falls back to "Generated {contract_type}
            Playbook" if omitted.
        persist_documents_after_generation:
          type: boolean
          default: true
          description: |
            Reserved for a future ephemeral-upload mode. Currently
            always true; uploaded documents persist to the user's
            library per M3-A6 §3.3.

    EasyPlaybookGeneration:
      type: object
      required: [id, contract_type, status, document_ids, created_at]
      description: |
        One row from the ``easy_playbook_generations`` table. Returned
        by ``POST /api/v1/playbooks/easy`` (at status ``pending``) and
        by ``GET /api/v1/playbooks/easy/{id}`` (the wizard's poll
        target). ``draft_playbook`` is populated only on
        ``status='completed'`` and carries the assembled
        ``PlaybookCreate`` shape for the Step 3 inline editor.
      properties:
        id: {type: string, format: uuid}
        user_id: {type: string, format: uuid, nullable: true}
        contract_type: {type: string}
        status:
          type: string
          enum: [pending, running, completed, error]
        document_ids:
          type: array
          items: {type: string, format: uuid}
        draft_playbook:
          type: object
          nullable: true
          additionalProperties: true
          description: |
            The assembled ``PlaybookCreate`` shape. ``null`` until the
            worker reaches ``status='completed'``.
        error_message:
          type: string
          nullable: true
        created_at: {type: string, format: date-time}
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    PlaybookExecution:
      type: object
      required: [id, playbook_id, target_document_id, status, created_at]
      description: |
        One execution of a playbook against a target document.
        Status lifecycle: ``pending → running → completed | error``.
        ``results`` is populated on ``completed``; ``error`` is populated
        on ``error``. ``completed_at`` is non-null in either terminal state.
      properties:
        id: {type: string, format: uuid}
        playbook_id: {type: string, format: uuid}
        target_document_id: {type: string, format: uuid}
        user_id: {type: string, format: uuid, nullable: true}
        project_id: {type: string, format: uuid, nullable: true}
        status:
          type: string
          enum: [pending, running, completed, error]
        results:
          type: object
          nullable: true
          additionalProperties: true
          description: |
            Per-position outcomes + summary. Shape is versioned via
            ``schema_version`` (currently ``m3-a2-v1``); see the
            M3-A2 executor module for the canonical structure.
        error:
          type: string
          nullable: true
        created_at: {type: string, format: date-time}
        completed_at:
          type: string
          format: date-time
          nullable: true

    # M3-C2 — Tabular / Multi-Document Review wire shapes (PRD §3.14).
    TabularPreviewCostRequest:
      type: object
      required: [document_ids]
      description: |
        Request body for ``POST /api/v1/tabular/preview-cost``. Either
        ``skill_name`` or ``columns`` must be supplied (not both).
      properties:
        document_ids:
          type: array
          minItems: 1
          items: {type: string, format: uuid}
        skill_name:
          type: string
          nullable: true
          description: Name of a registered ``output_format: table`` skill.
        columns:
          type: array
          nullable: true
          items: {$ref: '#/components/schemas/ColumnSpec'}
          description: Ad-hoc column spec (alternative to ``skill_name``).

    TabularPreviewCostResponse:
      type: object
      required: [cells_count, estimated_tokens, estimated_cost_usd, per_tier_breakdown]
      properties:
        cells_count:
          type: integer
          description: ``len(document_ids) * len(columns)``.
        estimated_tokens:
          type: integer
          description: Per-cell token average x cells_count.
        estimated_cost_usd:
          type: string
          description: |
            Per-cell rolling-average cost x cells_count, serialized as
            a JSON string to preserve decimal precision.
        per_tier_breakdown:
          type: object
          additionalProperties: {type: integer}
          description: |
            Map of tier label (``tier_1`` / ``tier_2`` / ... or
            ``default``) to cell count routed at that tier. Columns
            without an explicit ``minimum_inference_tier`` count in
            the ``default`` bucket.
        ensemble_cells_count:
          type: integer
          description: |
            Number of cells that will run ensemble Citation-Engine
            verification (``len(document_ids) * ensemble-column count``).
            ``0`` when no column is ensemble-verified.
        ensemble_premium_usd:
          type: string
          description: |
            The ensemble judge-call cost included in
            ``estimated_cost_usd`` (= ``n_judges * per-judge-cost *
            ensemble_cells_count``), serialized as a JSON string to
            preserve decimal precision. ``"0"`` when no column is
            ensemble-verified. Note that ``estimated_cost_usd`` is the
            TOTAL (base extraction + this premium); ``estimated_tokens``
            is extraction-only and excludes judge tokens.

    TabularExecutionCreate:
      type: object
      required: [document_ids]
      description: |
        Request body for ``POST /api/v1/tabular/execute``. Either
        ``skill_name`` or ``columns`` must be supplied (not both).
        ``confirmed_cost_usd`` echoes the preview value so the row
        carries an audit trail of the operator confirming a specific
        cost ceiling.
      properties:
        document_ids:
          type: array
          minItems: 1
          items: {type: string, format: uuid}
        skill_name: {type: string, nullable: true}
        columns:
          type: array
          nullable: true
          items: {$ref: '#/components/schemas/ColumnSpec'}
        confirmed_cost_usd:
          type: string
          nullable: true
          description: |
            Operator-confirmed cost from the preview endpoint. Persisted
            to ``tabular_executions.cost_estimate_usd``.

    TabularExecution:
      type: object
      required: [id, status, document_ids, document_names, columns, created_at]
      description: |
        One row from the ``tabular_executions`` table. Lifecycle:
        ``pending → running → completed | failed | cancelled``.
        ``results`` is populated by the aggregate node on ``completed``;
        ``error_text`` is populated on ``failed``. Soft-deleted rows
        (``deleted_at`` non-null) are invisible to list / detail
        endpoints.
      properties:
        id: {type: string, format: uuid}
        user_id: {type: string, format: uuid, nullable: true}
        parent_execution_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Non-null on bulk-op sibling rows (Phase C prep doc Decision
            C-9). Bulk ops spawn siblings rather than mutating the
            original grid, preserving auditability.
        skill_name:
          type: string
          nullable: true
          description: |
            Source skill name; ``null`` for ad-hoc executions where the
            operator typed columns directly in the wizard.
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        document_ids:
          type: array
          items: {type: string, format: uuid}
        document_names:
          type: array
          items: {type: string}
          description: |
            Per-document display names (operator-uploaded filenames),
            parallel to ``document_ids`` in selection order. Assembled on
            the response by ``_to_response``; not a stored column.
        columns:
          type: array
          items: {$ref: '#/components/schemas/ColumnSpec'}
        results:
          type: object
          nullable: true
          additionalProperties: true
          description: |
            Assembled grid shape with rows + per-cell results. Shape is
            versioned via ``schema_version`` (currently ``m3-c2-v1``).

            Each cell result also carries ``verification_method``
            (string, nullable) — the per-cell ensemble Citation-Engine
            verification outcome (``ensemble_strict`` /
            ``ensemble_majority``), or ``null`` when the cell's column is
            not ensemble-verified or verification did not confirm support.

            Each cell carries a ``citations`` array. A tabular cell
            ``Citation`` is distinct from the chat ``Citation`` schema; it
            has: ``citation_id`` (uuid; deterministic display-only id —
            DE-309), ``document_id`` (uuid; the source ``documents.id``),
            ``chunk_id`` (uuid, nullable; the cited ``document_chunks.id``),
            and ``confidence`` (one of ``high|medium|low|failed``). Each
            citation additionally carries ``verification_method`` (string,
            nullable) — the Citation-Engine verification method
            (``ensemble_strict`` / ``ensemble_majority``), or ``null`` when
            the cell's column is not ensemble-verified or verification did
            not confirm support. It is mirrored from the cell-level value.

            On ``GET /api/v1/tabular/executions/{id}`` (only) each citation
            is additionally enriched at read time so the frontend can open
            the cited source in its doc panel (same UX as chat citations):

            - ``source_file_id`` (uuid, nullable): the source document's
              ``documents.file_id`` — the ``files.id`` the doc panel keys
              off. ``null`` when the backing chunk row is missing/stale.
            - ``source_page`` (integer, nullable): the cited chunk's
              ``document_chunks.page_start`` (nullable — best-effort page
              assignment).
            - ``source_text`` (string, nullable): the cited chunk's full
              ``document_chunks.content`` (the frontend locates/highlights
              the cited span within it).

            These three fields are resolved via two batched ``IN`` queries
            (chunks, then documents) — no N+1 — and are ``null`` on the
            list/export paths, which do not enrich.
        cost_estimate_usd:
          type: string
          nullable: true
        cost_actual_usd:
          type: string
          nullable: true
        error_text:
          type: string
          nullable: true
        created_at: {type: string, format: date-time}
        started_at: {type: string, format: date-time, nullable: true}
        completed_at: {type: string, format: date-time, nullable: true}

    TabularExecutionSummary:
      type: object
      required:
        - id
        - status
        - document_count
        - column_count
        - created_at
      description: |
        Compact projection used by the list endpoint. Drops the
        (potentially large) ``results`` payload — operators fetch the
        full execution row when they open one.
      properties:
        id: {type: string, format: uuid}
        user_id: {type: string, format: uuid, nullable: true}
        parent_execution_id: {type: string, format: uuid, nullable: true}
        skill_name: {type: string, nullable: true}
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        document_count: {type: integer}
        column_count: {type: integer}
        cost_estimate_usd: {type: string, nullable: true}
        cost_actual_usd: {type: string, nullable: true}
        created_at: {type: string, format: date-time}
        completed_at: {type: string, format: date-time, nullable: true}

    AdminUserRow:
      type: object
      required: [id, email, role, is_admin, mfa_enabled, must_change_password, created_at]
      properties:
        id: {type: string, format: uuid}
        email: {type: string, format: email}
        display_name: {type: string, nullable: true}
        role: {type: string, enum: [admin, member, viewer]}
        is_admin: {type: boolean}
        mfa_enabled: {type: boolean}
        must_change_password: {type: boolean}
        created_at: {type: string, format: date-time}
        last_login_at: {type: string, format: date-time, nullable: true}
        deletion_scheduled_at: {type: string, format: date-time, nullable: true}

    # M4-B1 — Autonomous memory curation schemas

    AutonomousMemoryRead:
      type: object
      description: |
        Read-only view of an ``autonomous_memory`` row.  Returned by the
        list, keep, dismiss, and delete endpoints.
      required:
        - id
        - user_id
        - state
        - category
        - content
        - created_at
        - updated_at
      properties:
        id: {type: string, format: uuid}
        user_id: {type: string, format: uuid}
        state:
          type: string
          enum: [proposed, kept, dismissed]
        category: {type: string}
        content: {type: string}
        source_session_id: {type: string, format: uuid, nullable: true}
        kept_at: {type: string, format: date-time, nullable: true}
        deleted_at: {type: string, format: date-time, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    AutonomousMemoryListResponse:
      type: object
      description: Paginated list of autonomous memory entries (non-deleted, newest first).
      required: [entries, total_count, limit, offset]
      properties:
        entries:
          type: array
          items: {$ref: '#/components/schemas/AutonomousMemoryRead'}
        total_count: {type: integer, minimum: 0}
        limit: {type: integer, minimum: 1, maximum: 200}
        offset: {type: integer, minimum: 0}

    MemoryKeepRequest:
      type: object
      description: |
        Optional request body for ``POST /autonomous/memory/{id}/keep``.
        If ``content`` is provided, the memory entry's text is overwritten
        on keep (edit-on-keep).
      properties:
        content: {type: string, nullable: true}

    # M4-B2 — precedent board + promote-to-Project proposal schemas

    PrecedentEntryRead:
      type: object
      description: |
        Read-only view of a ``precedent_entries`` row.  Returned by the
        list, dismiss endpoints.
      required:
        - id
        - user_id
        - pattern_kind
        - summary
        - observed_count
        - created_at
        - updated_at
      properties:
        id: {type: string, format: uuid}
        user_id: {type: string, format: uuid}
        pattern_kind: {type: string}
        summary: {type: string}
        observed_count: {type: integer, minimum: 1}
        source_session_id: {type: string, format: uuid, nullable: true}
        dismissed_at: {type: string, format: date-time, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    PrecedentEntryListResponse:
      type: object
      description: Paginated list of precedent entries (non-dismissed, newest first).
      required: [entries, total_count, limit, offset]
      properties:
        entries:
          type: array
          items: {$ref: '#/components/schemas/PrecedentEntryRead'}
        total_count: {type: integer, minimum: 0}
        limit: {type: integer, minimum: 1, maximum: 200}
        offset: {type: integer, minimum: 0}

    PromotePrecedentRequest:
      type: object
      description: |
        Request body for ``POST /autonomous/precedents/{id}/promote``.
        ``project_id`` is the target Project; the caller must own it.
      required: [project_id]
      properties:
        project_id: {type: string, format: uuid}

    ProjectContextProposalRead:
      type: object
      description: |
        Read-only view of a ``project_context_proposals`` row — a proposal
        to promote a precedent into a Project's context document.  Only the
        user accepting a proposal writes ``projects.context_md`` (ADR 0013 D5).
      required:
        - id
        - user_id
        - precedent_id
        - project_id
        - suggested_md
        - state
        - created_at
        - updated_at
      properties:
        id: {type: string, format: uuid}
        user_id: {type: string, format: uuid}
        precedent_id: {type: string, format: uuid}
        project_id: {type: string, format: uuid}
        suggested_md: {type: string}
        state:
          type: string
          enum: [proposed, accepted, rejected]
        accepted_at: {type: string, format: date-time, nullable: true}
        rejected_at: {type: string, format: date-time, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    ProjectContextProposalListResponse:
      type: object
      description: Paginated list of project-context proposals (newest first).
      required: [proposals, total_count, limit, offset]
      properties:
        proposals:
          type: array
          items: {$ref: '#/components/schemas/ProjectContextProposalRead'}
        total_count: {type: integer, minimum: 0}
        limit: {type: integer, minimum: 1, maximum: 200}
        offset: {type: integer, minimum: 0}

    # M4-B3 — Scheduled-tasks schemas

    AutonomousScheduleRead:
      type: object
      description: |
        Read-only view of an ``autonomous_schedules`` row — a cron-triggered
        run definition.
      required:
        - id
        - user_id
        - cron_expr
        - enabled
        - created_at
        - updated_at
      properties:
        id: {type: string, format: uuid}
        user_id: {type: string, format: uuid}
        project_id: {type: string, format: uuid, nullable: true}
        name: {type: string, nullable: true}
        cron_expr: {type: string}
        playbook_id: {type: string, format: uuid, nullable: true}
        skill_ref: {type: string, nullable: true}
        target_kb_id: {type: string, format: uuid, nullable: true}
        enabled: {type: boolean}
        last_run_at: {type: string, format: date-time, nullable: true}
        next_run_at: {type: string, format: date-time, nullable: true}
        deleted_at: {type: string, format: date-time, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    AutonomousScheduleCreate:
      type: object
      description: |
        Request body for ``POST /autonomous/schedules``.  ``cron_expr`` is a
        five-field cron string (minute hour day-of-month month day-of-week)
        supporting ``*``, lists, ranges, and steps; invalid expressions
        return 422.
      required: [cron_expr]
      properties:
        cron_expr: {type: string}
        name: {type: string, nullable: true}
        playbook_id: {type: string, format: uuid, nullable: true}
        skill_ref: {type: string, nullable: true}
        target_kb_id: {type: string, format: uuid, nullable: true}
        project_id: {type: string, format: uuid, nullable: true}
        enabled: {type: boolean, default: true}

    AutonomousScheduleUpdate:
      type: object
      description: |
        Request body for ``PATCH /autonomous/schedules/{id}``.  All fields
        optional.  Changing ``cron_expr`` re-validates (422) and recomputes
        ``next_run_at``.
      properties:
        name: {type: string, nullable: true}
        cron_expr: {type: string, nullable: true}
        enabled: {type: boolean, nullable: true}
        playbook_id: {type: string, format: uuid, nullable: true}
        skill_ref: {type: string, nullable: true}
        target_kb_id: {type: string, format: uuid, nullable: true}

    AutonomousManualRunRequest:
      type: object
      description: |
        Request body for ``POST /autonomous/run-now``.  Spawns one
        ``trigger_kind='manual'`` session.  Exactly one of ``playbook_id``
        / ``skill_ref`` must be set (zero or both → 422).  ``target_kb_id``
        / ``project_id`` are optional scope.  ``max_cost_usd`` is the
        per-run cap (NULL → fall back to the config default).
      properties:
        playbook_id: {type: string, format: uuid, nullable: true}
        skill_ref: {type: string, nullable: true}
        target_kb_id: {type: string, format: uuid, nullable: true}
        project_id: {type: string, format: uuid, nullable: true}
        max_cost_usd: {type: string, nullable: true}

    AutonomousScheduleListResponse:
      type: object
      description: Paginated list of autonomous schedules (newest first).
      required: [schedules, total_count, limit, offset]
      properties:
        schedules:
          type: array
          items: {$ref: '#/components/schemas/AutonomousScheduleRead'}
        total_count: {type: integer, minimum: 0}
        limit: {type: integer, minimum: 1, maximum: 200}
        offset: {type: integer, minimum: 0}

    # M4-B4 — KB-arrival watch schemas

    AutonomousWatchRead:
      type: object
      description: |
        Read-only view of an ``autonomous_watches`` row — a KB-arrival-
        triggered run definition. When a file is attached to
        ``knowledge_base_id``, an autonomous session spawns.
      required:
        - id
        - user_id
        - knowledge_base_id
        - enabled
        - created_at
        - updated_at
      properties:
        id: {type: string, format: uuid}
        user_id: {type: string, format: uuid}
        project_id: {type: string, format: uuid, nullable: true}
        knowledge_base_id: {type: string, format: uuid}
        playbook_id: {type: string, format: uuid, nullable: true}
        skill_ref: {type: string, nullable: true}
        enabled: {type: boolean}
        deleted_at: {type: string, format: date-time, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    AutonomousWatchCreate:
      type: object
      description: |
        Request body for ``POST /autonomous/watches``.  ``knowledge_base_id``
        is required and must be owned by the caller (404 otherwise; KB-sharing
        is out of scope).  The target (``playbook_id`` / ``skill_ref``) and
        ``project_id`` are optional; ``enabled`` defaults to true.
      required: [knowledge_base_id]
      properties:
        knowledge_base_id: {type: string, format: uuid}
        playbook_id: {type: string, format: uuid, nullable: true}
        skill_ref: {type: string, nullable: true}
        project_id: {type: string, format: uuid, nullable: true}
        enabled: {type: boolean, default: true}

    AutonomousWatchUpdate:
      type: object
      description: |
        Request body for ``PATCH /autonomous/watches/{id}``.  All fields
        optional.  The watch's ``knowledge_base_id`` is immutable (not
        present here) — a watch is bound to its KB.
      properties:
        enabled: {type: boolean, nullable: true}
        playbook_id: {type: string, format: uuid, nullable: true}
        skill_ref: {type: string, nullable: true}

    AutonomousWatchListResponse:
      type: object
      description: Paginated list of autonomous watches (newest first).
      required: [watches, total_count, limit, offset]
      properties:
        watches:
          type: array
          items: {$ref: '#/components/schemas/AutonomousWatchRead'}
        total_count: {type: integer, minimum: 0}
        limit: {type: integer, minimum: 1, maximum: 200}
        offset: {type: integer, minimum: 0}

    # M4-C1 — Autonomous notification read/dismiss schemas

    AutonomousNotificationRead:
      type: object
      description: |
        Read-only view of an ``autonomous_notifications`` row. Written by
        the ``notify`` chokepoint handler. ``read_at`` IS NULL = unread;
        marking read is the dismiss action. ``channel`` is one of
        ``in_app`` / ``email`` / ``webhook`` (``webhook`` reserved).
        ``body``/``payload`` carry counts/IDs + a receipt link — never raw
        entity values.
      required:
        - id
        - user_id
        - session_id
        - channel
        - title
        - body
        - created_at
        - updated_at
      properties:
        id: {type: string, format: uuid}
        user_id: {type: string, format: uuid}
        session_id: {type: string, format: uuid}
        channel: {type: string, enum: [in_app, email, webhook]}
        title: {type: string}
        body: {type: string}
        payload: {type: object, nullable: true, additionalProperties: true}
        read_at: {type: string, format: date-time, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    AutonomousNotificationListResponse:
      type: object
      description: Paginated list of autonomous notifications (newest first).
      required: [notifications, total_count, limit, offset]
      properties:
        notifications:
          type: array
          items: {$ref: '#/components/schemas/AutonomousNotificationRead'}
        total_count: {type: integer, minimum: 0}
        limit: {type: integer, minimum: 1, maximum: 200}
        offset: {type: integer, minimum: 0}

    # M4-A4-i — Autonomous session response schemas

    AutonomousSessionRead:
      type: object
      description: |
        Read-only view of an ``autonomous_sessions`` row.  Returned by the
        halt, list, and detail endpoints.
      required:
        - id
        - user_id
        - trigger_kind
        - current_phase
        - halt_state
        - cost_total_usd
        - cost_cap_reached
        - idle_halt_minutes
        - last_activity_at
        - status
        - created_at
        - updated_at
      properties:
        id: {type: string, format: uuid}
        user_id: {type: string, format: uuid}
        project_id: {type: string, format: uuid, nullable: true}
        trigger_kind:
          type: string
          enum: [watch, schedule, suggestion, manual]
        trigger_ref: {type: string, format: uuid, nullable: true}
        current_phase:
          type: string
          enum: [intake, analysis, drafting, ethics_review, delivery]
        halt_state:
          type: string
          enum: [running, halt_requested, halted, paused]
        max_cost_usd: {type: number, format: decimal, nullable: true}
        cost_total_usd: {type: number, format: decimal}
        cost_cap_reached: {type: boolean}
        idle_halt_minutes: {type: integer, minimum: 1}
        last_activity_at: {type: string, format: date-time}
        status:
          type: string
          enum: [running, completed, halted, failed]
        params: {type: object, additionalProperties: true}
        result: {type: object, additionalProperties: true, nullable: true}
        error: {type: string, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        completed_at: {type: string, format: date-time, nullable: true}

    AutonomousSessionListResponse:
      type: object
      description: Paginated list of autonomous sessions (newest first).
      required: [sessions, total_count, limit, offset]
      properties:
        sessions:
          type: array
          items: {$ref: '#/components/schemas/AutonomousSessionRead'}
        total_count: {type: integer, minimum: 0}
        limit: {type: integer, minimum: 1, maximum: 200}
        offset: {type: integer, minimum: 0}

    AutonomousSessionDetailResponse:
      type: object
      description: |
        Session detail view with live-reconstructed receipt.
        The receipt is built from audit rows on every request and contains
        phase transitions, tool calls, terminal reason, and session metadata.
        No raw document text or entity values are included.
      required: [session, receipt]
      properties:
        session:
          $ref: '#/components/schemas/AutonomousSessionRead'
        receipt:
          type: object
          additionalProperties: true
          description: |
            Audit-derived receipt: session_id, trigger_kind, status,
            halt_state, current_phase, cost_total_usd, max_cost_usd,
            cost_cap_reached, created_at, completed_at,
            phase_transitions (list), tool_calls (list),
            terminal_reason (string | null).

    AdminUserListResponse:
      type: object
      required: [users, total_count, limit, offset]
      properties:
        users:
          type: array
          items: {$ref: '#/components/schemas/AdminUserRow'}
        total_count: {type: integer, minimum: 0}
        limit: {type: integer, minimum: 1, maximum: 200}
        offset: {type: integer, minimum: 0}

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: {type: string, format: email}
        password: {type: string, format: password}

    LoginResponse:
      type: object
      required: [access_token, token_type, expires_in, user]
      properties:
        access_token: {type: string}
        token_type: {type: string, enum: [Bearer]}
        expires_in: {type: integer, description: "Lifetime in seconds"}
        refresh_token: {type: string}
        user: {$ref: '#/components/schemas/User'}

    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: {type: string, description: "Short-lived JWT access token (~15 min)."}
        refresh_token:
          type: string
          description: |
            Refresh token returned on /auth/login and rotated on every
            /auth/refresh per PRD §5.1. The bearer of the most recent
            refresh_token can mint new access tokens; older refresh
            tokens are revoked when rotation happens.
        token_type: {type: string, enum: [Bearer]}
        expires_in: {type: integer, description: "Seconds until the access token expires."}

    MfaChallenge:
      type: object
      required: [mfa_token, methods]
      properties:
        mfa_token: {type: string}
        methods: {type: array, items: {type: string, enum: [totp, recovery_code]}}

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
          description: |
            The user's current password. Required even when the
            `must_change_password` flag is set — a stolen access token
            alone must not be sufficient to rotate credentials.
        new_password:
          type: string
          format: password
          description: |
            The replacement password. Must satisfy the deployment's
            password policy (minimum length, etc.) and must differ from
            `current_password`. The first-run admin flow accepts any
            password meeting policy; subsequent rotations may add
            complexity rules.

    User:
      type: object
      required: [id, email, is_admin, mfa_enabled, must_change_password, created_at]
      properties:
        id: {type: string, format: uuid}
        email: {type: string, format: email}
        display_name: {type: string, nullable: true}
        is_admin: {type: boolean}
        role:
          type: string
          enum: [admin, member, viewer]
          default: member
          description: |
            Wave C — PRD §5.2 RBAC three-role system. ``admin`` has
            full access; ``member`` can mutate owned resources; ``viewer``
            is read-only. Mutating endpoints reject ``viewer`` via the
            ``MutatingUser`` dependency. Kept in sync with ``is_admin``
            (``role='admin'`` iff ``is_admin=true``).
        mfa_enabled: {type: boolean}
        must_change_password:
          type: boolean
          description: |
            When true, the user must call POST /api/v1/auth/change-password
            before they can use any other authenticated endpoint. Set on
            the auto-created first-run admin (Task B2) and on accounts
            after `reset-admin-password`. Other authenticated endpoints
            return 403 with `error.code = "password_change_required"`
            until this clears.
        reasoning_visibility:
          type: string
          enum: [always_show, disclosure, on_request]
          default: disclosure
          description: |
            Wave A — PRD §3.2 Enhance Prompt reasoning visibility:
            ``always_show`` (reasoning visible by default),
            ``disclosure`` (collapsed behind a toggle; spec default),
            ``on_request`` (hidden until the user opens the skill
            inspector). Modifiable via ``PATCH /users/me/preferences``.
        featured_tools:
          type: string
          enum: [prominent, inline]
          default: prominent
          description: |
            Wave B v2 — PRD §3.2.1 / frontend spec §4.3. Where Enhance
            Prompt, Skill Creator, KB, and Apply Skill surface:
            ``prominent`` (dashboard cards; default) vs. ``inline``
            (toolbar only for veterans).
        workspace_layout:
          type: string
          enum: [three_pane, two_pane, one_pane]
          default: three_pane
          description: |
            Wave B v2 — PRD §3.2.1 / frontend spec §4.3. Matter workspace
            pane composition (Wave C surfaces): ``three_pane`` (default),
            ``two_pane``, or ``one_pane``.
        trust_pills:
          type: string
          enum: [labels, dots]
          default: labels
          description: |
            Wave B v2 — PRD §3.2.1 / frontend spec §4.3. Ambient trust
            pill format: ``labels`` (full text, e.g. "● self-hosted";
            default) vs. ``dots`` (minimal dot only).
        provenance_pills:
          type: string
          enum: [always, collapsed]
          default: always
          description: |
            Wave B v2 — PRD §3.2.1 / frontend spec §4.3. Per-message
            skill/tier/provider pill row visibility: ``always`` (visible
            by default) vs. ``collapsed`` (hidden until expanded).
        created_at: {type: string, format: date-time}
        last_login_at: {type: string, format: date-time, nullable: true}
        deletion_scheduled_at:
          {type: string, format: date-time, nullable: true,
           description: "Non-null while a GDPR Article 17 grace-period deletion is pending (set by POST /users/me/delete, cleared by .../delete/cancel)."}

    UserPreferences:
      type: object
      description: |
        All 6 personalization preference fields. Wave A (``reasoning_visibility``)
        per PRD §3.2; Wave B v2 fields per PRD §3.2.1 and frontend spec §4.3;
        ``autonomous_enabled`` per PRD §5 / M4-C2.
      required: [reasoning_visibility, featured_tools, workspace_layout, trust_pills, provenance_pills, autonomous_enabled]
      properties:
        reasoning_visibility:
          type: string
          enum: [always_show, disclosure, on_request]
          default: disclosure
        featured_tools:
          type: string
          enum: [prominent, inline]
          default: prominent
        workspace_layout:
          type: string
          enum: [three_pane, two_pane, one_pane]
          default: three_pane
        trust_pills:
          type: string
          enum: [labels, dots]
          default: labels
        provenance_pills:
          type: string
          enum: [always, collapsed]
          default: always
        autonomous_enabled:
          type: boolean

    UserPreferencesUpdate:
      type: object
      description: |
        All fields optional; only supplied keys are updated. Wave B v2 adds
        four personalization fields per PRD §3.2.1 and frontend spec §4.3;
        ``autonomous_enabled`` per PRD §5 / M4-C2.
      properties:
        reasoning_visibility:
          type: string
          enum: [always_show, disclosure, on_request]
        featured_tools:
          type: string
          enum: [prominent, inline]
        workspace_layout:
          type: string
          enum: [three_pane, two_pane, one_pane]
        trust_pills:
          type: string
          enum: [labels, dots]
        provenance_pills:
          type: string
          enum: [always, collapsed]
        autonomous_enabled:
          type: boolean

    UserProfileUpdate:
      type: object
      description: |
        PATCH body for `/api/v1/users/me`. Caller-scoped self-edit of the
        user's own profile. Currently `display_name` only: when supplied
        it is trimmed and must be non-empty after trimming. At least one
        updatable field must be present (an all-omitted body is a 422).

        Email self-service editing is intentionally out of scope here —
        changing the login email pulls in re-verification, MFA, and
        uniqueness concerns and is deferred to a dedicated flow.
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 200
          description: |
            New display name. Trimmed server-side; must be non-empty after
            trimming. Omit to leave unchanged (but at least one field must
            be present, so an empty body is rejected).

    Project:
      type: object
      required: [id, name, slug, owner_id, privileged, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        name: {type: string, minLength: 1, maxLength: 200}
        slug:
          type: string
          minLength: 1
          maxLength: 80
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          description: |
            URL-friendly identifier; unique-per-owner within the active set
            (an archived project's slug can be reused). Generated from
            `name` on create when not supplied; collisions resolve with a
            numeric suffix (`-2`, `-3`, ...).
        description: {type: string, nullable: true, maxLength: 1000}
        context_md:
          type: string
          nullable: true
          description: |
            Free-form Markdown context document for the matter. Capped at
            100 KiB (UTF-8 bytes); exceeding the cap returns 422.
        owner_id: {type: string, format: uuid}
        privileged:
          type: boolean
          description: |
            When true, every chat in this project is marked privileged in the audit log
            and the routed inference tier is forced to be at least minimum_inference_tier.
            Setting `privileged=true` requires `minimum_inference_tier` to be set;
            attempts to set one without the other return 422 (POST) or 400 (PATCH).
        minimum_inference_tier:
          type: integer
          enum: [1,2,3,4,5]
          nullable: true
          description: "When set, requests below this tier are refused"
        attached_skill_names:
          type: array
          items: {type: string}
          description: "Skills attached to this project, ordered by attachment time"
        attached_file_ids:
          type: array
          items: {type: string, format: uuid}
          description: "Files attached to this project, ordered by attachment time"
        is_sandbox:
          type: boolean
          default: false
          description: |
            System-managed flag added by migration 0022. When true, this
            project is the per-user try-it sandbox (slug ``__sandbox__``).
            Sandbox projects are excluded from the default ``GET /projects``
            list; pass ``include_sandbox=true`` or ``only_sandbox=true`` to
            surface them. Created by ``POST /projects/sandbox/ensure``.
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: "When set, the project is soft-deleted (archived); excluded from default list"
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    ProjectCreate:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: {type: string, minLength: 1, maxLength: 200}
        slug:
          type: string
          minLength: 1
          maxLength: 80
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          description: "Optional; defaults to slugified `name` with collision suffixes."
        description: {type: string, maxLength: 1000}
        context_md: {type: string, description: "Free-form Markdown context document; max 100 KiB."}
        privileged: {type: boolean, default: false}
        minimum_inference_tier: {type: integer, enum: [1,2,3,4,5]}

    ProjectUpdate:
      type: object
      additionalProperties: false
      properties:
        name: {type: string, minLength: 1, maxLength: 200}
        slug:
          type: string
          minLength: 1
          maxLength: 80
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        description: {type: string, maxLength: 1000}
        context_md: {type: string, description: "Free-form Markdown context document; max 100 KiB."}
        privileged: {type: boolean}
        minimum_inference_tier: {type: integer, enum: [1,2,3,4,5], nullable: true}
        archived:
          type: boolean
          description: |
            When true, archive (soft-delete) the project; when false,
            unarchive a previously-archived project. The dedicated
            `DELETE /api/v1/projects/{id}` endpoint is the destructive
            equivalent of `PATCH {archived: true}`.

    Chat:
      type: object
      required: [id, owner_id, title, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        title:
          type: string
          description: |
            Chat title. Defaults to "New chat"; auto-renamed to the
            first 80 chars of the first user message on first POST
            /messages. Never overwrites a user-set title (one-shot).
        owner_id: {type: string, format: uuid}
        project_id: {type: string, format: uuid, nullable: true}
        archived_at:
          type: string
          format: date-time
          nullable: true
          description: "Soft-delete timestamp. NULL means active."
        message_count:
          type: integer
          description: "Count of persisted messages in this chat."
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    ChatCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
          description: |
            Defaults to "New chat" when omitted. The chat will be
            auto-renamed from the first user message; supplying a
            non-default title here suppresses auto-rename.
        project_id: {type: string, format: uuid, nullable: true}

    ChatUpdate:
      type: object
      description: "PATCH body for /api/v1/chats/{chat_id}; partial update."
      properties:
        title: {type: string, maxLength: 200}
        archived:
          type: boolean
          description: "Set true to archive (soft-delete); false to unarchive."

    Message:
      type: object
      required: [id, chat_id, role, content, created_at]
      properties:
        id: {type: string, format: uuid}
        chat_id: {type: string, format: uuid}
        role: {type: string, enum: [user, assistant, system, tool]}
        content: {type: string}
        applied_skills:
          type: array
          items: {type: string}
          description: |
            C2 / ADR 0007: skills the gateway applied for this message
            exchange. Captured on user messages from the request body
            and on assistant messages from the gateway response.
        routed_inference_tier:
          type: integer
          enum: [1,2,3,4,5]
          nullable: true
          description: "Tier the request was routed against (set by gateway). NULL on user messages."
        routed_provider:
          type: string
          nullable: true
          description: "Provider that handled the request (assistant only)."
        routed_model:
          type: string
          nullable: true
          description: "Native provider model name (assistant only)."
        prompt_tokens: {type: integer, nullable: true}
        completion_tokens: {type: integer, nullable: true}
        cost_estimate:
          type: number
          nullable: true
          description: |
            USD cost estimate. The DB stores integer USD micros
            (1e-6 USD); the wire field is the floating-point USD value.
        error_code:
          type: string
          nullable: true
          description: |
            Populated when the assistant message failed mid-stream or
            the gateway raised. Carries the canonical Error code
            (e.g., `provider_unavailable`, `gateway_timeout`).
        citations:
          type: array
          items: {$ref: '#/components/schemas/Citation'}
          description: "M2 populates this; M1 stores []."
        created_at: {type: string, format: date-time}

    MessageCreate:
      type: object
      required: [content]
      properties:
        content: {type: string, minLength: 1}
        model:
          type: string
          default: smart
          description: "Model alias (e.g., 'smart', 'fast') or provider-native model name"
        stream:
          type: boolean
          default: false
          description: |
            When true, response is `text/event-stream` per OpenAI streaming
            convention. When false, response is a single JSON body with the
            assistant message and routing metadata (B5 default).
        skills:
          type: array
          items: {type: string}
          description: |
            C2: skill names to attach. The backend forwards these as
            `lq_ai_skills` to the gateway, which fetches each from the
            backend's internal-skills endpoint and assembles the prompt.
        skill_inputs:
          type: object
          additionalProperties:
            type: object
            additionalProperties: true
          description: |
            C2: per-skill input bindings, keyed by skill name. Inner
            dict maps input variable names to values. Required inputs
            that the skill's frontmatter declares but the bindings
            don't provide cause a 400 with `code=skill_input_missing`.

            Values are plain scalars interpolated into the skill body via
            `{{name}}` substitution (ADR 0006). There is NO `type:"file"`
            binding: passing a file UUID here interpolates the literal
            UUID string, not the file's document text. For per-turn
            document context use the separate `file_ids` channel below —
            `skill_inputs` and `file_ids` are distinct; a `file_id` is
            NOT bindable to a skill file-input via `skill_inputs`.
        file_ids:
          type: array
          maxItems: 16
          items: {type: string, format: uuid}
          description: |
            Donna: caller-owned file UUIDs supplying ephemeral,
            per-message document context for this one chat turn.
            Distinct from KB attach (project-scoped, persistent) and
            from `skill_inputs` (scalar skill params — see the note
            above; no `type:"file"` binding is wired). Each id is
            validated server-side to exist and be owned by the caller;
            a foreign, unknown, or soft-deleted id returns 404
            (id-probing-safe — indistinguishable from "not found").
            Validated ids are forwarded to the gateway as `lq_ai_file_ids`
            alongside `lq_ai_skills` and echoed back as `applied_file_ids`
            on the response / SSE `complete` frame. Capped at 16 entries.
            Omitted / empty is back-compatible.

    MessagePostResponse:
      type: object
      required: [message, citations]
      description: |
        Non-streaming response for `POST /api/v1/chats/{chat_id}/messages`.
        The `routed_inference_tier`, `routed_provider`, and `cost_estimate`
        come from the gateway (B4). `applied_skills` lists the skills
        that were assembled into the prompt (C2). After C3 the backend
        also persists both the user and assistant message rows; the
        `message.id` carried here resolves to the persisted assistant
        row.
      properties:
        message: {$ref: '#/components/schemas/Message'}
        citations:
          type: array
          items: {$ref: '#/components/schemas/Citation'}
          description: "Empty until M2 (citation engine)."
        routed_inference_tier:
          type: integer
          enum: [1,2,3,4,5]
          nullable: true
          description: "Routed Inference Tier as derived by the gateway (B4)"
        routed_provider:
          type: string
          nullable: true
          description: "Provider name that handled the request (B4)"
        cost_estimate:
          type: number
          nullable: true
          description: "USD cost estimate (gateway-side, when rate is configured)"
        applied_skills:
          type: array
          items: {type: string}
          description: |
            C2: skills that were successfully assembled into the prompt
            for this request. Empty when no skills were attached.
        applied_file_ids:
          type: array
          items: {type: string, format: uuid}
          description: |
            Donna: caller-owned file ids that were validated and
            forwarded to the gateway as `lq_ai_file_ids` for this turn —
            the echo of `MessageCreate.file_ids` (mirrors
            `applied_skills`). Turn-scoped: there is no
            `messages.file_ids` column, so this surfaces only on the send
            response (and the SSE `complete` frame), not on rows read
            back via `GET /chats/{id}/messages`. Empty when none attached.

    MessageStreamEvent:
      oneOf:
        - $ref: '#/components/schemas/MessageStart'
        - $ref: '#/components/schemas/MessageDelta'
        - $ref: '#/components/schemas/MessageComplete'
        - $ref: '#/components/schemas/Error'
      description: |
        Frames emitted on the SSE stream. The first frame is a `start`
        event carrying the persisted assistant message id (so clients
        can poll the row later). Subsequent frames are `delta` events,
        each tagged with the `lq_ai_message_id`, the
        `routed_inference_tier`, and `applied_skills`. The final frame
        is either a `complete` event (success) or an `Error` envelope
        (the stream ended in failure; the assistant row is persisted
        with `error_code` populated for audit). Termination is
        signalled by the OpenAI-style `data: [DONE]` line.

    MessageStart:
      type: object
      required: [type, lq_ai_message_id, chat_id]
      description: |
        Opening frame on the SSE stream. Carries the assistant message
        id the backend generated *before* dispatch; the persisted row
        will eventually carry this same id, so the client can fetch the
        row later via `GET /chats/{id}/messages`.
      properties:
        type: {type: string, enum: [start]}
        lq_ai_message_id: {type: string, format: uuid}
        chat_id: {type: string, format: uuid}

    MessageDelta:
      type: object
      required: [type, delta, lq_ai_message_id]
      properties:
        type: {type: string, enum: [delta]}
        delta: {type: string}
        lq_ai_message_id:
          type: string
          format: uuid
          description: "C3: the persisted assistant message id (stable across all frames)."
        routed_inference_tier:
          type: integer
          enum: [1,2,3,4,5]
          nullable: true
          description: "B4: routed tier surfaced on every chunk."
        applied_skills:
          type: array
          items: {type: string}
          description: "C2: skills assembled into the prompt."

    MessageComplete:
      type: object
      required: [type, message, lq_ai_message_id]
      properties:
        type: {type: string, enum: [complete]}
        lq_ai_message_id: {type: string, format: uuid}
        message: {$ref: '#/components/schemas/Message'}
        citations:
          type: array
          items: {$ref: '#/components/schemas/Citation'}
        applied_skills:
          type: array
          items: {type: string}
          description: |
            C2: skills that were successfully assembled into the prompt
            for this request. Empty when no skills were attached.
        applied_file_ids:
          type: array
          items: {type: string, format: uuid}
          description: |
            Donna: caller-owned file ids forwarded to the gateway as
            `lq_ai_file_ids` for this turn — the echo of
            `MessageCreate.file_ids` (mirrors `applied_skills`).
            Turn-scoped; not persisted. Empty when none attached.
        routed_inference_tier:
          type: integer
          enum: [1,2,3,4,5]
          nullable: true
        routed_provider:
          type: string
          nullable: true

    Citation:
      type: object
      required: [id, source_file_id, source_text]
      properties:
        id: {type: string, format: uuid}
        source_file_id: {type: string, format: uuid}
        source_offset_start: {type: integer}
        source_offset_end: {type: integer}
        source_page: {type: integer, nullable: true}
        source_text:
          type: string
          description: "Verbatim text from source — verified to appear in source"
        verified: {type: boolean, description: "Citation engine verified the quote"}
        partial:
          type: boolean
          default: false
          description: >-
            True when the paraphrase judge (M2-C1) returned ``partial`` —
            the source supports the claim but only partially. Drives the
            M2-C2 UI's "verified with caveats" rendering (verified-paraphrase
            state).

    SkillSummary:
      type: object
      required: [name, version, scope, title]
      properties:
        name: {type: string}
        version:
          type: string
          description: >-
            Skill version. Free-form to accommodate skills authored before
            the formal authoring guide; the loader defaults to
            ``"unversioned"`` when the source frontmatter omits this field.
        scope: {type: string, enum: [builtin, user, team]}
        title: {type: string}
        description: {type: string}
        author:
          type: string
          description: >-
            Attribution string from the skill's ``lq_ai.author`` frontmatter
            (DE-316). Surfaced verbatim; absent when the frontmatter omits it.
            Read by the gateway's ``skill.execute`` OTel span as ``skill.author``.
        tags: {type: array, items: {type: string}}
        jurisdiction:
          type: string
          description: >-
            Free-form jurisdiction tag (e.g., ``us``, ``regime-aware``,
            ``agnostic``). Surfaced verbatim from the skill's frontmatter.
        minimum_inference_tier:
          type: integer
          minimum: 1
          maximum: 5
          description: >-
            Inference-tier floor declared by the skill, if any. The gateway's
            tier-floor enforcement (Task D1) consults this; C1 only surfaces
            the value.
        output_format:
          type: string
          description: >-
            Skill's documented output format (e.g., ``report``, ``markdown``,
            ``structured_checklist``, ``redline``). Free-form per the corpus.

    # M3-C1 — column definition for output_format: table skills.
    ColumnSpec:
      type: object
      required: [name, query]
      description: >-
        One column in an ``output_format: table`` skill (M3-C1). The
        Tabular Review workflow (M3-C2) runs each ``(document, column)``
        cell as a Citation-Engine-grounded extraction.
      properties:
        name: {type: string, description: "Grid column header."}
        query:
          type: string
          description: >-
            Per-row extraction prompt instantiated against each document.
        ensemble_verification:
          type: boolean
          nullable: true
          description: >-
            Per-column override of the skill-level ``ensemble_verification``
            field. ``true`` routes this column's cells through Stage 4 of
            the Citation Engine cascade.
        minimum_inference_tier:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
          description: >-
            Per-column override of the skill-level tier floor. High-stakes
            columns can demand Tier 4+ while routine columns route Tier 1.

    Skill:
      allOf:
        - $ref: '#/components/schemas/SkillSummary'
        - type: object
          required: [content_yaml, content_md]
          properties:
            id:
              type: string
              format: uuid
              nullable: true
              description: >-
                Wave D.2 — underlying ``user_skills.id`` row UUID when the
                resolved scope is ``user`` or ``team``. ``null`` for
                built-in (filesystem-canonical) skills, which have no DB
                row. The skill detail page's Versions tab needs this id
                to call the audit-history endpoint; surfacing it on the
                detail GET avoids a second round-trip to resolve
                slug → id.
            content_yaml: {type: string, description: "Frontmatter YAML"}
            content_md: {type: string, description: "Body markdown"}
            reference_files:
              type: array
              items:
                type: object
                required: [path, content]
                properties:
                  path: {type: string}
                  content: {type: string}
            example_files:
              type: array
              items:
                type: object
                required: [path, content]
                properties:
                  path: {type: string}
                  content: {type: string}
            columns:
              type: array
              nullable: true
              description: >-
                M3-C1 — column definitions for ``output_format: table``
                skills. ``null`` for non-table skills. The validator
                rejects ``output_format: table`` skills that lack a
                non-empty ``columns`` list at load time.
              items:
                $ref: '#/components/schemas/ColumnSpec'

    # Wave A — Skill inputs (form schema for the skill-input-form pattern).
    SkillInputDef:
      type: object
      required: [name, required]
      properties:
        name: {type: string}
        type:
          type: string
          nullable: true
          description: Free-form per corpus reality (text, enum, boolean, integer, structured, file, ...).
        required: {type: boolean, default: false}
        description: {type: string, nullable: true}
        enum:
          type: array
          items: {type: string}
          nullable: true
        default: {nullable: true}

    SkillInputs:
      type: object
      required: [name, required, optional]
      properties:
        name: {type: string}
        required:
          type: array
          items: {$ref: '#/components/schemas/SkillInputDef'}
        optional:
          type: array
          items: {$ref: '#/components/schemas/SkillInputDef'}

    # Wave A — Enhance Prompt (PRD §3.2).
    EnhancePromptAttachedSkill:
      type: object
      required: [name]
      properties:
        name: {type: string}
        description: {type: string, nullable: true}

    EnhancePromptAttachedFile:
      type: object
      required: [filename]
      properties:
        file_id: {type: string, format: uuid, nullable: true}
        filename: {type: string}
        mime_type: {type: string, nullable: true}
        description: {type: string, nullable: true}

    EnhancePromptRequest:
      type: object
      required: [raw_input]
      properties:
        raw_input: {type: string, minLength: 1, maxLength: 4096}
        chat_id: {type: string, format: uuid, nullable: true}
        attached_skills:
          type: array
          items: {$ref: '#/components/schemas/EnhancePromptAttachedSkill'}
        attached_files:
          type: array
          items: {$ref: '#/components/schemas/EnhancePromptAttachedFile'}
        jurisdiction: {type: string, nullable: true, maxLength: 200}
        model:
          type: string
          nullable: true
          maxLength: 200
          description: Optional model alias override. Defaults to ``fast``.

    EnhancePromptResponse:
      type: object
      required: [interaction_id, expansion_applied, expanded_prompt, reasoning]
      properties:
        interaction_id: {type: string, format: uuid}
        expansion_applied: {type: boolean}
        expanded_prompt:
          type: string
          description: |
            The expansion when ``expansion_applied=true``, or the original
            ``raw_input`` (echoed back for client convenience) when
            ``expansion_applied=false``.
        reasoning:
          type: array
          items: {type: string}
        skip_reason: {type: string, nullable: true}
        preview_to_user:
          type: string
          description: Human-readable render of the expansion + reasoning the application can show in the review screen.
        routed_inference_tier:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        routed_provider: {type: string, nullable: true}
        routed_model: {type: string, nullable: true}

    EnhancePromptOutcomeUpdate:
      type: object
      description: All fields optional; only supplied keys move.
      properties:
        used: {type: boolean, nullable: true}
        edited_before_use: {type: boolean, nullable: true}

    # Wave B — tier inquiry (PRD §3.13)
    CurrentTierResponse:
      type: object
      required: [provider, model]
      properties:
        provider: {type: string}
        model: {type: string}
        routed_inference_tier:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        routed_provider_type: {type: string, nullable: true}
        explanation: {type: string}

    TierConfigResponse:
      type: object
      required: [allowed_tiers_global, default_minimum_tier, privileged_minimum_tier, warn_on_tiers]
      properties:
        allowed_tiers_global:
          type: array
          items: {type: integer, minimum: 1, maximum: 5}
        default_minimum_tier: {type: integer, minimum: 1, maximum: 5}
        privileged_minimum_tier: {type: integer, minimum: 1, maximum: 5}
        warn_on_tiers:
          type: array
          items: {type: integer, minimum: 1, maximum: 5}

    # Wave B — /admin/usage (PRD §5.5)
    UsageRow:
      type: object
      required: [group_key, request_count, tokens_in_sum, tokens_out_sum, cost_estimate_sum]
      properties:
        group_key: {type: string}
        request_count: {type: integer, minimum: 0}
        tokens_in_sum: {type: integer, minimum: 0}
        tokens_out_sum: {type: integer, minimum: 0}
        cost_estimate_sum: {type: number}

    UsageResponse:
      type: object
      required: [rows, group_by, total_request_count, total_tokens_in, total_tokens_out, total_cost_estimate]
      properties:
        rows:
          type: array
          items: {$ref: '#/components/schemas/UsageRow'}
        group_by: {type: string, enum: [user, provider, model, tier, day]}
        total_request_count: {type: integer, minimum: 0}
        total_tokens_in: {type: integer, minimum: 0}
        total_tokens_out: {type: integer, minimum: 0}
        total_cost_estimate: {type: number}

    # Wave B — /chats/search (PRD §1.7)
    ChatSearchHit:
      type: object
      required: [chat_id, title, snippet, match_source, rank, created_at, updated_at]
      properties:
        chat_id: {type: string, format: uuid}
        title: {type: string}
        snippet: {type: string}
        match_source: {type: string, enum: [title, message]}
        rank: {type: number}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    ChatSearchResponse:
      type: object
      required: [items, query]
      properties:
        items:
          type: array
          items: {$ref: '#/components/schemas/ChatSearchHit'}
        query: {type: string}

    File:
      type: object
      required: [id, owner_id, filename, mime_type, size_bytes, created_at]
      properties:
        id: {type: string, format: uuid}
        owner_id: {type: string, format: uuid}
        project_id: {type: string, format: uuid, nullable: true}
        filename: {type: string}
        mime_type: {type: string}
        size_bytes: {type: integer}
        hash_sha256: {type: string}
        ingestion_status:
          type: string
          enum: [pending, processing, ready, failed]
          description: |
            Lifecycle: `pending` (just uploaded; C4 sets this on insert)
            → `processing` (C5 worker has picked it up) → `ready`
            (parsed, chunks persisted) OR `failed` (with `ingestion_error`
            set; e.g., `unsupported_type` for non-PDF MIMEs in M1, or
            `parse_failed` for corrupt PDFs).
        ingestion_error:
          type: string
          nullable: true
          description: |
            Set when `ingestion_status='failed'`. M1 values include
            `unsupported_type`, `unsupported_content`, `parse_failed`.
        page_count:
          type: integer
          nullable: true
          description: |
            Populated by the C5 document pipeline once
            `ingestion_status='ready'`; `null` while pending /
            processing / failed.
        character_count:
          type: integer
          nullable: true
          description: |
            Populated by the C5 document pipeline once
            `ingestion_status='ready'`; counts characters of the
            canonical PyMuPDF-extracted text, not of the original
            PDF byte stream.
        document_id:
          type: string
          format: uuid
          nullable: true
          description: |
            UUID of the parsed-content `documents` row (M3-A6 Phase 6).
            Distinct from `id` (the File UUID). `null` until the C5
            parse pipeline produces the row; the Easy Playbook wizard
            polls `GET /files/{id}` until this flips non-null, then
            passes the value to `POST /playbooks/easy` in `document_ids`.
        created_at: {type: string, format: date-time}

    KnowledgeBase:
      type: object
      required: [id, name, owner_id, hybrid_alpha, file_count, chunk_count, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        name: {type: string, minLength: 1, maxLength: 200}
        description: {type: string, nullable: true}
        owner_id: {type: string, format: uuid}
        project_id: {type: string, format: uuid, nullable: true}
        hybrid_alpha:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: |
            Per-KB default for the hybrid score combine. 0 = vector-only;
            1 = FTS-only; 0.5 = balanced (per ADR 0008).
        file_count: {type: integer, minimum: 0}
        chunk_count: {type: integer, minimum: 0}
        archived_at: {type: string, format: date-time, nullable: true}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    KnowledgeBaseCreate:
      type: object
      required: [name]
      properties:
        name: {type: string, minLength: 1, maxLength: 200}
        description: {type: string, maxLength: 2000, nullable: true}
        project_id: {type: string, format: uuid, nullable: true}
        hybrid_alpha:
          type: number
          minimum: 0.0
          maximum: 1.0
          default: 0.5

    KnowledgeBaseUpdate:
      type: object
      properties:
        name: {type: string, minLength: 1, maxLength: 200}
        description: {type: string, maxLength: 2000, nullable: true}
        project_id: {type: string, format: uuid, nullable: true}
        hybrid_alpha:
          type: number
          minimum: 0.0
          maximum: 1.0
        archived: {type: boolean, description: "true to archive; false to unarchive"}

    KBFile:
      type: object
      description: |
        One row of `GET /api/v1/knowledge-bases/{kb_id}/files`. Mirrors
        `File` (the wire shape returned by `POST /files` /
        `GET /files/{id}`) and adds `attached_at` from the join row so
        the Knowledge surface can sort by attach time.
      required:
        [id, owner_id, filename, mime_type, size_bytes, hash_sha256, ingestion_status, created_at, attached_at]
      properties:
        id: {type: string, format: uuid}
        owner_id: {type: string, format: uuid}
        project_id: {type: string, format: uuid, nullable: true}
        filename: {type: string}
        mime_type: {type: string}
        size_bytes: {type: integer}
        hash_sha256: {type: string}
        ingestion_status:
          type: string
          enum: [pending, processing, ready, failed]
        ingestion_error:
          type: string
          nullable: true
        page_count: {type: integer, nullable: true}
        character_count: {type: integer, nullable: true}
        document_id:
          type: string
          format: uuid
          nullable: true
          description: |
            The parsed-content `documents` row UUID, distinct from `id`
            (the File UUID). Null until the C5 parse pipeline produces
            a documents row. Added in M3-A4 so playbook-execute callers
            can resolve File → Document client-side without a second
            fetch.
        created_at: {type: string, format: date-time}
        attached_at:
          type: string
          format: date-time
          description: |
            When the file was attached to this KB (from
            `knowledge_base_files.attached_at`).

    KBQueryRequest:
      type: object
      required: [query]
      properties:
        query: {type: string, minLength: 1, maxLength: 10000}
        top_k:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        hybrid_alpha:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: |
            Override the KB's stored alpha for this query. Omit to use
            the KB default.

    KBQueryResponse:
      type: object
      required: [results, hybrid_alpha]
      properties:
        results:
          type: array
          items: {$ref: '#/components/schemas/SearchResult'}
        hybrid_alpha:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: "The alpha actually used (per-query override or KB default)."

    SearchResult:
      type: object
      required: [chunk, score, score_components]
      properties:
        chunk:
          type: object
          required: [id, document_id, file_id, file_name, content, char_offset_start, char_offset_end]
          properties:
            id: {type: string, format: uuid}
            document_id: {type: string, format: uuid}
            file_id: {type: string, format: uuid}
            file_name: {type: string}
            content: {type: string}
            page_start: {type: integer, nullable: true}
            page_end: {type: integer, nullable: true}
            char_offset_start: {type: integer}
            char_offset_end: {type: integer}
        score:
          type: number
          description: "Combined hybrid score: (1 - alpha) * vector + alpha * fts. Min-max normalized; in [0, 1]."
        score_components:
          type: object
          required: [vector, fts]
          properties:
            vector: {type: number, minimum: 0.0, maximum: 1.0}
            fts: {type: number, minimum: 0.0, maximum: 1.0}

    SavedPrompt:
      type: object
      required: [id, user_id, name, prompt_text, created_at]
      properties:
        id: {type: string, format: uuid}
        user_id: {type: string, format: uuid}
        name: {type: string}
        prompt_text: {type: string}
        tags: {type: array, items: {type: string}}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    # D8 + D8.1b — DB-backed user/team skills (ADR 0012).
    UserSkill:
      type: object
      required:
        [id, scope, slug, display_name, description, version, body, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        scope: {type: string, enum: [user, team], description: '''user'' is owned by ``owner_user_id``; ''team'' is owned by ``owner_team_id`` (D8.1b).'}
        owner_user_id:
          type: string
          format: uuid
          nullable: true
          description: Set when scope='user'; null when scope='team'. Exactly one of owner_user_id / owner_team_id is non-null (enforced by ck_user_skills_scope_owner_consistency).
        owner_team_id:
          type: string
          format: uuid
          nullable: true
          description: Set when scope='team' (D8.1b). null when scope='user'.
        slug: {type: string, description: Stable identifier; matches filesystem skill folder-name conventions.}
        display_name: {type: string}
        description: {type: string}
        version: {type: string, description: User-set free-form semver (e.g. "1.0.0").}
        tags: {type: array, items: {type: string}}
        frontmatter_extra:
          type: object
          additionalProperties: true
          description: Arbitrary ``lq_ai:`` extension keys (jurisdiction, output_format, minimum_inference_tier, etc.).
        body: {type: string}
        slash_alias:
          type: string
          nullable: true
          description: Chat-composer trigger alias (e.g. ``/nda``). Added by migration 0023.
        forked_from:
          type: string
          nullable: true
          description: Slug of the source skill when this row was forked. Added by migration 0023.
        archived_at: {type: string, format: date-time, nullable: true, description: Soft-delete timestamp; null when active.}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}

    UserSkillCreate:
      type: object
      required: [slug, display_name, description, body]
      properties:
        slug:
          type: string
          pattern: '^[a-z0-9]([a-z0-9-]{0,78}[a-z0-9])?$'
          maxLength: 80
        display_name: {type: string, minLength: 1, maxLength: 200}
        description: {type: string, minLength: 1, maxLength: 2000}
        body: {type: string, minLength: 1, maxLength: 200000}
        version: {type: string, default: '1.0.0', maxLength: 50}
        tags: {type: array, items: {type: string}, maxItems: 20}
        frontmatter_extra: {type: object, additionalProperties: true}
        scope:
          type: string
          enum: [user, team]
          default: user
          description: Defaults to 'user'. 'team' (D8.1b) requires owner_team_id and gates on team-admin role.
        owner_team_id:
          type: string
          format: uuid
          nullable: true
          description: Required when scope='team'; must be null when scope='user'. 422 if the combination is inconsistent. 404 if the caller is not a team-admin of the named team (id-probing-safe).
        slash_alias:
          type: string
          nullable: true
          pattern: '^/[a-z0-9-]{1,32}$'
          description: |
            Optional chat-composer trigger alias (e.g. ``/nda``). Must be
            ``/`` followed by 1–32 lowercase alphanumeric-or-dash chars.
            Unique per owner within the active (non-archived) set; 422 on
            collision with ``"slash_alias '...' is already used by another
            of your skills."``.
        forked_from:
          type: string
          nullable: true
          description: |
            Slug of the source skill when this row was created by forking a
            built-in or another skill via the detail-page fork button. Set
            on create; read-only afterward. Stored as plain text (no FK —
            the source may be a filesystem-canonical built-in with no DB row).

    UserSkillUpdate:
      type: object
      description: All fields optional; only supplied keys are updated.
      properties:
        display_name: {type: string, minLength: 1, maxLength: 200}
        description: {type: string, minLength: 1, maxLength: 2000}
        body: {type: string, minLength: 1, maxLength: 200000}
        version: {type: string, maxLength: 50}
        tags: {type: array, items: {type: string}, maxItems: 20}
        frontmatter_extra: {type: object, additionalProperties: true}
        slash_alias:
          type: string
          nullable: true
          pattern: '^/[a-z0-9-]{1,32}$'
          description: |
            Update the chat-composer trigger alias. Same validation and
            uniqueness rules as on create. 422 on collision.

    # D8.1a — operator-admin-controlled teams. D8.1c adds caller_role.
    TeamSummary:
      type: object
      required: [id, slug, name, created_by_user_id, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        slug: {type: string}
        name: {type: string}
        description: {type: string, nullable: true}
        created_by_user_id: {type: string, format: uuid}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        member_count: {type: integer, minimum: 0}
        caller_role:
          type: string
          enum: [admin, member]
          nullable: true
          description: |
            The caller's role on this team (D8.1c). Populated by the
            user-facing ``GET /api/v1/teams`` and
            ``GET /api/v1/teams/{id}`` endpoints. Null on operator-admin
            views (``/admin/teams``) when the admin isn't a member.

    TeamMember:
      type: object
      required: [user_id, email, role, added_by_user_id, created_at]
      properties:
        user_id: {type: string, format: uuid}
        email: {type: string}
        display_name: {type: string, nullable: true}
        role: {type: string, enum: [admin, member]}
        added_by_user_id: {type: string, format: uuid}
        created_at: {type: string, format: date-time}

    Team:
      allOf:
        - $ref: '#/components/schemas/TeamSummary'
        - type: object
          properties:
            members:
              type: array
              items: {$ref: '#/components/schemas/TeamMember'}

    TeamCreate:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
          pattern: '^[a-z0-9]([a-z0-9-]{0,78}[a-z0-9])?$'
          maxLength: 80
        name: {type: string, minLength: 1, maxLength: 200}
        description: {type: string, maxLength: 2000, nullable: true}

    TeamUpdate:
      type: object
      properties:
        name: {type: string, minLength: 1, maxLength: 200}
        description: {type: string, maxLength: 2000, nullable: true}

    AuditLogEntry:
      type: object
      required: [id, timestamp, action, resource_type]
      properties:
        id: {type: string, format: uuid}
        timestamp: {type: string, format: date-time}
        user_id: {type: string, format: uuid, nullable: true}
        action: {type: string, description: "e.g. chat.create, message.send, skill.fork"}
        resource_type: {type: string, description: "e.g. chat, project, skill"}
        resource_id: {type: string, nullable: true}
        privilege_marked: {type: boolean}
        privilege_basis: {type: string, nullable: true, description: "Why this entry was marked privileged"}
        routed_inference_tier: {type: integer, enum: [1,2,3,4,5], nullable: true}
        ip_address: {type: string, nullable: true}
        user_agent: {type: string, nullable: true}
        details: {type: object, additionalProperties: true}

    TierPolicy:
      type: object
      required: [allowed_tiers_global, default_minimum_tier]
      properties:
        allowed_tiers_global:
          type: array
          items: {type: integer, enum: [1,2,3,4,5]}
          description: "Tiers globally allowed; requests at other tiers refused"
        default_minimum_tier:
          type: integer
          enum: [1,2,3,4,5]
          description: "Default minimum tier for non-privileged work"
        privileged_minimum_tier:
          type: integer
          enum: [1,2,3,4,5]
          description: "Minimum tier when privileged: true on Project"
        warn_on_tiers:
          type: array
          items: {type: integer, enum: [1,2,3,4,5]}
          description: "Tiers that surface a warning in the chat UI"

    AdminAliasFallback:
      type: object
      required: [provider, model]
      properties:
        provider: {type: string, minLength: 1}
        model: {type: string, minLength: 1}

    AdminAliasEntry:
      type: object
      required: [name, provider, model, fallback]
      properties:
        name: {type: string, minLength: 1}
        provider: {type: string, minLength: 1}
        model: {type: string, minLength: 1}
        fallback:
          type: array
          items: {$ref: '#/components/schemas/AdminAliasFallback'}
        primary_inference_tier:
          type: integer
          enum: [1, 2, 3, 4, 5]

    AdminAliasCreate:
      type: object
      required: [name, provider, model]
      properties:
        name: {type: string, minLength: 1, maxLength: 64}
        provider: {type: string, minLength: 1}
        model: {type: string, minLength: 1}
        fallback:
          type: array
          items: {$ref: '#/components/schemas/AdminAliasFallback'}

    AdminAliasUpdate:
      type: object
      required: [provider, model]
      properties:
        provider: {type: string, minLength: 1}
        model: {type: string, minLength: 1}
        fallback:
          type: array
          items: {$ref: '#/components/schemas/AdminAliasFallback'}

    # Donna #7 — runtime provider-key (BYOK) proxy. These mirror the
    # gateway's ProviderKey* schemas; the backend forwards the JSON
    # verbatim and never returns the secret (the status carries at most
    # the last 4 characters of a resolved key).
    ProviderKeySetRequest:
      type: object
      required: [provider, api_key]
      properties:
        provider:
          type: string
          minLength: 1
          description: Name of an already-configured provider entry.
        api_key:
          type: string
          minLength: 1
          description: |
            Plaintext provider key. The gateway encrypts it with the
            gateway master key before it touches disk; it is never echoed
            back in any response.

    ProviderKeyRotateRequest:
      type: object
      required: [api_key]
      properties:
        api_key:
          type: string
          minLength: 1
          description: |
            Replacement plaintext provider key. Same handling as
            ProviderKeySetRequest.api_key.

    ProviderKeyStatus:
      type: object
      required: [provider, type, configured, last4, source]
      description: |
        Secret-safe status for one provider. Carries at most the last 4
        characters of the resolved key — never the full key or token.
      properties:
        provider: {type: string}
        type:
          type: string
          nullable: true
          description: |
            The provider's adapter type. Null only in the rare race where a
            provider is removed between the write and the status read-back on
            a single-provider (POST/PATCH) response; never null on the list.
        configured:
          type: boolean
          description: |
            True when the provider has a live, routable adapter (its key
            resolved). A keyless or unresolvable provider is false.
        last4:
          type: string
          nullable: true
          minLength: 4
          maxLength: 4
          description: |
            Last 4 characters of the resolved key, or null when the key is
            absent, unresolvable, or shorter than 4 characters.
        source:
          type: string
          nullable: true
          enum: [env, runtime, null]
          description: |
            Key source: `runtime` (encrypted-at-rest in gateway.yaml),
            `env` (api_key_env), or null (no key configured).

    ProviderKeyList:
      type: object
      required: [provider_keys]
      properties:
        provider_keys:
          type: array
          items: {$ref: '#/components/schemas/ProviderKeyStatus'}

    Error:
      type: object
      required: [detail]
      description: |
        Canonical structured error envelope returned by every backend
        endpoint that raises a typed error (`LQAIError` subclass).
        Implemented by the FastAPI exception handler in
        `api/app/main.py`; per ADR 0003 the wrapper key is `detail`
        (matching FastAPI's native `HTTPException` response and the
        existing B2 forced-password-change pattern). The inner shape
        — `code` + `message` + `details` — is the load-bearing
        contract and matches the shape the gateway uses on its side
        under the `error` wrapper (see gateway-openapi.yaml's
        `GatewayError`).

        The pre-existing 501 stub envelope (returned by un-implemented
        endpoints during M1 buildout, A4 scaffold) uses the legacy
        `{"error": {...}}` wrapper instead. Each stub is replaced by a
        real handler as its M1 task lands; new typed errors all use
        the `detail` wrapper above.
      properties:
        detail:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                Stable error code. Backend-only codes:
                `password_change_required`, `payload_too_large`,
                `conflict`, `unauthorized`, `forbidden`, `not_found`,
                `validation_error`, `rate_limited`, `internal_error`.
                Backend↔gateway crossing codes (propagated from gateway
                responses):
                `gateway_unreachable`, `gateway_timeout`,
                `gateway_invalid_response`, `provider_unavailable`,
                `tier_below_minimum`, `invalid_model`,
                `skill_not_found`, `skill_fetch_failed`,
                `skill_input_missing` (C2).
              enum:
                - password_change_required
                - payload_too_large
                - conflict
                - unauthorized
                - forbidden
                - not_found
                - validation_error
                - rate_limited
                - internal_error
                - gateway_unreachable
                - gateway_timeout
                - gateway_invalid_response
                - provider_unavailable
                - tier_below_minimum
                - invalid_model
                - skill_not_found
                - skill_fetch_failed
                - skill_input_missing
            message: {type: string}
            details: {type: object, additionalProperties: true}

security:
  - bearerAuth: []
