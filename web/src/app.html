<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
		/>
		<meta name="theme-color" content="#ffffff" />
		<meta name="robots" content="noindex,nofollow" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<title>LQ.AI Oscar Edition</title>
		<script>
			// Apply the dark/light class before first paint so Tailwind `dark:`
			// variants render without a flash. Rewritten from scratch for the
			// standalone shell (ADR-F006 relicensing condition); `localStorage.theme`
			// keeps its pre-S6 values — 'system' follows the OS, 'light' is light,
			// anything else (incl. legacy 'dark'/'oled-dark') renders dark.
			(() => {
				const apply = (dark) => {
					const root = document.documentElement;
					root.classList.remove('dark', 'light');
					root.classList.add(dark ? 'dark' : 'light');
					const meta = document.querySelector('meta[name="theme-color"]');
					// F013 (VL0) token canvases: charcoal #111 (never black) / white.
					// Mirrors applyTheme() in cockpit/helpers.ts — keep the two in sync.
					if (meta) meta.setAttribute('content', dark ? '#111111' : '#ffffff');
				};
				let theme = localStorage.getItem('theme');
				if (!theme) {
					theme = 'system';
					localStorage.setItem('theme', 'system');
				}
				const media = window.matchMedia('(prefers-color-scheme: dark)');
				apply(theme === 'system' ? media.matches : theme !== 'light');
				media.addEventListener('change', (event) => {
					if (localStorage.getItem('theme') === 'system') apply(event.matches);
				});
			})();
			// BRAND-1b (ADR-F068) — paint the cached deployment branding before
			// first paint, mirroring the theme pattern above: title, a dual-scope
			// <style id="lq-branding"> tag (:root:root{} + :root.dark{} — the
			// DOUBLED (0,2,0) specificity is load-bearing: this tag precedes the
			// app stylesheet in <head>, and app.css's unlayered :root/.dark token
			// blocks (0,1,0) would otherwise win the cascade by order and revert
			// a cached palette to the shipped defaults on every warm load. NEVER
			// inline custom properties on <html> either — they'd outrank the
			// dark block and break theme switching), and the favicon when a
			// raster logo is set. localStorage is attacker-influenceable
			// (extension/other-XSS), so EVERY key/value is re-validated here
			// against the closed 7-token allowlist and the #RRGGBB shape — keep
			// in sync with `lib/lq-ai/branding/store.ts` (drift-guarded by
			// `lib/lq-ai/branding/__tests__/store.test.ts`), which reconciles
			// from the unauth GET /branding after mount. The very first visit
			// has no cache and paints the default brand until that fetch
			// returns (accepted — same class as the theme flash pattern).
			(() => {
				try {
					const raw = localStorage.getItem('branding');
					if (!raw) return;
					const cached = JSON.parse(raw);
					if (!cached || typeof cached !== 'object') return;
					if (
						typeof cached.name === 'string' &&
						cached.name.length > 0 &&
						cached.name.length <= 80 &&
						// eslint-disable-next-line no-control-regex
						!/[\u0000-\u001f\u007f-\u009f\u2028\u2029]/.test(cached.name)
					) {
						document.title = cached.name;
					}
					const TOKENS = {
						brand: '--brand',
						brand_foreground: '--brand-foreground',
						ring: '--ring',
						sidebar_ring: '--sidebar-ring',
						status_running: '--status-running',
						status_running_wash: '--status-running-wash',
						chart_1: '--chart-1'
					};
					const HEX = /^#[0-9a-fA-F]{6}$/;
					const decls = (theme) => {
						const palette = cached.palette;
						const src =
							palette && typeof palette === 'object' && !Array.isArray(palette)
								? palette[theme]
								: null;
						if (!src || typeof src !== 'object' || Array.isArray(src)) return '';
						let out = '';
						for (const key of Object.keys(TOKENS)) {
							const value = src[key];
							if (typeof value === 'string' && HEX.test(value)) {
								out += TOKENS[key] + ':' + value + ';';
							}
						}
						return out;
					};
					const light = decls('light');
					const dark = decls('dark');
					if (light || dark) {
						const style = document.createElement('style');
						style.id = 'lq-branding';
						style.textContent = ':root:root{' + light + '}\n:root.dark{' + dark + '}';
						document.head.appendChild(style);
					}
					if (
						typeof cached.logoVersion === 'number' &&
						Number.isInteger(cached.logoVersion) &&
						cached.logoVersion > 0
					) {
						const link = document.querySelector('link[rel="icon"]');
						if (link) {
							// The server only ever stores sniffed PNG/JPEG/WEBP bytes —
							// raster by construction, so pointing the icon at the unauth
							// logo endpoint is safe. No logo ⇒ default favicon.svg stays.
							link.href =
								('%sveltekit.env.PUBLIC_LQ_AI_API_BASE_URL%' || '/api/v1') +
								'/branding/logo?v=' +
								encodeURIComponent(String(cached.logoVersion));
							link.removeAttribute('type');
						}
					}
				} catch {
					// Corrupt cache — the default brand paints; refreshBranding()
					// rewrites the cache after the GET /branding round-trip.
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
