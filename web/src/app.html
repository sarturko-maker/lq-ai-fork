<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
		/>
		<meta name="theme-color" content="#ffffff" />
		<meta name="robots" content="noindex,nofollow" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<title>LQ.AI</title>
		<script>
			// Apply the dark/light class before first paint so Tailwind `dark:`
			// variants render without a flash. Rewritten from scratch for the
			// standalone shell (ADR-F006 relicensing condition); `localStorage.theme`
			// keeps its pre-S6 values — 'system' follows the OS, 'light' is light,
			// anything else (incl. legacy 'dark'/'oled-dark') renders dark.
			(() => {
				const apply = (dark) => {
					const root = document.documentElement;
					root.classList.remove('dark', 'light');
					root.classList.add(dark ? 'dark' : 'light');
					const meta = document.querySelector('meta[name="theme-color"]');
					// F013 (VL0) token canvases: charcoal #111 (never black) / white.
					// Mirrors applyTheme() in cockpit/helpers.ts — keep the two in sync.
					if (meta) meta.setAttribute('content', dark ? '#111111' : '#ffffff');
				};
				let theme = localStorage.getItem('theme');
				if (!theme) {
					theme = 'system';
					localStorage.setItem('theme', 'system');
				}
				const media = window.matchMedia('(prefers-color-scheme: dark)');
				apply(theme === 'system' ? media.matches : theme !== 'light');
				media.addEventListener('change', (event) => {
					if (localStorage.getItem('theme') === 'system') apply(event.matches);
				});
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
