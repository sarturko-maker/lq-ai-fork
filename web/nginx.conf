# LQ.AI web shell — static SPA serving contract (F0-S6, ADR-F006):
# listen on 8080, answer GET /health, and fall back to index.html so
# client-side deep links (/lq-ai/login, /lq-ai/tabular/[id], …) resolve.
# /word-addin/ and /learn/playgrounds/ are real directories inside the
# bundle and are served as plain files.
#
# nginx add_header inheritance: a location that declares ANY add_header
# inherits none from the server block — so every location declares its
# full header set explicitly.
# WebSocket connection-upgrade mapping (idiomatic): emit `Connection: upgrade`
# only for a real WS handshake and `close` otherwise, so the proxied WOPI REST
# calls (Slice 2/3) don't carry a spurious upgrade header. `map` is valid here
# because conf.d/*.conf is included within the http{} context.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # Hashed build assets are immutable by construction.
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
    }

    # In-app Word editor — same-origin reverse proxy to the isolated
    # `collabora` service (Collabora Online / CODE; ADR-F047,
    # libreoffice-editor Slice 1). coolwsd speaks WebSocket for the live
    # editing channel, so the connection-upgrade headers are required.
    # The trailing slash on proxy_pass STRIPS the /collabora/ prefix, so
    # coolwsd routes requests at its own root (it 400s "Unknown resource" on a
    # prefixed path — verified at bring-up; `net.proxy_prefix` does not make it
    # route a sub-path). This is sufficient for Slice 1 (discovery + the WOPI
    # endpoints + the editing websocket all resolve). Making coolwsd EMIT
    # /collabora/-prefixed asset URLs for the iframe is finalised in Slice 4
    # (proxy-prefix URL rewriting, a <base> tag, or a dedicated origin).
    # Admin surfaces (the /cool/adminws control WebSocket, /cool/getMetrics, and
    # the /browser/<hash>/admin UI) ARE reachable through this prefix-stripping
    # proxy and are gated only by coolwsd's admin credentials — so we ALSO hard
    # 404 them here (defence-in-depth): a deploy with weak/default creds is then
    # not one misconfig away from an exposed admin channel. This regex location
    # takes precedence over the /collabora/ prefix below.
    location ~ ^/collabora/(cool/adminws|cool/getMetrics|browser/[^/]+/admin) {
        return 404;
    }

    location /collabora/ {
        proxy_pass http://collabora:9980/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The editing websocket is long-lived.
        proxy_read_timeout 36000s;
        # This location declares add_header → it inherits none (see top of
        # file). Restate the baseline + the framing CSP: only our own origin
        # may embed the editor.
        add_header X-Content-Type-Options nosniff;
        add_header Content-Security-Policy "frame-src 'self'; frame-ancestors 'self'";
    }

    location / {
        # Mutable entry points (the index.html fallback, /_app/env.js,
        # /_app/version.json, static assets) must revalidate on every load —
        # heuristic caching would strand redeployed clients on hashed chunks
        # that no longer exist.
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options nosniff;
        # Framing policy (ADR-F047): the SPA may embed only same-origin frames
        # (the /collabora/ editor) and may itself be framed only same-origin.
        # Deliberately narrow — script-src/style-src CSP is future hardening.
        add_header Content-Security-Policy "frame-src 'self'; frame-ancestors 'self'";
        try_files $uri $uri/ /index.html;
    }
}
