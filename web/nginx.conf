# LQ.AI web shell — static SPA serving contract (F0-S6, ADR-F006):
# listen on 8080, answer GET /health, and fall back to index.html so
# client-side deep links (/lq-ai/login, /lq-ai/tabular/[id], …) resolve.
# /word-addin/ and /learn/playgrounds/ are real directories inside the
# bundle and are served as plain files.
#
# nginx add_header inheritance: a location that declares ANY add_header
# inherits none from the server block — so every location declares its
# full header set explicitly.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # Hashed build assets are immutable by construction.
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
    }

    location / {
        # Mutable entry points (the index.html fallback, /_app/env.js,
        # /_app/version.json, static assets) must revalidate on every load —
        # heuristic caching would strand redeployed clients on hashed chunks
        # that no longer exist.
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options nosniff;
        try_files $uri $uri/ /index.html;
    }
}
