# LQ.AI web shell — static SPA serving contract (F0-S6, ADR-F006):
# listen on 8080, answer GET /health, and fall back to index.html so
# client-side deep links (/lq-ai/login, /lq-ai/tabular/[id], …) resolve.
# /word-addin/ and /learn/playgrounds/ are real directories inside the
# bundle and are served as plain files.
#
# nginx add_header inheritance: a location that declares ANY add_header
# inherits none from the server block — so every location declares its
# full header set explicitly.
# WebSocket connection-upgrade mapping (idiomatic): emit `Connection: upgrade`
# only for a real WS handshake and `close` otherwise, so the proxied WOPI REST
# calls (Slice 2/3) don't carry a spurious upgrade header. `map` is valid here
# because conf.d/*.conf is included within the http{} context.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # Hashed build assets are immutable by construction.
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
    }

    # In-app Word editor — same-origin reverse proxy to the isolated
    # `collabora` service (Collabora Online / CODE; ADR-F047, libreoffice-editor
    # Slices 1 + 4). Collabora is hosted at its NATIVE ROOT paths (/browser/,
    # /cool/, /hosting/) — the canonical Collabora reverse-proxy layout. Slice 1
    # tried a /collabora/ sub-path, but `cool.html` references its assets by
    # ABSOLUTE ROOT paths (href="/browser/<hash>/bundle.css", …) and the editing
    # websocket connects to /cool/<wopisrc>/ws, so a sub-path can never serve the
    # iframe (coolwsd also 400s "Unknown resource" on a prefixed path, and
    # net.proxy_prefix does not fix it). `data-service-root=""` confirms root
    # hosting is coolwsd's intended mode. The frontend takes the discovery
    # `urlsrc` pathname and prepends the page origin (Slice 4).
    #
    # coolwsd speaks WebSocket for the live editing channel (/cool/), so the
    # connection-upgrade headers are required there. proxy_pass WITHOUT a URI
    # part preserves the full path (no prefix strip).
    #
    # Admin surfaces (the /cool/adminws control WebSocket, /cool/getMetrics, and
    # the /browser/<hash>/admin UI) are gated only by coolwsd's admin
    # credentials — so we ALSO hard 404 them here (defence-in-depth): a deploy
    # with weak/default creds is then not one misconfig away from an exposed
    # admin channel. nginx evaluates a REGEX location before the plain-prefix
    # ones below, so this deny wins for the admin paths while /cool/ + /browser/
    # still serve everything else. (Plain-prefix, NOT `^~`, precisely so this
    # regex is still consulted.)
    location ~ ^/(cool/adminws|cool/getMetrics|browser/[^/]+/admin) {
        return 404;
    }

    # Static editor assets (bundle.js/css, l10n, fonts) — immutable per build
    # hash, like /_app/immutable/. No websocket here.
    location /browser/ {
        proxy_pass http://collabora:9980;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # This location declares add_header → it inherits none (see top of file).
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;
        add_header Content-Security-Policy "frame-src 'self'; frame-ancestors 'self'";
    }

    # WOPI discovery + capabilities (the host reads urlsrc from here). REST only.
    location /hosting/ {
        proxy_pass http://collabora:9980;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Content-Type-Options nosniff;
        add_header Content-Security-Policy "frame-src 'self'; frame-ancestors 'self'";
    }

    # The live editing channel (the WebSocket) + the WOPI ferry. Long-lived.
    location /cool/ {
        proxy_pass http://collabora:9980;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The editing websocket is long-lived.
        proxy_read_timeout 36000s;
        add_header X-Content-Type-Options nosniff;
        add_header Content-Security-Policy "frame-src 'self'; frame-ancestors 'self'";
    }

    location / {
        # Mutable entry points (the index.html fallback, /_app/env.js,
        # /_app/version.json, static assets) must revalidate on every load —
        # heuristic caching would strand redeployed clients on hashed chunks
        # that no longer exist.
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options nosniff;
        # Framing policy (ADR-F047): the SPA may embed only same-origin frames
        # (the /collabora/ editor) and may itself be framed only same-origin.
        # Deliberately narrow — script-src/style-src CSP is future hardening.
        add_header Content-Security-Policy "frame-src 'self'; frame-ancestors 'self'";
        try_files $uri $uri/ /index.html;
    }
}
