# LQ.AI — development docker-compose
#
# Default profile (no --profile flag): Mode 1 (cloud LLM keys via Inference Gateway).
# Local-inference profile (--profile local): adds the ollama container for local (Tier 1) inference.
#
# Per PRD §6.1 and ADR 0001 (OpenWebUI fork pin v0.9.2).
#
# Quick start:
#   cp .env.example .env
#   # edit .env — set LQ_AI_GATEWAY_KEY, JWT_SECRET, POSTGRES_PASSWORD,
#   # MINIO_ROOT_PASSWORD, and at least one provider API key
#   docker compose up -d
#
# Air-gapped / Mode 2:
#   docker compose --profile local up -d

name: lq-ai

services:
  # ============================================================
  # Storage (PRD §2.1)
  # ============================================================

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lq_ai}
      POSTGRES_USER: ${POSTGRES_USER:-lq_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lq_ai} -d $${POSTGRES_DB:-lq_ai}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_BIND_ADDR:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lq_ai}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - miniodata:/data
    ports:
      - "${MINIO_BIND_ADDR:-127.0.0.1}:${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_BIND_ADDR:-127.0.0.1}:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ============================================================
  # Application services (PRD §2.1)
  # ============================================================

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Auth — backend → gateway (and gateway → backend for C2 skill fetches).
      # The gateway uses the SAME shared secret in BOTH directions.
      LQ_AI_GATEWAY_KEY: ${LQ_AI_GATEWAY_KEY:?LQ_AI_GATEWAY_KEY is required}
      # C2 — backend HTTP client for skill prompt assembly (ADR 0007).
      LQ_AI_API_URL: ${LQ_AI_API_URL:-http://api:8000}
      LQ_AI_SKILL_CACHE_TTL_SECONDS: ${LQ_AI_SKILL_CACHE_TTL_SECONDS:-60}
      # B4 — inference_routing_log writer (audit trail of every routed
      # request). Optional: without DATABASE_URL the gateway logs a
      # warning at startup and runs in NullRoutingLogWriter mode.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-lq_ai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lq_ai}}
      # Provider keys (any of these may be unset; gateway.yaml picks which to use)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_RESOURCE: ${AZURE_OPENAI_RESOURCE:-}
      # AZ-CONFIG — Azure AI Foundry: Claude (native Anthropic Messages
      # route; chat-only until AZ-2b) + non-OpenAI Foundry Models (e.g.
      # Mistral-Large-3 on the classic deployments route). All optional.
      AZURE_ANTHROPIC_API_KEY: ${AZURE_ANTHROPIC_API_KEY:-}
      AZURE_ANTHROPIC_RESOURCE: ${AZURE_ANTHROPIC_RESOURCE:-}
      AZURE_FOUNDRY_API_KEY: ${AZURE_FOUNDRY_API_KEY:-}
      AZURE_FOUNDRY_RESOURCE: ${AZURE_FOUNDRY_RESOURCE:-}
      # KV-1 (ADR-F069) — OPTIONAL Azure Key Vault sourcing of the three Azure
      # keys via the VM's managed identity. All NON-secret; unset ⇒ the plain
      # AZURE_*_API_KEY vars above are used (default). See .env.example.
      AZURE_KEY_VAULT_NAME: ${AZURE_KEY_VAULT_NAME:-}
      AZURE_OPENAI_KEY_SECRET_NAME: ${AZURE_OPENAI_KEY_SECRET_NAME:-}
      AZURE_ANTHROPIC_KEY_SECRET_NAME: ${AZURE_ANTHROPIC_KEY_SECRET_NAME:-}
      AZURE_FOUNDRY_KEY_SECRET_NAME: ${AZURE_FOUNDRY_KEY_SECRET_NAME:-}
      # AZ-6 (ADR-F072) — OPTIONAL keyless auth for azure-openai via the VM's
      # managed identity (no static key). NON-secret; unset ⇒ the api-key path
      # above is used, unchanged. See .env.example / runbook §4c.
      AZURE_OPENAI_USE_MANAGED_IDENTITY: ${AZURE_OPENAI_USE_MANAGED_IDENTITY:-}
      AZURE_OPENAI_IDENTITY_RESOURCE: ${AZURE_OPENAI_IDENTITY_RESOURCE:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # B6 partial — Ollama (Mode-2 / Tier-1). Forwarded so the
      # gateway.yaml's ${OLLAMA_BASE_URL:-http://ollama:11434}
      # placeholder resolves at config-load time. Operators running
      # Ollama on the host set OLLAMA_BASE_URL=http://host.docker.internal:11434
      # in their .env; default reaches the in-Compose `ollama` service
      # (`--profile local up`).
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      # Operational
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LQ_AI_DEV_MODE: ${LQ_AI_DEV_MODE:-false}
    # D0.5 — gateway.yaml is now mutable at runtime via the admin
    # alias-CRUD surface (ADR 0010). Two related volumes:
    #
    # 1. ``./gateway.yaml.example`` is mounted RO so the entrypoint
    #    script can seed the writable copy from it on first boot.
    # 2. A named volume ``gateway-config`` holds the writable
    #    ``gateway.yaml`` between container restarts. Operators who
    #    want to edit the config in their host filesystem replace
    #    this with a host-path bind mount; operators who want
    #    immutable config (a hardened deployment) bind-mount their
    #    own ``gateway.yaml`` directly with ``:ro`` and accept that
    #    the admin write endpoints will fail.
    #
    # The entrypoint sets GATEWAY_CONFIG_PATH=/etc/lq-ai/gateway.yaml
    # automatically when the directory mount is present.
    volumes:
      # Seed file (read-only). The entrypoint copies this into the
      # writable named volume on first boot.
      - ${GATEWAY_CONFIG_FILE:-./gateway.yaml.example}:/usr/share/lq-ai/gateway.yaml.example:ro
      # Writable directory for the live gateway.yaml. Hot-reload (D0.5)
      # writes to this directory atomically (temp + rename) and the
      # named volume persists the file across container restarts.
      - gateway-config:/etc/lq-ai
    ports:
      - "${GATEWAY_BIND_ADDR:-127.0.0.1}:${GATEWAY_HOST_PORT:-8001}:8001"
    healthcheck:
      # python:3.12-slim has no curl; use stdlib urllib instead
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health', timeout=2).status == 200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    # SAAS-1: build context is the repo ROOT (not ./api) so api/Dockerfile can
    # `COPY skills/ /skills/` — skills/ lives outside api/, and the prod image
    # (docker-compose.prod.yml, images.yml, release.yml) has no separate repo
    # checkout to bind-mount it from. Dev keeps the ./skills bind mount below
    # for live editing; the mount shadows the baked-in copy (fine — dev wants
    # host-fresh skills, not the build-time snapshot).
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      gateway:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-lq_ai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lq_ai}}
      # Cache and queue
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Object storage
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-lq_ai}}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      S3_BUCKET: ${S3_BUCKET:-lq-ai-files}
      S3_REGION: ${S3_REGION:-us-east-1}
      # Inference Gateway
      LQ_AI_GATEWAY_URL: ${LQ_AI_GATEWAY_URL:-http://gateway:8001}
      LQ_AI_GATEWAY_KEY: ${LQ_AI_GATEWAY_KEY:?LQ_AI_GATEWAY_KEY is required}
      # Retrieval providers (ADR-F049 C1/D) — see arq-worker for the rationale.
      # Dev-box override (.env) avoids loading in-process ONNX models.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      RERANK_ENABLED: ${RERANK_ENABLED:-true}
      # JWT (auth — per ADR 0002 the backend owns auth)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-900}
      JWT_REFRESH_TOKEN_TTL_SECONDS: ${JWT_REFRESH_TOKEN_TTL_SECONDS:-604800}
      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Operational
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # ADR-F059 — the dev harness runs in dev mode so the JWT_SECRET boot
      # assertion (non-dev + default secret => refuse to boot) never trips the
      # local stack. lq_ai_dev_mode gates ONLY that assertion (nothing else
      # reads it); prod hardcodes "false" (docker-compose.prod.yml).
      LQ_AI_DEV_MODE: ${LQ_AI_DEV_MODE:-true}
      # ADR-F059 §6-item-1 — the auth rate limiter is wired in ALL environments,
      # but the dev stack (loopback-only) needs no brute-force brake and Cypress
      # e2e logs in repeatedly as one account from one IP. Generous dev login
      # limits keep the limiter code path live without flaking local e2e; prod
      # uses the secure code defaults (docker-compose.prod.yml). Override as needed.
      RATE_LIMIT_LOGIN_IP_PER_WINDOW: ${RATE_LIMIT_LOGIN_IP_PER_WINDOW:-1000}
      RATE_LIMIT_LOGIN_ACCOUNT_PER_WINDOW: ${RATE_LIMIT_LOGIN_ACCOUNT_PER_WINDOW:-1000}
      # CORS — empty disables. Production behind a same-origin reverse
      # proxy: leave unset. Local Compose dev: http://localhost:3000.
      LQ_AI_CORS_ORIGINS: ${LQ_AI_CORS_ORIGINS:-}
      # Skills loader — C1 walks this directory at startup. Mounted
      # read-only so the container can only consume the skills filesystem,
      # not mutate it (skill authoring is a host-side / human-attestation
      # workflow per CLAUDE.md "Working with skills").
      LQ_AI_SKILLS_DIR: ${LQ_AI_SKILLS_DIR:-/skills}
      # M3-D1 slack-bridge integration. Both optional: only required for
      # operators who enable the `slack` compose profile. The api refuses
      # bridge traffic with 500 when either is unset.
      LQ_AI_BRIDGE_TOKEN: ${LQ_AI_BRIDGE_TOKEN:-}
      LQ_AI_BRIDGE_MASTER_KEY: ${LQ_AI_BRIDGE_MASTER_KEY:-}
      # SETUP-5a (ADR-F063) — deployment default budget profile for new agent
      # runs. Optional; unset ⇒ "" ⇒ balanced (config.py normalizes "" → None).
      RUN_DEFAULT_BUDGET_PROFILE: ${RUN_DEFAULT_BUDGET_PROFILE:-}
      # BRAND-1a (ADR-F068) — optional white-label seed; applied only while the
      # branding table is empty. api only — the workers never read branding.
      BRAND_PRODUCT_NAME: ${BRAND_PRODUCT_NAME:-}
      BRAND_ACCENT_LIGHT: ${BRAND_ACCENT_LIGHT:-}
      BRAND_ACCENT_DARK: ${BRAND_ACCENT_DARK:-}
    volumes:
      - ./skills:/skills:ro
      # B-7a (ADR-F067 D4): shipped agent-profile manifests, loaded at API boot
      # (app/profiles/). api only — the workers never apply profiles.
      - ./profiles:/profiles:ro
    ports:
      - "${API_BIND_ADDR:-127.0.0.1}:${API_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingest-worker:
    # C5 document pipeline worker. arq-backed; consumes ingest jobs
    # from Redis and writes parsed documents + chunks to Postgres.
    # See `docs/adr/0006-document-pipeline-architecture.md` for the
    # mechanism rationale.
    # SAAS-1: repo-root build context — see the `api` service's comment above.
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    # Dev-box OOM containment (ADR-F056 §Resource-aware execution). This worker
    # loads Docling + EasyOCR + the local embedder (~2.5 GiB) during ingest. On a
    # ~6 GB box an unbounded spike made the kernel OOM-killer kill a Postgres
    # backend → whole-app crash-recovery. mem_limit caps THIS cgroup so a runaway
    # ingest self-OOMs (job fails + restarts) instead of taking down the DB.
    # Sized for the single-runaway case (the observed one): 3g while arq idles
    # keeps the host under its ceiling. Pair with LQ_AI_INGEST_WORKER_CONCURRENCY=1.
    mem_limit: 3g
    mem_reservation: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      # DE-326: the api is the single schema migrator. Wait for it to be
      # healthy (entrypoint runs `alembic upgrade head` before serving) so
      # this worker never touches an unmigrated DB and never races the api's
      # migration. Paired with LQ_AI_SKIP_MIGRATIONS=1 below.
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-lq_ai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lq_ai}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # DE-326: the api owns migrations; this worker must NOT run
      # `alembic upgrade head` on boot. The worker image does not mount
      # ./skills, so migration 0032 (seed builtin NDA playbooks, which reads
      # /skills/playbooks/nda/playbook.yaml) would raise on a fresh install.
      # Skipping is safe because the api (above) migrates to head first.
      LQ_AI_SKIP_MIGRATIONS: "1"
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-lq_ai}}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      S3_BUCKET: ${S3_BUCKET:-lq-ai-files}
      S3_REGION: ${S3_REGION:-us-east-1}
      LQ_AI_INGEST_WORKER_CONCURRENCY: ${LQ_AI_INGEST_WORKER_CONCURRENCY:-2}
      LQ_AI_DOCLING_TIMEOUT_SECONDS: ${LQ_AI_DOCLING_TIMEOUT_SECONDS:-300}
      LQ_AI_DOCLING_ENABLED: ${LQ_AI_DOCLING_ENABLED:-true}
      LQ_AI_CHUNK_TARGET_CHARS: ${LQ_AI_CHUNK_TARGET_CHARS:-2000}
      LQ_AI_CHUNK_OVERLAP_CHARS: ${LQ_AI_CHUNK_OVERLAP_CHARS:-200}
      # Gateway endpoint + auth — required by `embed_chunks_for_file_job`
      # which calls `POST {LQ_AI_GATEWAY_URL}/v1/embeddings` to vectorise
      # each freshly-ingested chunk. Without these vars the embed step
      # silently fails with `chunks_embedded: 0`, leaving chunks with
      # NULL embeddings — KB hybrid_search then has no vector half to
      # work with even on KBs configured for hybrid retrieval
      # (`hybrid_alpha < 1.0`).
      LQ_AI_GATEWAY_URL: ${LQ_AI_GATEWAY_URL:-http://gateway:8001}
      LQ_AI_GATEWAY_KEY: ${LQ_AI_GATEWAY_KEY:?LQ_AI_GATEWAY_KEY is required}
      # MUST match api + arq-worker — the missing forward here was fault (1)
      # of the 2026-07-01 embedding-mismatch incident (ADR-F056): ingest
      # embedded `local` while queries embedded `gateway`, two vector spaces
      # in one column. One shared var, three services, until F056's resolver.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Persist Docling's Hugging Face model cache and EasyOCR's detection
    # model cache across container restarts so the operator only pays
    # the first-run download cost once per host (not once per container).
    # Without these volumes, every `docker compose down`/`up` re-downloads
    # ~700MB of models on the first ingestion, blocking the user for ~1
    # minute. See `docs/adr/0006-document-pipeline-architecture.md`.
    volumes:
      - ingest-hf-cache:/root/.cache/huggingface
      - ingest-easyocr-cache:/root/.EasyOCR
    # arq's CLI discovers WorkerSettings from the dotted module path.
    # The image's WORKDIR is /app, so app.workers.* resolves directly.
    command: ["arq", "app.workers.document_pipeline.WorkerSettings"]
    healthcheck:
      # arq doesn't expose an HTTP healthcheck; use a Python check that
      # the redis pool is reachable. The worker process won't accept
      # jobs without it, so this proxies "is the worker running" well
      # enough for compose's `condition: service_healthy`.
      test:
        ["CMD", "python", "-c", "import os; from redis import Redis; r = Redis.from_url(os.environ['REDIS_URL']); r.ping()"]
      interval: 10s
      timeout: 5s
      retries: 6

  arq-worker:
    # M3-A6 worker. Sister to `ingest-worker`; same image, same Redis,
    # but consumes from the dedicated `arq:m3a6` queue so long-running
    # easy-playbook generation jobs (PRD §3.7: up to 10 minutes for a
    # 10-document corpus) do not delay document ingest and vice versa.
    # Phase 1 registers only a noop task; Phase 5 of M3-A6 adds the
    # easy-playbook generation function. See
    # `api/app/workers/arq_setup.py` for the WorkerSettings.
    # SAAS-1: repo-root build context — see the `api` service's comment above.
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    # Dev-box OOM containment (ADR-F056 §Resource-aware execution). Agent runs
    # execute HERE and load the local embedder + hold N fanned-out subagents'
    # context. mem_limit caps THIS cgroup so a heavy run self-OOMs (run fails +
    # worker restarts) rather than the kernel killing Postgres. Sized for the
    # single-runaway case: 2.5g while ingest idles stays under the host ceiling.
    # Pair with a lowered FAN_OUT_QUOTA to cut the peak subagent fan-out.
    mem_limit: 2500m
    mem_reservation: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # DE-326: the api is the single schema migrator. Wait for it to be
      # healthy so this worker never touches an unmigrated DB and never
      # races the api's migration. Paired with LQ_AI_SKIP_MIGRATIONS=1 below.
      api:
        condition: service_healthy
    environment:
      # The worker opens DB sessions in its on_shutdown hook (and Phase
      # 5 will add the easy-playbook generation pipeline that reads
      # source documents). Same env wiring as the api/ingest-worker.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-lq_ai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lq_ai}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # DE-326: the api owns migrations; this worker must NOT run
      # `alembic upgrade head` on boot — the api is the single schema
      # migrator and runs first. (This worker NOW mounts ./skills — see
      # volumes below — because the shared registry bootstrap installs
      # the skill registry at worker startup so skill_ref autonomous
      # sessions resolve here; the old "no ./skills mount" caveat about
      # migration 0032 no longer applies. DE-326 remains the operative
      # reason to skip.)
      LQ_AI_SKIP_MIGRATIONS: "1"
      # Gateway endpoint + auth — required by Phase 5's easy-playbook
      # extractor which calls the inference gateway. Pre-wired now so
      # Phase 5 doesn't need a second docker-compose edit.
      LQ_AI_GATEWAY_URL: ${LQ_AI_GATEWAY_URL:-http://gateway:8001}
      LQ_AI_GATEWAY_KEY: ${LQ_AI_GATEWAY_KEY:?LQ_AI_GATEWAY_KEY is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Retrieval providers (ADR-F049 C1/D). The agent run executes HERE, so the
      # in-process ONNX models (local embedder + cross-encoder rerank) load in
      # THIS worker during search_documents. On a memory-constrained box (≈6 GB)
      # that OOMs the run → Postgres broken-pipe crash loop. Override via .env to
      # gateway embeddings + rerank off so runs stay lightweight. Defaults below
      # preserve production behaviour (local embedder + rerank on).
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      RERANK_ENABLED: ${RERANK_ENABLED:-true}
      # Per-run subagent fan-out ceiling (ADR-F049 Slice E / ADR-F053). Agent
      # runs execute in THIS worker, so the cap must be set here. Dev-box OOM
      # containment lowers it via .env; default 32 (Settings.fan_out_quota,
      # api/app/config.py) if unset. NOTE: this governs the BALANCED budget
      # profile only — economy (8) and generous (48) are hardcoded in
      # api/app/agents/budget.py, so a generous run ignores this env var and
      # the mem_limit above is the only containment. See ADR-F056.
      FAN_OUT_QUOTA: ${FAN_OUT_QUOTA:-32}
      # SETUP-5a (ADR-F063) — deployment default budget profile, mirrored from
      # the api service (the api resolves + persists at run create; forwarded
      # here too so both processes read identical settings).
      RUN_DEFAULT_BUDGET_PROFILE: ${RUN_DEFAULT_BUDGET_PROFILE:-}
      # Skills loader — the worker's on_startup installs the skill
      # registry via the shared bootstrap (app/skills/bootstrap.py) so
      # skill_ref autonomous sessions resolve on this process. Mounted
      # read-only so the container can only consume the skills filesystem,
      # not mutate it (skill authoring is a host-side / human-attestation
      # workflow per CLAUDE.md "Working with skills").
      LQ_AI_SKILLS_DIR: ${LQ_AI_SKILLS_DIR:-/skills}
      # Object storage — this worker EXECUTES agent runs whose tools read/write
      # object storage (the Commercial apply_redline source-doc fetch + redlined
      # output upload; user-export bundles). Same wiring as api/ingest-worker.
      # Without it, storage-backed tools fail in the worker ("could not be read
      # from storage") while DB-backed tools (read_document) still work.
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-lq_ai}}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      S3_BUCKET: ${S3_BUCKET:-lq-ai-files}
      S3_REGION: ${S3_REGION:-us-east-1}
    volumes:
      - ./skills:/skills:ro
    command: ["arq", "app.workers.arq_setup.WorkerSettings"]
    healthcheck:
      # Same proxy as ingest-worker: redis-reachability stands in for
      # arq-worker-liveness because the worker can't process jobs
      # without redis.
      test:
        ["CMD", "python", "-c", "import os; from redis import Redis; r = Redis.from_url(os.environ['REDIS_URL']); r.ping()"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    # LQ.AI web shell — standalone SvelteKit SPA served by nginx on :8080
    # (F0-S6, ADR-F006). The OpenWebUI husk and its Python backend were
    # removed; the pre-S6 port + /health contract is unchanged.
    #
    # Word add-in (M3-B1) integration: the webpack build at
    # `word-addin/` outputs to `web/static/word-addin/` which the web
    # Dockerfile's `COPY . .` in the SvelteKit build stage picks up
    # automatically. Run `cd word-addin && npm install && npm run build`
    # once before `docker compose up --build` to populate the directory;
    # see `word-addin/README.md` for the full build flow.
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Vite/SvelteKit bakes PUBLIC_* env vars into the static build.
        # Production deployments front web + api at the same origin via
        # a reverse proxy and leave this UNSET (relative /api/v1).
        # Local Compose dev sets it to http://localhost:8000/api/v1 in
        # .env so the LQ.AI shell at :3000 can talk to the api at :8000.
        PUBLIC_LQ_AI_API_BASE_URL: ${PUBLIC_LQ_AI_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_BIND_ADDR:-127.0.0.1}:${WEB_HOST_PORT:-3000}:8080"
    healthcheck:
      # nginx:alpine ships busybox wget, not curl. 127.0.0.1 (not localhost):
      # nginx listens IPv4-only, but localhost can resolve to IPv6 ::1 first →
      # false "unhealthy" (see web/Dockerfile HEALTHCHECK for the full note).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  collabora:
    # In-app Word editor engine — Collabora Online / CODE (LibreOffice on
    # LibreOfficeKit) over WOPI (ADR-F047; libreoffice-editor Slice 1).
    # PREBUILT image, pinned BY DIGEST (Spike-0-validated Collabora Office
    # 26.04.1.4 — docs/fork/evidence/libreoffice-spike0/). Internal, self-hosted,
    # server-side-only, NOT redistributed; licence posture in NOTICES.md.
    #
    # Isolation: NO host port — reachable only over lq-ai_default by `web`
    # (the same-origin /collabora/ proxy) and able to reach `api` (the WOPI
    # host, Slice 2). Not publicly reachable; the admin console is credential-
    # gated AND hard-404'd at the web proxy (see web/nginx.conf). No gateway
    # reachability — the editor data plane never calls an LLM, so the ADR-F010
    # gateway-only-egress invariant is untouched.
    image: collabora/code@sha256:75859dc9f9084d1877ce36cf96ec86600f495bade33289c9cbc27e0a0ee23b81  # collabora/code 26.04.1.4
    restart: unless-stopped
    # MKNOD is all coolwsd's chroot sandbox needs; we deliberately avoid
    # privileged / SYS_ADMIN. If the mount-namespace sandbox cannot start on
    # this host's kernel, set `--o:mount_namespaces=false` in extra_params
    # (record it in the PR) rather than widening capabilities.
    cap_add:
      - MKNOD
    environment:
      # WOPI host allow-list — the only origin coolwsd accepts a WOPISrc from
      # (Slice 2 mints tokens against this; harmless now).
      aliasgroup1: http://api:8000
      # Browser-facing origin coolwsd builds asset URLs + the editing-socket host
      # (`data-host`) from. Same-origin host the `web` nginx serves the editor
      # under (Slice 4 hosts Collabora at its native root paths /browser /cool
      # /hosting).
      server_name: ${COLLABORA_SERVER_NAME:-localhost:3000}
      dictionaries: en_GB en_US
      DONT_GEN_SSL_CERT: "true"
      # Admin console creds — console stays unreachable (no host port, not
      # proxied); set only so coolwsd does not default-open.
      username: ${COLLABORA_ADMIN_USER:-admin}
      password: ${COLLABORA_ADMIN_PASSWORD:-admin}
      # ssl.termination tells coolwsd the PUBLIC scheme so it builds the right
      # asset/websocket URLs: true → https/wss (TLS terminated at the operator's
      # proxy in prod), false → http/ws (plain-HTTP dev origin). Dev defaults to
      # false so the editing socket is ws:// over our http://localhost:3000;
      # PROD MUST set COLLABORA_SSL_TERMINATION=true. Only our web origin may
      # frame the editor (defence-in-depth with the nginx CSP frame-ancestors).
      #
      # home_mode.enable=true is the ONLY lever that suppresses Collabora's
      # first-open "What's New" welcome + the "rate us" feedback popups on the
      # prebuilt collabora/code image (that image is built with
      # ENABLE_WELCOME_MESSAGE=1 and force-re-enables welcome.enable at boot unless
      # home_mode is on — verified in coolwsd source). TRADE-OFF: it also caps
      # coolwsd to 20 concurrent connections / 10 open documents — fine for an
      # in-house embedded editor, a limit at scale. A deployment that needs more can
      # set COLLABORA_HOME_MODE=false (accepting the once-per-version welcome popup);
      # the clean unbranded posture without the cap is the deferred ADR-F047
      # self-build productionisation decision. allow_update_popup=false drops the
      # separate update-notification nag.
      extra_params: "--o:ssl.enable=false --o:ssl.termination=${COLLABORA_SSL_TERMINATION:-false} --o:net.frame_ancestors=${COLLABORA_FRAME_ANCESTORS:-http://localhost:3000} --o:home_mode.enable=${COLLABORA_HOME_MODE:-true} --o:allow_update_popup=false"
    healthcheck:
      # The CODE image ships neither curl nor wget — only bash. Probe the WOPI
      # discovery endpoint over bash's /dev/tcp and assert HTTP 200.
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/127.0.0.1/9980 && printf "GET /hosting/discovery HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && head -n1 <&3 | grep -q 200'
      interval: 10s
      timeout: 5s
      retries: 12
      # coolwsd spawns its first jailed child (~10-30s) before it is ready.
      start_period: 60s

  # ============================================================
  # Mode 2 — local inference (PRD §1.5.1, §6.1)
  # Only started with --profile local
  # ============================================================

  ollama:
    image: ollama/ollama:latest
    profiles: ["local"]
    restart: unless-stopped
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "${OLLAMA_BIND_ADDR:-127.0.0.1}:${OLLAMA_HOST_PORT:-11434}:11434"
    healthcheck:
      # Ollama exposes /api/tags as the cheapest GET; a 200 means the
      # server is up (models are loaded lazily on first inference, so
      # we don't probe model presence here — `docker compose exec
      # ollama ollama pull <model>` is the operator's responsibility).
      # The ollama/ollama image ships /bin/ollama itself; we shell out
      # to it instead of curl (which the image doesn't ship).
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
    # GPU acceleration is operator-configured; uncomment when nvidia-docker
    # is available.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # NOTE: a `paddleocr` sidecar (image `legalquants/paddleocr-vl:latest`) was
  # previously sketched here under the `local` profile for scanned-PDF OCR.
  # It was never implemented: the image was never published and the
  # placeholder entrypoint only printed "lands in M2", yet its presence forced
  # `docker compose --profile local up` to attempt the (missing) pull and abort
  # the whole profile — including the ollama sidecar (issue #99). Scanned-PDF
  # OCR is genuinely not implemented; the ingestion pipeline is PyMuPDF +
  # Docling and sets `was_ocrd=False` (api/app/pipeline/ingest.py). The sidecar
  # has been removed; real OCR is tracked as DE-320. `--profile local` now adds
  # only the `ollama` sidecar.

  # ============================================================
  # Integration bridges (PRD §3.15 — opt-in by Compose profile)
  # ============================================================

  slack-bridge:
    # M3-D1 — Slack OAuth + webhook bridge. Gated by the ``slack``
    # profile so operators who don't use Slack don't pay the SBOM cost
    # or run a service they have nothing to do with.
    #
    # Bring up with: ``docker compose --profile slack up -d slack-bridge``
    #
    # Credentials come from the operator's Slack App admin UI
    # (SLACK_CLIENT_ID / SLACK_CLIENT_SECRET / SLACK_SIGNING_SECRET);
    # LQ_AI_BRIDGE_TOKEN is the shared secret the bridge presents on
    # internal calls to the api (the api validates with the same env
    # var). LQ_AI_BRIDGE_PUBLIC_URL is the externally reachable URL
    # Slack will hit on OAuth callback — operators typically front
    # this with their reverse proxy.
    build:
      context: ./slack-bridge
      dockerfile: Dockerfile
    profiles: ["slack"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Slack-side credentials (operator obtains from Slack App admin UI)
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      # LQ.AI-side coordinates
      LQ_AI_BACKEND_URL: ${LQ_AI_BACKEND_URL:-http://api:8000}
      LQ_AI_BRIDGE_TOKEN: ${LQ_AI_BRIDGE_TOKEN:-}
      LQ_AI_BRIDGE_PUBLIC_URL: ${LQ_AI_BRIDGE_PUBLIC_URL:-}
      # Observability (opt-in)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-lq-ai-slack-bridge}
      LQ_AI_BRIDGE_LOG_LEVEL: ${LQ_AI_BRIDGE_LOG_LEVEL:-INFO}
    ports:
      - "${SLACK_BRIDGE_BIND_ADDR:-127.0.0.1}:${SLACK_BRIDGE_HOST_PORT:-8002}:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/healthz', timeout=2).status == 200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  teams-bridge:
    # M3-D3 — Microsoft Teams OAuth bridge. Gated by the ``teams``
    # profile so operators who don't use Teams don't pay the SBOM
    # cost or run a service they have nothing to do with.
    #
    # Bring up with: ``docker compose --profile teams up -d teams-bridge``
    #
    # Credentials come from the operator's Azure AD app registration
    # (MICROSOFT_APP_ID + MICROSOFT_APP_PASSWORD); LQ_AI_BRIDGE_TOKEN
    # is REUSED from the slack-bridge per M3-D3 decision #2 (same
    # bearer authenticates both bridges to the api).
    # LQ_AI_TEAMS_BRIDGE_PUBLIC_URL is the externally reachable URL
    # Microsoft will hit on OAuth callback — typically fronted by the
    # operator's reverse proxy.
    build:
      context: ./teams-bridge
      dockerfile: Dockerfile
    profiles: ["teams"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Microsoft-side credentials (Azure AD multi-tenant app)
      MICROSOFT_APP_ID: ${MICROSOFT_APP_ID:-}
      MICROSOFT_APP_PASSWORD: ${MICROSOFT_APP_PASSWORD:-}
      # LQ.AI-side coordinates
      LQ_AI_BACKEND_URL: ${LQ_AI_BACKEND_URL:-http://api:8000}
      LQ_AI_BRIDGE_TOKEN: ${LQ_AI_BRIDGE_TOKEN:-}
      LQ_AI_TEAMS_BRIDGE_PUBLIC_URL: ${LQ_AI_TEAMS_BRIDGE_PUBLIC_URL:-}
      # Observability (opt-in)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-lq-ai-teams-bridge}
      LQ_AI_TEAMS_BRIDGE_LOG_LEVEL: ${LQ_AI_TEAMS_BRIDGE_LOG_LEVEL:-INFO}
    ports:
      - "${TEAMS_BRIDGE_BIND_ADDR:-127.0.0.1}:${TEAMS_BRIDGE_HOST_PORT:-8003}:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/healthz', timeout=2).status == 200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

# ============================================================
# Persistent volumes (PRD §6.5)
# ============================================================

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollamadata:
  # D0.5 — writable directory for the gateway's runtime gateway.yaml.
  # Seeded from the repo's gateway.yaml.example on first boot via the
  # gateway entrypoint script. See ADR 0010.
  gateway-config:
  # Caches for the ingest-worker. Persisting these volumes across
  # `docker compose down` cycles avoids repeated ~700MB model downloads
  # on first ingestion. Per ADR 0006 (document pipeline architecture).
  ingest-hf-cache:
  ingest-easyocr-cache:
