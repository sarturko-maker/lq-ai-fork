# LQ.AI — development docker-compose
#
# Default profile (no --profile flag): Mode 1 (cloud LLM keys via Inference Gateway).
# Local-inference profile (--profile local): adds ollama and paddleocr containers.
#
# Per PRD §6.1 and ADR 0001 (OpenWebUI fork pin v0.9.2).
#
# Quick start:
#   cp .env.example .env
#   # edit .env — set LQ_AI_GATEWAY_KEY, JWT_SECRET, POSTGRES_PASSWORD,
#   # MINIO_ROOT_PASSWORD, and at least one provider API key
#   docker compose up -d
#
# Air-gapped / Mode 2:
#   docker compose --profile local up -d

name: lq-ai

services:
  # ============================================================
  # Storage (PRD §2.1)
  # ============================================================

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lq_ai}
      POSTGRES_USER: ${POSTGRES_USER:-lq_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lq_ai} -d $${POSTGRES_DB:-lq_ai}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lq_ai}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - miniodata:/data
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ============================================================
  # Application services (PRD §2.1)
  # ============================================================

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Auth — backend → gateway
      LQ_AI_GATEWAY_KEY: ${LQ_AI_GATEWAY_KEY:?LQ_AI_GATEWAY_KEY is required}
      # B4 — inference_routing_log writer (audit trail of every routed
      # request). Optional: without DATABASE_URL the gateway logs a
      # warning at startup and runs in NullRoutingLogWriter mode.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-lq_ai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lq_ai}}
      # Provider keys (any of these may be unset; gateway.yaml picks which to use)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_RESOURCE: ${AZURE_OPENAI_RESOURCE:-}
      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      # Operational
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LQ_AI_DEV_MODE: ${LQ_AI_DEV_MODE:-false}
    # Mount the operator's gateway.yaml at /etc/gateway.yaml. For dev, fall
    # back to gateway.yaml.example so a fresh `docker compose up` works
    # out-of-the-box. Operators copy the example to gateway.yaml and edit
    # for their deployment; the .env can override GATEWAY_CONFIG_FILE to
    # point at the operator copy.
    volumes:
      - ${GATEWAY_CONFIG_FILE:-./gateway.yaml.example}:/etc/gateway.yaml:ro
    ports:
      - "${GATEWAY_HOST_PORT:-8001}:8001"
    healthcheck:
      # python:3.12-slim has no curl; use stdlib urllib instead
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health', timeout=2).status == 200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      gateway:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-lq_ai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lq_ai}}
      # Cache and queue
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Object storage
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-lq_ai}}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      S3_BUCKET: ${S3_BUCKET:-lq-ai-files}
      S3_REGION: ${S3_REGION:-us-east-1}
      # Inference Gateway
      LQ_AI_GATEWAY_URL: ${LQ_AI_GATEWAY_URL:-http://gateway:8001}
      LQ_AI_GATEWAY_KEY: ${LQ_AI_GATEWAY_KEY:?LQ_AI_GATEWAY_KEY is required}
      # JWT (auth — per ADR 0002 the backend owns auth)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-900}
      JWT_REFRESH_TOKEN_TTL_SECONDS: ${JWT_REFRESH_TOKEN_TTL_SECONDS:-604800}
      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Operational
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LQ_AI_DEV_MODE: ${LQ_AI_DEV_MODE:-false}
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    # OpenWebUI fork imported at v0.9.2 per ADR 0001 (Task A1.d).
    # Customizations land progressively: A5 (branding + delegated-auth wiring),
    # D2 (tier badge), and others. The container builds upstream-as-is in M1's
    # initial state.
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Backend delegation (per ADR 0002 — backend owns auth)
      LQ_AI_API_URL: ${LQ_AI_API_URL:-http://api:8000}
      WEBUI_AUTH: ${WEBUI_AUTH:-false}
      WEBUI_NAME: ${WEBUI_NAME:-LQ.AI}
      WEBUI_URL: ${WEBUI_URL:-http://localhost:3000}
      # OpenWebUI's full env-var surface (DATABASE_URL, OLLAMA_BASE_URL,
      # ENABLE_*, etc.) lands when Task A1.d imports the fork and we know
      # the exact set to override vs. default.
    ports:
      - "${WEB_HOST_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # Mode 2 — local inference (PRD §1.5.1, §6.1)
  # Only started with --profile local
  # ============================================================

  ollama:
    image: ollama/ollama:latest
    profiles: ["local"]
    restart: unless-stopped
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    # GPU acceleration is operator-configured; uncomment when nvidia-docker
    # is available.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  paddleocr:
    # Local OCR for Mode 2 / air-gapped deployments (per PRD §2.2).
    # Image landed when M2 Document Pipeline implementation begins.
    profiles: ["local"]
    image: legalquants/paddleocr-vl:latest
    restart: "no"
    # Disabled in M1; placeholder so Mode 2 ops know where it goes.
    entrypoint: ["sh", "-c", "echo 'PaddleOCR-VL service lands in M2.'; sleep 1"]

# ============================================================
# Persistent volumes (PRD §6.5)
# ============================================================

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollamadata:
