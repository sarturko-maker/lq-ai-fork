# LQ.AI backend — Alembic configuration
#
# DATABASE_URL is read from the environment in alembic/env.py rather than
# hardcoded here, so this file does not contain credentials.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# Filename format: <revision>_<slug>.py — e.g., 0001_initial.py
file_template = %%(rev)s_%%(slug)s

# Encoding for the migration files
output_encoding = utf-8

# Migration table is the default `alembic_version`. Per docs/db-schema.md,
# we keep migration metadata in the same database as the application data.

[post_write_hooks]
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
