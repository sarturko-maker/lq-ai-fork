[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lq-ai-api"
version = "0.1.0"
description = "LQ.AI backend API service"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "LegalQuants" }]
dependencies = [
    "fastapi>=0.115,<0.117",
    "uvicorn[standard]>=0.32,<0.34",
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.4,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "ruff>=0.6",
    "mypy>=1.11",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "unit: pure unit tests, no I/O",
    "integration: tests that hit Postgres/Redis/MinIO/Gateway",
    "provider: tests that hit a real LLM provider (require API key)",
    "slow: tests that take longer than 5s",
    "e2e: end-to-end tests via Playwright",
]

[tool.mypy]
strict_optional = true
warn_unused_ignores = true
disallow_untyped_defs = true
