apiVersion: v1
kind: Service
metadata:
  name: {{ include "lq-ai.fullname" . }}-redis
  labels:
    {{- include "lq-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      name: redis
  selector:
    {{- include "lq-ai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
