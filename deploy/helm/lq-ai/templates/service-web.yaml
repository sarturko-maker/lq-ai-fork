apiVersion: v1
kind: Service
metadata:
  name: {{ include "lq-ai.fullname" . }}-web
  labels:
    {{- include "lq-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    {{- include "lq-ai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
