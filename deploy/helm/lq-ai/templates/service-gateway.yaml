apiVersion: v1
kind: Service
metadata:
  name: {{ include "lq-ai.fullname" . }}-gateway
  labels:
    {{- include "lq-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: http
      name: http
  selector:
    {{- include "lq-ai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
