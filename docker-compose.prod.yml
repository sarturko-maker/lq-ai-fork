# LQ.AI — production docker-compose (SAAS-1, ADR-F058 Mode 2)
#
# Per-tenant hosted stack: one instance of this file per customer, deployed by the
# private control-plane repo (SAAS-7A) onto a dedicated Hetzner node. See
# docs/fork/plans/SAAS-HOSTING.md §3 (Option A) + §5 (update pipeline) and
# docs/adr/F058-hosted-saas-charter.md.
#
# Differences from docker-compose.yml (the dev harness), all deliberate:
#   - `image:` refs pulled from GHCR, never `build:` — the prod host has no repo
#     checkout. LQ_AI_IMAGE_TAG is set by the deploy script to a `:sha-<sha>` tag
#     published by .github/workflows/images.yml; deploying `:main` (a moving
#     pointer) is NOT allowed — it breaks the "deploy = one pinned SHA" contract
#     that rollback (redeploy previous SHA) depends on.
#   - NO minio — hosted stacks use external S3-compatible object storage (Hetzner
#     Object Storage). S3_* is required with no MinIO-shaped fallback.
#   - NO host ports on ANY service. The reverse proxy (Caddy, SAAS-3) joins this
#     compose stack's docker network and talks to services by their in-network
#     name (api:8000, web:8080, etc.) — it is the only public listener. Until
#     SAAS-3 lands, this file is not internet-facing by construction.
#   - mem_limit + mem_reservation on every service, sized to fit comfortably
#     under a 16 GB Hetzner CX43 node (~12.7 GB of limits total).
#   - No default passwords / no dev bind-mount conveniences: every secret uses
#     required-var (`${VAR:?...}`) syntax so `docker compose config` fails loudly
#     on a missing value instead of silently booting with a well-known default.
#   - Skills are baked into the api image (`COPY skills/ /skills/`, api/Dockerfile)
#     — no `./skills` bind mount (there is no repo checkout to mount from).
#
# Operators/deploy scripts should set an explicit per-tenant Compose project name
# (`docker compose -p <tenant-slug> -f docker-compose.prod.yml ...` or
# COMPOSE_PROJECT_NAME) so stacks packed on the same node (once §3A's packing
# preconditions hold) don't collide on the default project-derived network name.

services:
  # ============================================================
  # Storage
  # ============================================================

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    # Baseline OLTP + pgvector workload for one tenant; well under the 16 GB node
    # ceiling with headroom for the workers' spikes (ADR-F056 §Resource-aware
    # execution — same containment rationale as the dev-box mem_limits).
    mem_limit: 2g
    mem_reservation: 1g
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lq_ai}
      POSTGRES_USER: ${POSTGRES_USER:-lq_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lq_ai} -d $${POSTGRES_DB:-lq_ai}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # Sessions, arq queues, rate-limit token buckets (SAAS-2) — small working set.
    mem_limit: 512m
    mem_reservation: 256m
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================================
  # Application services
  # ============================================================

  gateway:
    image: ghcr.io/sarturko-maker/lq-ai-gateway:${LQ_AI_IMAGE_TAG:?set LQ_AI_IMAGE_TAG to a published sha-<sha> tag from images.yml — never :main}
    restart: unless-stopped
    # Stateless request router; no in-process models. Small footprint.
    mem_limit: 512m
    mem_reservation: 256m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Auth — backend <-> gateway shared secret (X-LQ-AI-Gateway-Key).
      LQ_AI_GATEWAY_KEY: ${LQ_AI_GATEWAY_KEY:?LQ_AI_GATEWAY_KEY is required}
      # Fernet master key that decrypts `api_key_encrypted:` provider keys stored
      # in this tenant's gateway.yaml (gateway/app/secrets.py, ADR 0011) — the
      # SAAS-HOSTING §5.5 / ADR-F060 D6 posture of keeping provider keys encrypted
      # at rest rather than as plaintext env. OPTIONAL: unset falls back to the
      # plaintext provider-key env vars below; the gateway reads it lazily (only
      # when it actually decrypts a key), so an unset value never blocks boot.
      # gen-secrets.sh mints one; the operator pastes it into the node's .env.prod.
      LQ_AI_GATEWAY_MASTER_KEY: ${LQ_AI_GATEWAY_MASTER_KEY:-}
      LQ_AI_API_URL: ${LQ_AI_API_URL:-http://api:8000}
      LQ_AI_SKILL_CACHE_TTL_SECONDS: ${LQ_AI_SKILL_CACHE_TTL_SECONDS:-60}
      # B4 — inference_routing_log writer (audit trail of every routed request).
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-lq_ai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lq_ai}}
      # Provider keys — any may be unset; this tenant's gateway.yaml picks which
      # to use. Tenant-tier EU routing / PRC-provider fencing lands in SAAS-6.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_RESOURCE: ${AZURE_OPENAI_RESOURCE:-}
      # AZ-CONFIG — Azure AI Foundry: Claude (native Anthropic Messages
      # route; chat-only until AZ-2b) + non-OpenAI Foundry Models (e.g.
      # Mistral-Large-3 on the classic deployments route). All optional.
      AZURE_ANTHROPIC_API_KEY: ${AZURE_ANTHROPIC_API_KEY:-}
      AZURE_ANTHROPIC_RESOURCE: ${AZURE_ANTHROPIC_RESOURCE:-}
      AZURE_FOUNDRY_API_KEY: ${AZURE_FOUNDRY_API_KEY:-}
      AZURE_FOUNDRY_RESOURCE: ${AZURE_FOUNDRY_RESOURCE:-}
      # KV-1 (ADR-F069) — OPTIONAL Azure Key Vault sourcing of the three Azure
      # keys via the VM's managed identity. All NON-secret; unset ⇒ the plain
      # AZURE_*_API_KEY vars above are used (default). See .env.prod.example.
      AZURE_KEY_VAULT_NAME: ${AZURE_KEY_VAULT_NAME:-}
      AZURE_OPENAI_KEY_SECRET_NAME: ${AZURE_OPENAI_KEY_SECRET_NAME:-}
      AZURE_ANTHROPIC_KEY_SECRET_NAME: ${AZURE_ANTHROPIC_KEY_SECRET_NAME:-}
      AZURE_FOUNDRY_KEY_SECRET_NAME: ${AZURE_FOUNDRY_KEY_SECRET_NAME:-}
      # AZ-6 (ADR-F072) — OPTIONAL keyless auth for azure-openai via the VM's
      # managed identity (no static key). NON-secret; unset ⇒ the api-key path
      # above is used, unchanged. See .env.prod.example / runbook §4c.
      AZURE_OPENAI_USE_MANAGED_IDENTITY: ${AZURE_OPENAI_USE_MANAGED_IDENTITY:-}
      AZURE_OPENAI_IDENTITY_RESOURCE: ${AZURE_OPENAI_IDENTITY_RESOURCE:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # Observability (opt-in; unset disables).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LQ_AI_DEV_MODE: "false"
    # D0.5 — gateway.yaml is mutable at runtime via the admin alias-CRUD surface
    # (ADR 0010). Unlike dev, there is no repo checkout on the prod host to seed
    # from: GATEWAY_CONFIG_FILE must point at this tenant's provisioned seed file
    # (control-plane repo template, applied by the provision script — see
    # SAAS-HOSTING.md §5 item 5). The named volume then holds the live, writable
    # copy across restarts exactly as in dev.
    volumes:
      - ${GATEWAY_CONFIG_FILE:?set to this tenant's provisioned gateway.yaml seed path (control-plane repo template)}:/usr/share/lq-ai/gateway.yaml.example:ro
      - gateway-config:/etc/lq-ai
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health', timeout=2).status == 200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: ghcr.io/sarturko-maker/lq-ai-api:${LQ_AI_IMAGE_TAG:?set LQ_AI_IMAGE_TAG to a published sha-<sha> tag from images.yml — never :main}
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 1g
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gateway:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-lq_ai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lq_ai}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Object storage — hosted stacks use external S3-compatible storage
      # (Hetzner Object Storage recommended, SAAS-HOSTING.md §5); there is no
      # MinIO fallback in prod, so all four are required.
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:?set to your S3-compatible endpoint (e.g. Hetzner Object Storage) — prod has no MinIO fallback}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required (per-tenant bucket — ADR-F058 day-one rule 1 — key objects tenants/<stack-or-org-id>/<file_id>)}
      S3_REGION: ${S3_REGION:?S3_REGION is required (provider-specific code, e.g. Hetzner "fsn1"/"nbg1"/"hel1" — not necessarily an AWS region)}
      LQ_AI_GATEWAY_URL: ${LQ_AI_GATEWAY_URL:-http://gateway:8001}
      LQ_AI_GATEWAY_KEY: ${LQ_AI_GATEWAY_KEY:?LQ_AI_GATEWAY_KEY is required}
      # Retrieval providers (ADR-F049 C1/D). local = bundled ONNX models, $0,
      # no extra egress; the production-shaped default (see arq-worker below,
      # where agent runs actually execute).
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      RERANK_ENABLED: ${RERANK_ENABLED:-true}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-900}
      JWT_REFRESH_TOKEN_TTL_SECONDS: ${JWT_REFRESH_TOKEN_TTL_SECONDS:-604800}
      # ADR-F059 §6-item-1 — auth rate-limit knobs, forwarded so an operator can
      # tighten them under attack or loosen a false-positive WITHOUT editing this
      # file (the defaults here ARE the secure code defaults). The api service
      # uses an explicit env allowlist (no env_file), so a knob is only override-
      # able once forwarded — hence these lines. NOTE (ADR-F059 D3): the per-
      # account login bucket keys on the SUBMITTED email, so a known-victim
      # lockout DoS is possible; RATE_LIMIT_LOGIN_ACCOUNT_PER_WINDOW is the lever.
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_LOGIN_IP_PER_WINDOW: ${RATE_LIMIT_LOGIN_IP_PER_WINDOW:-10}
      RATE_LIMIT_LOGIN_ACCOUNT_PER_WINDOW: ${RATE_LIMIT_LOGIN_ACCOUNT_PER_WINDOW:-5}
      RATE_LIMIT_REFRESH_IP_PER_WINDOW: ${RATE_LIMIT_REFRESH_IP_PER_WINDOW:-60}
      RATE_LIMIT_MFA_VERIFY_IP_PER_WINDOW: ${RATE_LIMIT_MFA_VERIFY_IP_PER_WINDOW:-10}
      RATE_LIMIT_MFA_VERIFY_ACCOUNT_PER_WINDOW: ${RATE_LIMIT_MFA_VERIFY_ACCOUNT_PER_WINDOW:-5}
      RATE_LIMIT_CHANGE_PASSWORD_ACCOUNT_PER_WINDOW: ${RATE_LIMIT_CHANGE_PASSWORD_ACCOUNT_PER_WINDOW:-5}
      RATE_LIMIT_MFA_MANAGE_ACCOUNT_PER_WINDOW: ${RATE_LIMIT_MFA_MANAGE_ACCOUNT_PER_WINDOW:-10}
      RATE_LIMIT_BOOTSTRAP_STATUS_IP_PER_WINDOW: ${RATE_LIMIT_BOOTSTRAP_STATUS_IP_PER_WINDOW:-30}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LQ_AI_DEV_MODE: "false"
      # ADR-F059 D4 — trusted-proxy handling. uvicorn runs with --proxy-headers
      # ON by default (uvicorn 0.32+) and reads FORWARDED_ALLOW_IPS natively, so
      # with it set uvicorn rewrites request.client to the real client IP that
      # Caddy (SAAS-3) forwards in X-Forwarded-For — the source of truth for the
      # per-IP rate-limit buckets, audit rows, and session IP metadata. This
      # compose network publishes ZERO host ports (see header), so the ONLY
      # peers that can reach api:8000 are stack services; trusting them is
      # acceptable until SAAS-3 pins Caddy's fixed container IP here. We never
      # parse X-Forwarded-For in app code (ADR-F059 D4). Dev compose leaves this
      # unset → uvicorn's default 127.0.0.1 → byte-identical dev behaviour.
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}
      # Same-origin reverse proxy (Caddy, SAAS-3) fronts web + api under one
      # origin — leave unset (CORS disabled; no cross-origin browser calls).
      LQ_AI_CORS_ORIGINS: ${LQ_AI_CORS_ORIGINS:-}
      # Skills are baked into the image at /skills (api/Dockerfile `COPY skills/
      # /skills/`) — no bind mount needed or possible (no repo checkout here).
      LQ_AI_SKILLS_DIR: ${LQ_AI_SKILLS_DIR:-/skills}
      # SETUP-2 handover — the first-run admin bootstrap (api lifespan,
      # admin_bootstrap.py) mints the CUSTOMER admin at this email. config.py has
      # no env_prefix, so the var is the bare field name. Unset ⇒ default admin@lq.ai.
      FIRST_RUN_ADMIN_EMAIL: ${FIRST_RUN_ADMIN_EMAIL:-}
      # SETUP-2 auth/notification mail (SMTP; optional — smtp_host-gated). Forwarded
      # so a hosted stack CAN send mail (SAAS-SETUP §0 gap); the api reads these for
      # the invite/reset flows (SETUP-3a), and the arq-worker (below) sends autonomous mail.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      # SETUP-3a (ADR-F061) — the operator (platform) account. Unset ⇒ no operator
      # is bootstrapped (self-host with no separate operator). Bare env name (no
      # env_prefix), same as FIRST_RUN_ADMIN_EMAIL above.
      FIRST_RUN_OPERATOR_EMAIL: ${FIRST_RUN_OPERATOR_EMAIL:-}
      # SETUP-3a (ADR-F061 D6) — browser-facing base URL for emailed invite/reset
      # links, derived from the tenant's public origin. Unset ⇒ path-only fallback
      # links + the invite-create response hands the accept URL back for out-of-band
      # delivery. (Scheme prefixed here; LQ_AI_PUBLIC_ORIGIN carries no scheme.)
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://${LQ_AI_PUBLIC_ORIGIN}}
      # SETUP-3a (ADR-F061 D7) — lifecycle token TTLs + rate limits (optional; the
      # defaults ARE the secure code defaults — forwarded so an operator can tune
      # without editing this file, matching the SAAS-2 auth knob convention above).
      INVITE_TOKEN_TTL_SECONDS: ${INVITE_TOKEN_TTL_SECONDS:-604800}
      PASSWORD_RESET_TOKEN_TTL_SECONDS: ${PASSWORD_RESET_TOKEN_TTL_SECONDS:-3600}
      RATE_LIMIT_PASSWORD_RESET_REQUEST_IP_PER_WINDOW: ${RATE_LIMIT_PASSWORD_RESET_REQUEST_IP_PER_WINDOW:-10}
      RATE_LIMIT_PASSWORD_RESET_REQUEST_EMAIL_PER_WINDOW: ${RATE_LIMIT_PASSWORD_RESET_REQUEST_EMAIL_PER_WINDOW:-5}
      RATE_LIMIT_TOKEN_REDEEM_IP_PER_WINDOW: ${RATE_LIMIT_TOKEN_REDEEM_IP_PER_WINDOW:-10}
      # SETUP-5a (ADR-F063) — deployment default budget profile for new agent
      # runs (economy/balanced/generous). Optional; unset ⇒ balanced. The run-
      # create endpoint (THIS service) resolves run-explicit > area default >
      # this > balanced and persists the resolved value. NOTE the `${VAR:-}`
      # form delivers "" (never unset) — config.py normalizes "" → None.
      RUN_DEFAULT_BUDGET_PROFILE: ${RUN_DEFAULT_BUDGET_PROFILE:-}
      # BRAND-1a (ADR-F068) — white-label seed. The api lifespan seeds the
      # branding singleton ONLY while its table is empty AND at least one
      # BRAND_* is set; admin UI edits win afterwards. Bare env names (no
      # env_prefix). api only — the workers never read branding.
      BRAND_PRODUCT_NAME: ${BRAND_PRODUCT_NAME:-}
      BRAND_ACCENT_LIGHT: ${BRAND_ACCENT_LIGHT:-}
      BRAND_ACCENT_DARK: ${BRAND_ACCENT_DARK:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingest-worker:
    # C5 document pipeline worker. Same image as `api` (see api/Dockerfile) —
    # both COPY skills/ /skills/ at build, though this worker doesn't need them.
    image: ghcr.io/sarturko-maker/lq-ai-api:${LQ_AI_IMAGE_TAG:?set LQ_AI_IMAGE_TAG to a published sha-<sha> tag from images.yml — never :main}
    restart: unless-stopped
    # Loads Docling + EasyOCR + the local embedder during ingest (~2.5 GiB
    # peak). mem_limit caps THIS cgroup so a runaway ingest self-OOMs (job
    # fails + worker restarts) instead of the kernel killing Postgres —
    # ADR-F056 §Resource-aware execution (same containment as the dev-box
    # mem_limits; sized up here for headroom on a full 16 GB node).
    mem_limit: 3g
    mem_reservation: 1536m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # DE-326: the api is the single schema migrator; wait for it to be
      # healthy (entrypoint runs `alembic upgrade head` first) so this worker
      # never races the migration. Paired with LQ_AI_SKIP_MIGRATIONS=1 below.
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-lq_ai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lq_ai}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LQ_AI_SKIP_MIGRATIONS: "1"
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:?set to your S3-compatible endpoint (e.g. Hetzner Object Storage) — prod has no MinIO fallback}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required (per-tenant bucket — ADR-F058 day-one rule 1 — key objects tenants/<stack-or-org-id>/<file_id>)}
      S3_REGION: ${S3_REGION:?S3_REGION is required (provider-specific code, e.g. Hetzner "fsn1"/"nbg1"/"hel1" — not necessarily an AWS region)}
      LQ_AI_INGEST_WORKER_CONCURRENCY: ${LQ_AI_INGEST_WORKER_CONCURRENCY:-2}
      LQ_AI_DOCLING_TIMEOUT_SECONDS: ${LQ_AI_DOCLING_TIMEOUT_SECONDS:-300}
      LQ_AI_DOCLING_ENABLED: ${LQ_AI_DOCLING_ENABLED:-true}
      LQ_AI_CHUNK_TARGET_CHARS: ${LQ_AI_CHUNK_TARGET_CHARS:-2000}
      LQ_AI_CHUNK_OVERLAP_CHARS: ${LQ_AI_CHUNK_OVERLAP_CHARS:-200}
      LQ_AI_GATEWAY_URL: ${LQ_AI_GATEWAY_URL:-http://gateway:8001}
      LQ_AI_GATEWAY_KEY: ${LQ_AI_GATEWAY_KEY:?LQ_AI_GATEWAY_KEY is required}
      # MUST match api + arq-worker: ingest embeds chunks with this provider
      # and queries embed with it too — a mismatch puts two vector spaces in
      # one column and silently degrades retrieval to FTS-only (the exact
      # 2026-07-01 dev incident behind ADR-F056). One shared var, three
      # services, until F056's single resolver lands.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Persist Docling/EasyOCR model caches across restarts (same names as dev —
    # docs/adr/0006-document-pipeline-architecture.md).
    volumes:
      - ingest-hf-cache:/root/.cache/huggingface
      - ingest-easyocr-cache:/root/.EasyOCR
    command: ["arq", "app.workers.document_pipeline.WorkerSettings"]
    healthcheck:
      test:
        ["CMD", "python", "-c", "import os; from redis import Redis; r = Redis.from_url(os.environ['REDIS_URL']); r.ping()"]
      interval: 10s
      timeout: 5s
      retries: 6

  arq-worker:
    # M3-A6 worker. Sister to `ingest-worker`; same image, dedicated `arq:m3a6`
    # queue. Agent runs (deepagents) execute HERE.
    image: ghcr.io/sarturko-maker/lq-ai-api:${LQ_AI_IMAGE_TAG:?set LQ_AI_IMAGE_TAG to a published sha-<sha> tag from images.yml — never :main}
    restart: unless-stopped
    # Agent runs execute here and load the local embedder + hold N fanned-out
    # subagents' context. mem_limit caps THIS cgroup so a heavy run self-OOMs
    # (run fails + worker restarts) rather than the kernel killing Postgres —
    # ADR-F056 §Resource-aware execution; pair with FAN_OUT_QUOTA below.
    mem_limit: 2500m
    mem_reservation: 1250m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-lq_ai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lq_ai}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LQ_AI_SKIP_MIGRATIONS: "1"
      LQ_AI_GATEWAY_URL: ${LQ_AI_GATEWAY_URL:-http://gateway:8001}
      LQ_AI_GATEWAY_KEY: ${LQ_AI_GATEWAY_KEY:?LQ_AI_GATEWAY_KEY is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Retrieval providers (ADR-F049 C1/D) — agent runs load these in-process.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      RERANK_ENABLED: ${RERANK_ENABLED:-true}
      # Per-run subagent fan-out ceiling (balanced tier; ADR-F049 Slice E /
      # ADR-F053). Agent runs execute in THIS worker, so the cap must be set
      # here. 32 is the app default (api/app/agents/budget.py) when unset;
      # written explicitly so the prod value is visible in this file.
      FAN_OUT_QUOTA: ${FAN_OUT_QUOTA:-32}
      # SETUP-5a (ADR-F063) — deployment default budget profile, mirrored from
      # the api service so both processes resolve settings identically (the api
      # persists the resolved profile at run create; this worker re-resolves the
      # brakes FROM that persisted value). Unset ⇒ "" ⇒ balanced (config.py).
      RUN_DEFAULT_BUDGET_PROFILE: ${RUN_DEFAULT_BUDGET_PROFILE:-}
      # Skills baked into the image at /skills — no bind mount here either.
      LQ_AI_SKILLS_DIR: ${LQ_AI_SKILLS_DIR:-/skills}
      # Storage-backed tools (Commercial apply_redline source-doc fetch +
      # redlined output upload; user-export bundles) execute in this worker.
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:?set to your S3-compatible endpoint (e.g. Hetzner Object Storage) — prod has no MinIO fallback}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required (per-tenant bucket — ADR-F058 day-one rule 1 — key objects tenants/<stack-or-org-id>/<file_id>)}
      S3_REGION: ${S3_REGION:?S3_REGION is required (provider-specific code, e.g. Hetzner "fsn1"/"nbg1"/"hel1" — not necessarily an AWS region)}
      # SETUP-2 — autonomous-notification mail actually SENDS from this worker
      # (app/autonomous/guard.py → notify_email.py; the executor runs here). SMTP
      # optional (smtp_host-gated); forwarded so hosted stacks can send mail.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    command: ["arq", "app.workers.arq_setup.WorkerSettings"]
    healthcheck:
      test:
        ["CMD", "python", "-c", "import os; from redis import Redis; r = Redis.from_url(os.environ['REDIS_URL']); r.ping()"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    # LQ.AI web shell — static SvelteKit SPA served by nginx (F0-S6, ADR-F006).
    # PUBLIC_LQ_AI_API_BASE_URL is baked in at image-build time; the images.yml
    # build leaves it at its default (relative `/api/v1`), which is exactly
    # right for prod's same-origin reverse-proxy topology — nothing to set here.
    image: ghcr.io/sarturko-maker/lq-ai-web:${LQ_AI_IMAGE_TAG:?set LQ_AI_IMAGE_TAG to a published sha-<sha> tag from images.yml — never :main}
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    # Public edge — the ONLY service that publishes host ports (ADR-F060 D3).
    # Custom xcaddy image (deploy/caddy/Dockerfile) with the compiled-in DNS-01
    # provider set (hetzner, ionos) + the Caddyfile BAKED IN; published to GHCR by images.yml and
    # pinned by LQ_AI_IMAGE_TAG like every other image, so the edge rolls
    # forward/back atomically with api/web/gateway. Joins this stack's network and
    # reverse-proxies api:8000 / web:8080 by name (the compose publishes no other
    # host ports — see the file header). Provisions the tenant's TLS cert via
    # wildcard DNS-01 (ADR-F060 D2: no per-host cert in the CT logs).
    image: ghcr.io/sarturko-maker/lq-ai-caddy:${LQ_AI_IMAGE_TAG:?set LQ_AI_IMAGE_TAG to a published sha-<sha> tag from images.yml — never :main}
    restart: unless-stopped
    # Static reverse proxy; no in-process models — a small, fixed footprint.
    mem_limit: 256m
    mem_reservation: 64m
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 (QUIC)
    depends_on:
      # Only accept public traffic once the upstreams it proxies are healthy.
      # Caddy talks to api + web directly; web's nginx proxies Collabora, so a
      # Collabora outage must NOT keep the edge (and the rest of the app) down.
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      # The tenant hostname Caddy serves + provisions the wildcard cert for. A
      # single host for staging; a wildcard (`*.tenant.example.com`) for prod.
      LQ_AI_PUBLIC_HOST: ${LQ_AI_PUBLIC_HOST:?set to this tenant's public host, e.g. acme.lq-ai.example.com (staging) or *.acme.lq-ai.example.com (prod)}
      # ACME account email for Let's Encrypt cert-expiry notices.
      LQ_AI_ACME_EMAIL: ${LQ_AI_ACME_EMAIL:?set to an ops email for ACME/Let's Encrypt expiry notices}
      # DNS provider + API token for the ACME DNS-01 challenge (ADR-F060 D2;
      # multi-provider SETUP-1). The provider must be compiled into the
      # lq-ai-caddy image (hetzner | ionos) — selected at Caddyfile parse time.
      # The token is scoped to this tenant's DNS zone; never committed — lives in
      # the root-owned .env.prod on the node, same as every other secret.
      LQ_AI_DNS_PROVIDER: ${LQ_AI_DNS_PROVIDER:-hetzner}
      LQ_AI_DNS_API_TOKEN: ${LQ_AI_DNS_API_TOKEN:?set to the DNS provider API token scoped to the tenant's zone (ACME DNS-01 challenge)}
    volumes:
      # Cert store + Caddy state MUST persist across restarts — otherwise every
      # redeploy re-issues certs (Let's Encrypt rate limits bite) and drops OCSP
      # staples. Named volumes, same lifecycle as pgdata/redisdata.
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      # Caddy exposes no app health route; probe the local admin API (:2019,
      # localhost-only) to prove the process is up and serving its config.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 6

  collabora:
    # In-app Word editor engine — Collabora Online / CODE over WOPI (ADR-F047).
    # Same PREBUILT image, pinned BY DIGEST, as dev (Spike-0-validated Collabora
    # Office 26.04.1.4 — docs/fork/evidence/libreoffice-spike0/).
    image: collabora/code@sha256:75859dc9f9084d1877ce36cf96ec86600f495bade33289c9cbc27e0a0ee23b81  # collabora/code 26.04.1.4
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 1g
    # MKNOD is all coolwsd's chroot sandbox needs; deliberately not `privileged`
    # / SYS_ADMIN (same posture as dev).
    cap_add:
      - MKNOD
    environment:
      # WOPI host allow-list — internal address, unchanged from dev.
      aliasgroup1: http://api:8000
      # Public origin this stack is served under. Both server_name (bare
      # host[:port]) and net.frame_ancestors (full https origin, extra_params
      # below) are DERIVED from this single var — dev's separate
      # COLLABORA_SERVER_NAME / COLLABORA_FRAME_ANCESTORS defaults don't apply
      # in prod (no localhost). Caddy (SAAS-3) terminates TLS in front of this.
      server_name: ${LQ_AI_PUBLIC_ORIGIN:?set to this tenant's public host[:port], e.g. acme.lq-ai.example.com — no scheme}
      dictionaries: en_GB en_US
      DONT_GEN_SSL_CERT: "true"
      # No default admin credentials in prod (dev defaults to admin/admin — the
      # console still isn't reachable, no host port, not proxied, but a shared
      # public value across every tenant stack is an avoidable weak spot).
      username: ${COLLABORA_ADMIN_USER:?COLLABORA_ADMIN_USER is required}
      password: ${COLLABORA_ADMIN_PASSWORD:?COLLABORA_ADMIN_PASSWORD is required}
      # ssl.termination defaults to true (prod is always behind Caddy's TLS
      # termination) — the inverse of dev's plain-http default. home_mode.enable
      # trade-off documented in .env.example / dev compose; unchanged in prod.
      extra_params: "--o:ssl.enable=false --o:ssl.termination=${COLLABORA_SSL_TERMINATION:-true} --o:net.frame_ancestors=https://${LQ_AI_PUBLIC_ORIGIN:?set to this tenant's public host[:port]} --o:home_mode.enable=${COLLABORA_HOME_MODE:-true} --o:allow_update_popup=false"
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/127.0.0.1/9980 && printf "GET /hosting/discovery HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && head -n1 <&3 | grep -q 200'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

# ============================================================
# Persistent volumes — same names as docker-compose.yml minus miniodata
# (no minio service) and ollamadata (no local-inference profile in prod).
# ============================================================

volumes:
  pgdata:
  redisdata:
  gateway-config:
  ingest-hf-cache:
  ingest-easyocr-cache:
  # Caddy cert store (/data) + autosave config (/config) — SAAS-3, ADR-F060 D3.
  caddy-data:
  caddy-config:
